        type: &#x27;mcq&#x27;,
        prompt: &#x27;Persuasive vocabulary&#x27;,
        question: `Which term means: &quot;${item.def}&quot;?`,
        options: opts,
        correct: opts.indexOf(item.term),
        explain: `${item.term} = ${item.def}`
      };
    }
  });
}

function buildAforestQuiz() {
  return pickN(AFOREST_LINES, 8).map(item =&gt; {
    const distractors = pickN(AFOREST_OPTIONS.filter(d =&gt; d !== item.technique), 3);
    const opts = shuffle([item.technique, ...distractors]);
    return {
      type: &#x27;mcq&#x27;,
      prompt: &#x27;AFOREST&#x27;,
      bigDisplay: `&quot;${item.line}&quot;`,
      question: &#x27;Which persuasive technique is this?&#x27;,
      options: opts,
      correct: opts.indexOf(item.technique),
      explain: item.explain
    };
  });
}

function buildSuperImpQuiz() {
  return pickN(SUPER_IMP_QS, 10).map(item =&gt; {
    const opts = [&quot;Superlative&quot;, &quot;Imperative&quot;];
    return {
      type: &#x27;mcq&#x27;,
      prompt: &#x27;Superlative or imperative?&#x27;,
      bigDisplay: `&quot;${item.line}&quot;`,
      question: &#x27;Which technique is used here?&#x27;,
      options: opts,
      correct: opts.indexOf(item.correct),
      explain: item.explain
    };
  });
}

function buildFactOpQuiz() {
  return pickN(FACT_OP_QS, 10).map(item =&gt; {
    const opts = [&quot;Fact&quot;, &quot;Opinion&quot;];
    return {
      type: &#x27;mcq&#x27;,
      prompt: &#x27;Fact or opinion?&#x27;,
      bigDisplay: `&quot;${item.stmt}&quot;`,
      question: &#x27;Is this a FACT or an OPINION?&#x27;,
      options: opts,
      correct: opts.indexOf(item.answer),
      explain: item.explain
    };
  });
}

function buildCounterQuiz() {
  return pickN(COUNTER_QS, 5).map(q =&gt; ({
    type: &#x27;mcq&#x27;,
    prompt: &#x27;Counter argument&#x27;,
    question: q.q,
    options: q.options,
    correct: q.correct,
    explain: q.explain
  }));
}

function buildTrueFalseQuiz() {
  return pickN(TRUE_FALSE, 12).map(item =&gt; ({
    type: &#x27;truefalse&#x27;,
    prompt: &#x27;True or false&#x27;,
    question: item.stmt,
    correct: item.answer,
    explain: item.explain
  }));
}

function buildMixedQuiz() {
  const all = [];
  buildVocab1Quiz().slice(0, 2).forEach(q =&gt; all.push(q));
  buildToneQuiz().slice(0, 2).forEach(q =&gt; all.push(q));
  buildDevicesQuiz().slice(0, 2).forEach(q =&gt; all.push(q));
  buildSensesQuiz().slice(0, 1).forEach(q =&gt; all.push(q));
  buildVocab2Quiz().slice(0, 2).forEach(q =&gt; all.push(q));
  buildAforestQuiz().slice(0, 2).forEach(q =&gt; all.push(q));
  buildSuperImpQuiz().slice(0, 2).forEach(q =&gt; all.push(q));
  buildFactOpQuiz().slice(0, 2).forEach(q =&gt; all.push(q));
  return shuffle(all);
}

function startQuiz(mode) {
  state.mode = mode;
  state.current = 0;
  state.score = 0;
  state.answered = false;
  if (mode === &#x27;vocab1&#x27;) state.questions = buildVocab1Quiz();
  else if (mode === &#x27;tones&#x27;) state.questions = buildToneQuiz();
  else if (mode === &#x27;devices&#x27;) state.questions = buildDevicesQuiz();
  else if (mode === &#x27;senses&#x27;) state.questions = buildSensesQuiz();
  else if (mode === &#x27;structure&#x27;) state.questions = buildStructureQuiz();
  else if (mode === &#x27;vocab2&#x27;) state.questions = buildVocab2Quiz();
  else if (mode === &#x27;aforest&#x27;) state.questions = buildAforestQuiz();
  else if (mode === &#x27;superimp&#x27;) state.questions = buildSuperImpQuiz();
  else if (mode === &#x27;factopinion&#x27;) state.questions = buildFactOpQuiz();
  else if (mode === &#x27;counter&#x27;) state.questions = buildCounterQuiz();
  else if (mode === &#x27;truefalse&#x27;) state.questions = buildTrueFalseQuiz();
  else state.questions = buildMixedQuiz();
  document.querySelectorAll(&#x27;.mode-card&#x27;).forEach(c =&gt; {
    c.classList.toggle(&#x27;active&#x27;, c.dataset.mode === mode);
  });
  renderQuestion();
  document.getElementById(&#x27;quizArea&#x27;).scrollIntoView({ behavior: &#x27;smooth&#x27;, block: &#x27;start&#x27; });
}

function renderQuestion() {
  const total = state.questions.length;
  if (state.current &gt;= total) { renderFinal(); return; }
  const q = state.questions[state.current];

  let body;
  if (q.type === &#x27;mcq&#x27;) body = renderMCQ(q);
  else if (q.type === &#x27;truefalse&#x27;) body = renderTF(q);

  $quiz.innerHTML = `
    &lt;div class=&quot;quiz&quot;&gt;
      &lt;div class=&quot;progress-bar&quot;&gt;
        &lt;span class=&quot;progress-text&quot;&gt;Question ${state.current + 1} / ${total}&lt;/span&gt;
        &lt;span class=&quot;score-pill&quot;&gt;&lt;span class=&quot;accent&quot;&gt;●&lt;/span&gt; Score: ${state.score}/${state.current}&lt;/span&gt;
      &lt;/div&gt;
      ${body}
    &lt;/div&gt;
  `;
  attachHandlers(q);
}

function renderMCQ(q) {
  const big = q.bigDisplay
    ? `&lt;div class=&quot;big-display&quot;&gt;&lt;div class=&quot;big-expr&quot;&gt;${q.bigDisplay}&lt;/div&gt;&lt;/div&gt;`
    : &#x27;&#x27;;
  const letters = [&#x27;A&#x27;, &#x27;B&#x27;, &#x27;C&#x27;, &#x27;D&#x27;];
  const opts = q.options.map((o, i) =&gt; `
    &lt;button class=&quot;option&quot; data-index=&quot;${i}&quot;&gt;
      &lt;span class=&quot;letter&quot;&gt;${letters[i]}&lt;/span&gt;
      &lt;span&gt;${o}&lt;/span&gt;
    &lt;/button&gt;
  `).join(&#x27;&#x27;);
  return `
    &lt;div class=&quot;question-label&quot;&gt;${q.prompt || &#x27;Question&#x27;}&lt;/div&gt;
    &lt;div class=&quot;question&quot;&gt;${q.question || &#x27;&#x27;}&lt;/div&gt;
    ${big}
    &lt;div class=&quot;options&quot; id=&quot;optionList&quot;&gt;${opts}&lt;/div&gt;
    &lt;div id=&quot;feedbackArea&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;controlArea&quot;&gt;&lt;/div&gt;
  `;
}

function renderTF(q) {
  return `
    &lt;div class=&quot;question-label&quot;&gt;${q.prompt}&lt;/div&gt;
    &lt;div class=&quot;question&quot;&gt;${q.question}&lt;/div&gt;
    &lt;div class=&quot;tf-container&quot; style=&quot;margin-top:18px&quot;&gt;
      &lt;button class=&quot;tf-btn&quot; data-answer=&quot;true&quot;&gt;TRUE&lt;/button&gt;
      &lt;button class=&quot;tf-btn&quot; data-answer=&quot;false&quot;&gt;FALSE&lt;/button&gt;
    &lt;/div&gt;
    &lt;div id=&quot;feedbackArea&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;controlArea&quot;&gt;&lt;/div&gt;
  `;
}

function attachHandlers(q) {
  if (q.type === &#x27;mcq&#x27;) {
    document.querySelectorAll(&#x27;.option&#x27;).forEach(btn =&gt; {
      btn.addEventListener(&#x27;click&#x27;, () =&gt; handleMCQ(btn, q));
    });
  } else if (q.type === &#x27;truefalse&#x27;) {
    document.querySelectorAll(&#x27;.tf-btn&#x27;).forEach(btn =&gt; {
      btn.addEventListener(&#x27;click&#x27;, () =&gt; handleTF(btn, q));
    });
  }
}

function handleMCQ(btn, q) {
  if (state.answered) return;
  state.answered = true;
  const idx = parseInt(btn.dataset.index);
  const correct = idx === q.correct;
  if (correct) state.score++;
  document.querySelectorAll(&#x27;.option&#x27;).forEach((b, i) =&gt; {
    b.disabled = true;
    if (i === q.correct) b.classList.add(&#x27;correct&#x27;);
    else if (i === idx) b.classList.add(&#x27;wrong&#x27;);
  });
  showFeedback(correct, q.explain || &#x27;&#x27;);
  showNextButton();
}

function handleTF(btn, q) {
  if (state.answered) return;
  state.answered = true;
  const ans = btn.dataset.answer === &#x27;true&#x27;;
  const correct = ans === q.correct;
  if (correct) state.score++;
  document.querySelectorAll(&#x27;.tf-btn&#x27;).forEach(b =&gt; {
    b.disabled = true;
    const bAns = b.dataset.answer === &#x27;true&#x27;;
    if (bAns === q.correct) b.classList.add(&#x27;correct&#x27;);
    else if (bAns === ans) b.classList.add(&#x27;wrong&#x27;);
  });
  showFeedback(correct, q.explain || &#x27;&#x27;);
  showNextButton();
}

function showFeedback(correct, html) {
  const fa = document.getElementById(&#x27;feedbackArea&#x27;);
  fa.innerHTML = `
    &lt;div class=&quot;feedback ${correct ? &#x27;correct&#x27; : &#x27;wrong&#x27;} flash&quot;&gt;
      &lt;strong&gt;${correct ? &#x27;\u2713 Correct!&#x27; : &#x27;\u2717 Not quite&#x27;}&lt;/strong&gt;
      ${html}
    &lt;/div&gt;
  `;
}

function showNextButton() {
  const ca = document.getElementById(&#x27;controlArea&#x27;);
  const isLast = state.current === state.questions.length - 1;
  ca.innerHTML = `
    &lt;div class=&quot;controls&quot;&gt;
      &lt;button class=&quot;btn&quot; id=&quot;nextBtn&quot;&gt;${isLast ? &#x27;See Results&#x27; : &#x27;Next Question \u2192&#x27;}&lt;/button&gt;
    &lt;/div&gt;
  `;
  const next = document.getElementById(&#x27;nextBtn&#x27;);
  next.addEventListener(&#x27;click&#x27;, () =&gt; {
    state.current++;
    state.answered = false;
    renderQuestion();
  });
  next.focus();
}

function renderFinal() {
  const total = state.questions.length;
  const pct = Math.round((state.score / total) * 100);
  let grade, msg, icon;
  if (pct &gt;= 90)      { grade = &quot;Outstanding&quot;; msg = &quot;Top mark territory \u2014 you&#x27;re exam-ready!&quot;; icon = &quot;\u2605&quot;; }
  else if (pct &gt;= 75) { grade = &quot;Strong&quot;;      msg = &quot;Solid grasp. Try Mixed Test for full simulation.&quot;; icon = &quot;\u2713&quot;; }
  else if (pct &gt;= 55) { grade = &quot;Developing&quot;;  msg = &quot;Re-do this mode and check the cheat sheet for tricky parts.&quot;; icon = &quot;\u2197&quot;; }
  else                { grade = &quot;Keep going&quot;;  msg = &quot;Don&#x27;t worry \u2014 open the cheat sheet, redo this mode slowly.&quot;; icon = &quot;\u270D&quot;; }

  $quiz.innerHTML = `
    &lt;div class=&quot;quiz result&quot;&gt;
      &lt;div class=&quot;result-icon&quot;&gt;${icon}&lt;/div&gt;
      &lt;div class=&quot;result-grade&quot;&gt;${grade}&lt;/div&gt;
      &lt;div class=&quot;result-score&quot;&gt;${state.score}&lt;span class=&quot;total&quot;&gt;/${total}&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;result-msg&quot;&gt;${msg}&lt;/div&gt;
      &lt;div style=&quot;display:flex;gap:10px;justify-content:center;flex-wrap:wrap&quot;&gt;
        &lt;button class=&quot;btn&quot; onclick=&quot;startQuiz(&#x27;${state.mode}&#x27;)&quot;&gt;Try Again&lt;/button&gt;
        &lt;button class=&quot;btn secondary&quot; onclick=&quot;document.getElementById(&#x27;quizArea&#x27;).innerHTML=&#x27;&#x27;; document.querySelectorAll(&#x27;.mode-card&#x27;).forEach(c=&gt;c.classList.remove(&#x27;active&#x27;))&quot;&gt;Pick Another Mode&lt;/button&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  `;
}

$modes.querySelectorAll(&#x27;.mode-card&#x27;).forEach(card =&gt; {
  card.addEventListener(&#x27;click&#x27;, () =&gt; startQuiz(card.dataset.mode));
});
&lt;/script&gt;

    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .tf-btn {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 24px;
    cursor: pointer;
    font-family: inherit;
    font-size: 22px;
    font-weight: 900;
    color: var(--ink);
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .tf-btn:hover:not(:disabled) { background: var(--ink); color: var(--paper); }
  .tf-btn:disabled { cursor: default; opacity: 0.6; }
  .tf-btn.correct { background: var(--good-soft) !important; border-color: var(--good) !important; color: var(--good) !important; opacity: 1; }
  .tf-btn.wrong { background: var(--accent-soft) !important; border-color: var(--accent) !important; color: var(--accent) !important; opacity: 1; }

  .feedback {
    margin-top: 18px;
    padding: 14px 18px;
    border: 2px solid var(--ink);
    background: var(--paper);
    font-size: 15px;
    line-height: 1.5;
  }
  .feedback.correct { background: var(--good-soft); border-color: var(--good); }
  .feedback.wrong   { background: var(--accent-soft); border-color: var(--accent); }
  .feedback strong {
    display: block;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 13px;
  }
  .feedback.correct strong { color: var(--good); }
  .feedback.wrong   strong { color: var(--accent); }

  .controls {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .btn {
    padding: 12px 22px;
    border: 2px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
    font-family: inherit;
    font-weight: 900;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .btn:hover { background: var(--accent); border-color: var(--accent); }
  .btn.secondary { background: var(--paper); color: var(--ink); }
  .btn.secondary:hover { background: var(--ink); color: var(--paper); }

  .result {
    text-align: center;
    padding: 40px 24px;
  }
  .result-icon {
    font-size: 64px;
    margin-bottom: 12px;
    color: var(--gold);
  }
  .result-score {
    font-size: 48px;
    font-weight: 900;
    color: var(--ink);
    line-height: 1;
    font-family: &#x27;Courier New&#x27;, monospace;
  }
  .result-score .total { color: var(--muted); font-size: 24px; }
  .result-msg { font-size: 18px; margin: 14px 0 24px 0; font-style: italic; }
  .result-grade {
    display: inline-block;
    padding: 8px 18px;
    background: var(--ink);
    color: var(--paper);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 900;
    font-size: 14px;
    margin-bottom: 18px;
  }

  .footer-hint {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    margin-top: 16px;
  }

  @keyframes flashCorrect {
    0% { transform: scale(1); }
    50% { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
  .flash { animation: flashCorrect 0.3s ease; }

// =========================================================
// QUIZ ENGINE
// =========================================================
let state = {
  mode: null,
  questions: [],
  current: 0,
  score: 0,
  answered: false
};

const $quiz = document.getElementById(&#x27;quizArea&#x27;);
const $modes = document.getElementById(&#x27;modeGrid&#x27;);

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i &gt; 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickN(arr, n) { return shuffle(arr).slice(0, n); }

function buildVocabQuiz() {
  return pickN(VOCAB, 10).map(item =&gt; {
    const askForDef = Math.random() &gt; 0.5;
    if (askForDef) {
      const opts = shuffle([item.def, ...item.wrongs]);
      return {
        type: &#x27;mcq&#x27;,
        bigDisplay: item.term,
        prompt: &#x27;Vocabulary&#x27;,
        question: `What does &quot;${item.term}&quot; mean?`,
        options: opts,
        correct: opts.indexOf(item.def),
        explain: `${item.term} = ${item.def}`
      };
    } else {
      const distractorTerms = pickN(VOCAB.filter(d =&gt; d.term !== item.term), 3).map(d =&gt; d.term);
      const opts = shuffle([item.term, ...distractorTerms]);
      return {
        type: &#x27;mcq&#x27;,
        prompt: &#x27;Vocabulary&#x27;,
        question: `Which term means: &quot;${item.def}&quot;?`,
        options: opts,
        correct: opts.indexOf(item.term),
        explain: `${item.term} = ${item.def}`
      };
    }
  });
}

function buildDatesQuiz() {
  return pickN(DATES, 10).map(item =&gt; {
    // Half: given year, pick event. Half: given event, pick year.
    const askEvent = Math.random() &gt; 0.5;
    if (askEvent) {
      const opts = shuffle([item.event, ...item.wrongs]);
      return {
        type: &#x27;mcq&#x27;,
        prompt: &#x27;Dates &amp; events&#x27;,
        bigDisplay: `&lt;span class=&quot;year&quot;&gt;YEAR&lt;/span&gt;${item.year}`,
        question: &#x27;What major event happened in this year?&#x27;,
        options: opts,
        correct: opts.indexOf(item.event),
        explain: `${item.year}: ${item.event}`,
        bigIsHTML: true
      };
    } else {
      const distractorYears = pickN(DATES.filter(d =&gt; d.year !== item.year), 3).map(d =&gt; d.year);
      const opts = shuffle([item.year, ...distractorYears]);
      return {
        type: &#x27;mcq&#x27;,
        prompt: &#x27;Dates &amp; events&#x27;,
        question: `When did this happen: &quot;${item.event}&quot;?`,
        options: opts,
        correct: opts.indexOf(item.year),
        explain: `${item.year}: ${item.event}`
      };
    }
  });
}

function buildMedievalQuiz() {
  return pickN(MEDIEVAL_QS, 10).map(q =&gt; ({
    type: &#x27;mcq&#x27;,
    prompt: &#x27;Medieval England&#x27;,
    question: q.q,
    options: q.options,
    correct: q.correct,
    explain: q.explain
  }));
}

function buildBlackDeathQuiz() {
  return pickN(BLACKDEATH_QS, 10).map(q =&gt; ({
    type: &#x27;mcq&#x27;,
    prompt: &#x27;Black Death &amp; Peasants Revolt&#x27;,
    question: q.q,
    options: q.options,
    correct: q.correct,
    explain: q.explain
  }));
}

function buildTudorQuiz() {
  return pickN(TUDOR_QS, 10).map(q =&gt; ({
    type: &#x27;mcq&#x27;,
    prompt: &#x27;Tudor England&#x27;,
    question: q.q,
    options: q.options,
    correct: q.correct,
    explain: q.explain
  }));
}

function buildTimelineQuiz() {
  return pickN(TIMELINE_SETS, 3).map(set =&gt; ({
    type: &#x27;sequence&#x27;,
    name: set.name,
    events: shuffle([...set.events])
  }));
}

function buildTrueFalseQuiz() {
  return pickN(TRUE_FALSE, 12).map(item =&gt; ({
    type: &#x27;truefalse&#x27;,
    prompt: &#x27;True or false&#x27;,
    question: item.stmt,
    correct: item.answer,
    explain: item.explain
  }));
}

function buildMixedQuiz() {
  const all = [];
  buildVocabQuiz().slice(0, 3).forEach(q =&gt; all.push(q));
  buildDatesQuiz().slice(0, 3).forEach(q =&gt; all.push(q));
  buildMedievalQuiz().slice(0, 3).forEach(q =&gt; all.push(q));
  buildBlackDeathQuiz().slice(0, 2).forEach(q =&gt; all.push(q));
  buildTudorQuiz().slice(0, 2).forEach(q =&gt; all.push(q));
  buildTrueFalseQuiz().slice(0, 2).forEach(q =&gt; all.push(q));
  return shuffle(all);
}

function startQuiz(mode) {
  state.mode = mode;
  state.current = 0;
  state.score = 0;
  state.answered = false;
  if (mode === &#x27;vocab&#x27;) state.questions = buildVocabQuiz();
  else if (mode === &#x27;dates&#x27;) state.questions = buildDatesQuiz();
  else if (mode === &#x27;medieval&#x27;) state.questions = buildMedievalQuiz();
  else if (mode === &#x27;blackdeath&#x27;) state.questions = buildBlackDeathQuiz();
  else if (mode === &#x27;tudor&#x27;) state.questions = buildTudorQuiz();
  else if (mode === &#x27;timeline&#x27;) state.questions = buildTimelineQuiz();
  else if (mode === &#x27;truefalse&#x27;) state.questions = buildTrueFalseQuiz();
  else state.questions = buildMixedQuiz();
  document.querySelectorAll(&#x27;.mode-card&#x27;).forEach(c =&gt; {
    c.classList.toggle(&#x27;active&#x27;, c.dataset.mode === mode);
  });
  renderQuestion();
  document.getElementById(&#x27;quizArea&#x27;).scrollIntoView({ behavior: &#x27;smooth&#x27;, block: &#x27;start&#x27; });
}

function renderQuestion() {
  const total = state.questions.length;
  if (state.current &gt;= total) { renderFinal(); return; }
  const q = state.questions[state.current];

  let body;
  if (q.type === &#x27;mcq&#x27;) body = renderMCQ(q);
  else if (q.type === &#x27;sequence&#x27;) body = renderSequence(q);
  else if (q.type === &#x27;truefalse&#x27;) body = renderTF(q);

  $quiz.innerHTML = `
    &lt;div class=&quot;quiz&quot;&gt;
      &lt;div class=&quot;progress-bar&quot;&gt;
        &lt;span class=&quot;progress-text&quot;&gt;Question ${state.current + 1} / ${total}&lt;/span&gt;
        &lt;span class=&quot;score-pill&quot;&gt;&lt;span class=&quot;accent&quot;&gt;●&lt;/span&gt; Score: ${state.score}/${state.current}&lt;/span&gt;
      &lt;/div&gt;
      ${body}
    &lt;/div&gt;
  `;
  attachHandlers(q);
}

function renderMCQ(q) {
  let big = &#x27;&#x27;;
  if (q.bigDisplay) {
    if (q.bigIsHTML) {
      big = `&lt;div class=&quot;big-display&quot;&gt;&lt;div class=&quot;big-expr&quot;&gt;${q.bigDisplay}&lt;/div&gt;&lt;/div&gt;`;
    } else {
      big = `&lt;div class=&quot;big-display&quot;&gt;&lt;div class=&quot;big-expr&quot;&gt;${q.bigDisplay}&lt;/div&gt;&lt;/div&gt;`;
    }
  }
  const letters = [&#x27;A&#x27;, &#x27;B&#x27;, &#x27;C&#x27;, &#x27;D&#x27;];
  const opts = q.options.map((o, i) =&gt; `
    &lt;button class=&quot;option&quot; data-index=&quot;${i}&quot;&gt;
      &lt;span class=&quot;letter&quot;&gt;${letters[i]}&lt;/span&gt;
      &lt;span&gt;${o}&lt;/span&gt;
    &lt;/button&gt;
  `).join(&#x27;&#x27;);
  return `
    &lt;div class=&quot;question-label&quot;&gt;${q.prompt || &#x27;Question&#x27;}&lt;/div&gt;
    &lt;div class=&quot;question&quot;&gt;${q.question || &#x27;&#x27;}&lt;/div&gt;
    ${big}
    &lt;div class=&quot;options&quot; id=&quot;optionList&quot;&gt;${opts}&lt;/div&gt;
    &lt;div id=&quot;feedbackArea&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;controlArea&quot;&gt;&lt;/div&gt;
  `;
}

function renderTF(q) {
  return `
    &lt;div class=&quot;question-label&quot;&gt;${q.prompt}&lt;/div&gt;
    &lt;div class=&quot;question&quot;&gt;${q.question}&lt;/div&gt;
    &lt;div class=&quot;tf-container&quot; style=&quot;margin-top:18px&quot;&gt;
      &lt;button class=&quot;tf-btn&quot; data-answer=&quot;true&quot;&gt;TRUE&lt;/button&gt;
      &lt;button class=&quot;tf-btn&quot; data-answer=&quot;false&quot;&gt;FALSE&lt;/button&gt;
    &lt;/div&gt;
    &lt;div id=&quot;feedbackArea&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;controlArea&quot;&gt;&lt;/div&gt;
  `;
}

function renderSequence(q) {
  const n = q.events.length;
  const pool = q.events.map((e, i) =&gt; `
    &lt;button class=&quot;seq-step&quot; data-year=&quot;${e.year}&quot; data-text=&quot;${e.text}&quot;&gt;${e.text}&lt;/button&gt;
  `).join(&#x27;&#x27;);
  const slots = q.events.map((_, i) =&gt; `
    &lt;div class=&quot;seq-slot&quot; data-slot=&quot;${i + 1}&quot;&gt;&lt;span class=&quot;slot-num&quot;&gt;${i + 1}&lt;/span&gt;&lt;span class=&quot;slot-content&quot;&gt;&lt;/span&gt;&lt;/div&gt;
  `).join(&#x27;&#x27;);
  return `
    &lt;div class=&quot;question-label&quot;&gt;Timeline — ${q.name}&lt;/div&gt;
    &lt;div class=&quot;question&quot;&gt;Place these events in chronological order (earliest first).&lt;/div&gt;
    &lt;div class=&quot;seq-instructions&quot;&gt;Click an event from the pool to place it in the next empty slot. Click a placed event to remove it. When all are placed, click &quot;Check Answer&quot;.&lt;/div&gt;
    &lt;div class=&quot;seq-target&quot; id=&quot;seqTarget&quot;&gt;${slots}&lt;/div&gt;
    &lt;div class=&quot;seq-pool&quot; id=&quot;seqPool&quot;&gt;${pool}&lt;/div&gt;
    &lt;div class=&quot;controls&quot;&gt;
      &lt;button class=&quot;btn&quot; id=&quot;checkSeqBtn&quot; disabled&gt;Check Answer&lt;/button&gt;
    &lt;/div&gt;
    &lt;div id=&quot;feedbackArea&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;controlArea&quot;&gt;&lt;/div&gt;
  `;
}

function attachHandlers(q) {
  if (q.type === &#x27;mcq&#x27;) {
    document.querySelectorAll(&#x27;.option&#x27;).forEach(btn =&gt; {
      btn.addEventListener(&#x27;click&#x27;, () =&gt; handleMCQ(btn, q));
    });
  } else if (q.type === &#x27;truefalse&#x27;) {
    document.querySelectorAll(&#x27;.tf-btn&#x27;).forEach(btn =&gt; {
      btn.addEventListener(&#x27;click&#x27;, () =&gt; handleTF(btn, q));
    });
  } else if (q.type === &#x27;sequence&#x27;) {
    setupSequenceHandlers(q);
  }
}

function handleMCQ(btn, q) {
  if (state.answered) return;
  state.answered = true;
  const idx = parseInt(btn.dataset.index);
  const correct = idx === q.correct;
  if (correct) state.score++;
  document.querySelectorAll(&#x27;.option&#x27;).forEach((b, i) =&gt; {
    b.disabled = true;
    if (i === q.correct) b.classList.add(&#x27;correct&#x27;);
    else if (i === idx) b.classList.add(&#x27;wrong&#x27;);
  });
  showFeedback(correct, q.explain || &#x27;&#x27;);
  showNextButton();
}

function handleTF(btn, q) {
  if (state.answered) return;
  state.answered = true;
  const ans = btn.dataset.answer === &#x27;true&#x27;;
  const correct = ans === q.correct;
  if (correct) state.score++;
  document.querySelectorAll(&#x27;.tf-btn&#x27;).forEach(b =&gt; {
    b.disabled = true;
    const bAns = b.dataset.answer === &#x27;true&#x27;;
    if (bAns === q.correct) b.classList.add(&#x27;correct&#x27;);
    else if (bAns === ans) b.classList.add(&#x27;wrong&#x27;);
  });
  showFeedback(correct, q.explain || &#x27;&#x27;);
  showNextButton();
}

let seqState = { placed: {}, items: [] };

function setupSequenceHandlers(q) {
  seqState = { placed: {}, items: q.events };
  document.querySelectorAll(&#x27;#seqPool .seq-step&#x27;).forEach(btn =&gt; {
    btn.addEventListener(&#x27;click&#x27;, () =&gt; {
      if (state.answered) return;
      if (btn.classList.contains(&#x27;placed&#x27;)) return;
      const n = q.events.length;
      for (let i = 1; i &lt;= n; i++) {
        if (!seqState.placed[i]) {
          seqState.placed[i] = { year: parseInt(btn.dataset.year), text: btn.dataset.text };
          const slot = document.querySelector(`.seq-slot[data-slot=&quot;${i}&quot;]`);
          slot.querySelector(&#x27;.slot-content&#x27;).textContent = btn.textContent;
          slot.classList.add(&#x27;filled&#x27;);
          slot.dataset.year = btn.dataset.year;
          btn.classList.add(&#x27;placed&#x27;);
          break;
        }
      }
      checkAllPlaced(q);
    });
  });
  document.querySelectorAll(&#x27;.seq-slot&#x27;).forEach(slot =&gt; {
    slot.addEventListener(&#x27;click&#x27;, () =&gt; {
      if (state.answered) return;
      if (!slot.classList.contains(&#x27;filled&#x27;)) return;
      const slotNum = parseInt(slot.dataset.slot);
      const year = parseInt(slot.dataset.year);
      delete seqState.placed[slotNum];
      slot.querySelector(&#x27;.slot-content&#x27;).textContent = &#x27;&#x27;;
      slot.classList.remove(&#x27;filled&#x27;);
      const poolBtn = document.querySelector(`#seqPool .seq-step[data-year=&quot;${year}&quot;]`);
      if (poolBtn) poolBtn.classList.remove(&#x27;placed&#x27;);
      compactSlots(q);
      checkAllPlaced(q);
    });
  });
  document.getElementById(&#x27;checkSeqBtn&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; checkSequence(q));
}

function compactSlots(q) {
  const n = q.events.length;
  const placedItems = [];
  for (let i = 1; i &lt;= n; i++) {
    if (seqState.placed[i]) placedItems.push(seqState.placed[i]);
  }
  seqState.placed = {};
  for (let i = 0; i &lt; placedItems.length; i++) {
    seqState.placed[i + 1] = placedItems[i];
  }
  for (let i = 1; i &lt;= n; i++) {
    const slot = document.querySelector(`.seq-slot[data-slot=&quot;${i}&quot;]`);
    if (seqState.placed[i]) {
      slot.querySelector(&#x27;.slot-content&#x27;).textContent = seqState.placed[i].text;
      slot.classList.add(&#x27;filled&#x27;);
      slot.dataset.year = seqState.placed[i].year;
    } else {
      slot.querySelector(&#x27;.slot-content&#x27;).textContent = &#x27;&#x27;;
      slot.classList.remove(&#x27;filled&#x27;);
      delete slot.dataset.year;
    }
  }
}

function checkAllPlaced(q) {
  const n = q.events.length;
  const allFilled = Object.keys(seqState.placed).length === n;
  document.getElementById(&#x27;checkSeqBtn&#x27;).disabled = !allFilled;
}

function checkSequence(q) {
  if (state.answered) return;
  state.answered = true;
  const n = q.events.length;
  const sortedYears = [...q.events].sort((a, b) =&gt; a.year - b.year);
  let allCorrect = true;
  for (let i = 1; i &lt;= n; i++) {
    const slot = document.querySelector(`.seq-slot[data-slot=&quot;${i}&quot;]`);
    if (seqState.placed[i].year === sortedYears[i - 1].year) {
      slot.classList.add(&#x27;correct&#x27;);
    } else {
      slot.classList.add(&#x27;wrong&#x27;);
      allCorrect = false;
    }
  }
  if (allCorrect) state.score++;
  document.getElementById(&#x27;checkSeqBtn&#x27;).disabled = true;
  let html = &#x27;&#x27;;
  if (!allCorrect) {
    html = &#x27;&lt;strong&gt;Correct order:&lt;/strong&gt;&#x27;;
    html += &#x27;&lt;ol style=&quot;margin-top:8px;padding-left:20px&quot;&gt;&#x27;;
    sortedYears.forEach(s =&gt; {
      html += `&lt;li style=&quot;margin-bottom:4px&quot;&gt;&lt;b&gt;${s.year}&lt;/b&gt; — ${s.text}&lt;/li&gt;`;
    });
    html += &#x27;&lt;/ol&gt;&#x27;;
  } else {
    html = `Perfect — that\u2019s the exact chronological order. The earliest is ${sortedYears[0].year} and the latest is ${sortedYears[n-1].year}.`;
  }
  showFeedback(allCorrect, html);
  showNextButton();
}

function showFeedback(correct, html) {
  const fa = document.getElementById(&#x27;feedbackArea&#x27;);
  fa.innerHTML = `
    &lt;div class=&quot;feedback ${correct ? &#x27;correct&#x27; : &#x27;wrong&#x27;} flash&quot;&gt;
      &lt;strong&gt;${correct ? &#x27;\u2713 Correct!&#x27; : &#x27;\u2717 Not quite&#x27;}&lt;/strong&gt;
      ${html}
    &lt;/div&gt;
  `;
}

function showNextButton() {
  const ca = document.getElementById(&#x27;controlArea&#x27;);
  const isLast = state.current === state.questions.length - 1;
  ca.innerHTML = `
    &lt;div class=&quot;controls&quot;&gt;
      &lt;button class=&quot;btn&quot; id=&quot;nextBtn&quot;&gt;${isLast ? &#x27;See Results&#x27; : &#x27;Next Question \u2192&#x27;}&lt;/button&gt;
    &lt;/div&gt;
  `;
  const next = document.getElementById(&#x27;nextBtn&#x27;);
  next.addEventListener(&#x27;click&#x27;, () =&gt; {
    state.current++;
    state.answered = false;
    renderQuestion();
  });
  next.focus();
}

function renderFinal() {
  const total = state.questions.length;
  const pct = Math.round((state.score / total) * 100);
  let grade, msg, icon;
  if (pct &gt;= 90)      { grade = &quot;Outstanding&quot;; msg = &quot;Top mark territory \u2014 you&#x27;re exam-ready!&quot;; icon = &quot;\u265B&quot;; }
  else if (pct &gt;= 75) { grade = &quot;Strong&quot;;      msg = &quot;Solid grasp. Try Mixed Test for full simulation.&quot;; icon = &quot;\u2713&quot;; }
  else if (pct &gt;= 55) { grade = &quot;Developing&quot;;  msg = &quot;Re-do this mode and check the cheat sheet for tricky parts.&quot;; icon = &quot;\u2197&quot;; }
  else                { grade = &quot;Keep going&quot;;  msg = &quot;Don&#x27;t worry \u2014 open the cheat sheet, redo this mode slowly.&quot;; icon = &quot;\u270D&quot;; }

  $quiz.innerHTML = `
    &lt;div class=&quot;quiz result&quot;&gt;
      &lt;div class=&quot;result-icon&quot;&gt;${icon}&lt;/div&gt;
      &lt;div class=&quot;result-grade&quot;&gt;${grade}&lt;/div&gt;
      &lt;div class=&quot;result-score&quot;&gt;${state.score}&lt;span class=&quot;total&quot;&gt;/${total}&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;result-msg&quot;&gt;${msg}&lt;/div&gt;
      &lt;div style=&quot;display:flex;gap:10px;justify-content:center;flex-wrap:wrap&quot;&gt;
        &lt;button class=&quot;btn&quot; onclick=&quot;startQuiz(&#x27;${state.mode}&#x27;)&quot;&gt;Try Again&lt;/button&gt;
        &lt;button class=&quot;btn secondary&quot; onclick=&quot;document.getElementById(&#x27;quizArea&#x27;).innerHTML=&#x27;&#x27;; document.querySelectorAll(&#x27;.mode-card&#x27;).forEach(c=&gt;c.classList.remove(&#x27;active&#x27;))&quot;&gt;Pick Another Mode&lt;/button&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  `;
}

$modes.querySelectorAll(&#x27;.mode-card&#x27;).forEach(card =&gt; {
  card.addEventListener(&#x27;click&#x27;, () =&gt; startQuiz(card.dataset.mode));
});
&lt;/script&gt;

&lt;!-- ============ OVERVIEW ============ --&gt;
&lt;div id=&quot;overview&quot; class=&quot;tab-content active&quot;&gt;
    &lt;h2&gt;📚 整年度概覽&lt;/h2&gt;

    &lt;div class=&quot;formula&quot;&gt;
        🇩🇪 Year 7 German – Knowledge Organiser&lt;br&gt;
        &lt;span style=&quot;font-size: 0.85em; opacity: 0.9;&quot;&gt;8 個 Units · 從問候到表達意見&lt;/span&gt;
    &lt;/div&gt;

    &lt;table&gt;
        &lt;tr&gt;&lt;th width=&quot;10%&quot;&gt;Page&lt;/th&gt;&lt;th width=&quot;20%&quot;&gt;學期&lt;/th&gt;&lt;th&gt;內容&lt;/th&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;1&lt;/td&gt;&lt;td&gt;Autumn 1&lt;/td&gt;&lt;td&gt;Vocab：問候、個性、年齡&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;2&lt;/td&gt;&lt;td&gt;Autumn 1&lt;/td&gt;&lt;td&gt;Grammar：名詞性別、haben、sein、wohnen&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;3&lt;/td&gt;&lt;td&gt;Autumn 2&lt;/td&gt;&lt;td&gt;Vocab：家人、寵物、外貌描述&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;4&lt;/td&gt;&lt;td&gt;Autumn 2&lt;/td&gt;&lt;td&gt;Grammar：程度副詞 (sehr, ziemlich)、規則動詞&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;5&lt;/td&gt;&lt;td&gt;Spring 1&lt;/td&gt;&lt;td&gt;Vocab：運動、意見&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;6&lt;/td&gt;&lt;td&gt;Spring 1&lt;/td&gt;&lt;td&gt;Grammar：用 gern / nicht gern 表達喜好&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;7&lt;/td&gt;&lt;td&gt;Spring 2&lt;/td&gt;&lt;td&gt;Vocab：網路活動、頻率詞&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;8&lt;/td&gt;&lt;td&gt;Spring 2&lt;/td&gt;&lt;td&gt;Grammar：weil (because) — 動詞放句尾！&lt;/td&gt;&lt;/tr&gt;
    &lt;/table&gt;

    &lt;h3&gt;🎯 整年最關鍵的 5 件事&lt;/h3&gt;
    &lt;div class=&quot;note-box&quot;&gt;
        &lt;strong&gt;1️⃣ 名詞首字母大寫&lt;/strong&gt; — 所有名詞 (Nouns) 開頭都要大寫！&lt;br&gt;
        &lt;em&gt;Hund, Katze, Buch, Mutter, Vater...&lt;/em&gt;
    &lt;/div&gt;

    &lt;div class=&quot;note-box&quot;&gt;
        &lt;strong&gt;2️⃣ 名詞有 3 種性別&lt;/strong&gt; — der (陽), die (陰), das (中)&lt;br&gt;
        &lt;em&gt;der Hund, die Katze, das Buch&lt;/em&gt;
    &lt;/div&gt;

    &lt;div class=&quot;note-box&quot;&gt;
        &lt;strong&gt;3️⃣ 動詞會根據主詞變化&lt;/strong&gt;&lt;br&gt;
        &lt;em&gt;ich spiel&lt;u&gt;e&lt;/u&gt;, du spiel&lt;u&gt;st&lt;/u&gt;, er spiel&lt;u&gt;t&lt;/u&gt;, wir spiel&lt;u&gt;en&lt;/u&gt;&lt;/em&gt;
    &lt;/div&gt;

    &lt;div class=&quot;warning-box&quot;&gt;
        &lt;strong&gt;4️⃣ weil 句型 — Y7 最重要的考點！&lt;/strong&gt;&lt;br&gt;
        weil 把動詞「踢」到句尾，前面要逗號！&lt;br&gt;
        &lt;em&gt;Ich gehe gern in den Park, weil es super &lt;u&gt;ist&lt;/u&gt;.&lt;/em&gt;
    &lt;/div&gt;

    &lt;div class=&quot;tip-box&quot;&gt;
        &lt;strong&gt;5️⃣ 用程度副詞拿高分&lt;/strong&gt;&lt;br&gt;
        sehr (很) · ziemlich (相當) · ein bisschen (有點) · wirklich (真的)&lt;br&gt;
        &lt;em&gt;Mein Bruder ist &lt;strong&gt;ein bisschen&lt;/strong&gt; frech.&lt;/em&gt;
    &lt;/div&gt;

    &lt;h3&gt;🏆 高分公式&lt;/h3&gt;
    &lt;div class=&quot;formula&quot; style=&quot;font-size: 1em;&quot;&gt;
        基本句 + &lt;strong&gt;程度副詞&lt;/strong&gt; + &lt;strong&gt;weil 子句&lt;/strong&gt; + &lt;strong&gt;頻率詞&lt;/strong&gt; = 高分！
    &lt;/div&gt;
    &lt;p style=&quot;margin-top: 10px;&quot;&gt;
        &lt;strong&gt;例子：&lt;/strong&gt;&lt;br&gt;
        ⭐ Easy: &lt;span class=&quot;de&quot;&gt;Ich spiele Fußball.&lt;/span&gt;&lt;br&gt;
        ⭐⭐ Better: &lt;span class=&quot;de&quot;&gt;Ich spiele gern Fußball.&lt;/span&gt;&lt;br&gt;
        ⭐⭐⭐ Best: &lt;span class=&quot;de&quot;&gt;Ich spiele &lt;u&gt;jeden Tag&lt;/u&gt; gern Fußball, &lt;u&gt;weil&lt;/u&gt; es &lt;u&gt;wirklich&lt;/u&gt; super &lt;u&gt;ist&lt;/u&gt;.&lt;/span&gt;
    &lt;/p&gt;
&lt;/div&gt;

&lt;!-- ============ GRAMMAR ============ --&gt;
&lt;div id=&quot;grammar&quot; class=&quot;tab-content&quot;&gt;
    &lt;h2&gt;📐 文法重點&lt;/h2&gt;

    &lt;h3&gt;1️⃣ 名詞性別 (Noun Gender)&lt;/h3&gt;
    &lt;div class=&quot;note-box&quot;&gt;
        德語名詞分 3 種性別。記住「the」和「a」會跟著變！
    &lt;/div&gt;
    &lt;table&gt;
        &lt;tr&gt;&lt;th&gt;性別&lt;/th&gt;&lt;th&gt;&quot;the&quot;&lt;/th&gt;&lt;th&gt;&quot;a/an&quot;&lt;/th&gt;&lt;th&gt;例子&lt;/th&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;陽性 Masc.&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;der&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;ein&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;der Hund&lt;/span&gt; (狗)&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;陰性 Fem.&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;die&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;eine&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;die Katze&lt;/span&gt; (貓)&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;中性 Neuter&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;das&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;ein&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;das Buch&lt;/span&gt; (書)&lt;/td&gt;&lt;/tr&gt;
    &lt;/table&gt;

    &lt;h3&gt;2️⃣ 三大不規則動詞&lt;/h3&gt;

    &lt;div class=&quot;verb-section&quot;&gt;
        &lt;h4 style=&quot;color: #c53030;&quot;&gt;&lt;span class=&quot;de&quot;&gt;haben&lt;/span&gt; = to have (有)&lt;/h4&gt;
        &lt;table class=&quot;conjugation-table&quot;&gt;
            &lt;tr&gt;&lt;th&gt;德語&lt;/th&gt;&lt;th&gt;英文&lt;/th&gt;&lt;th&gt;中文&lt;/th&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;ich habe&lt;/span&gt;&lt;/td&gt;&lt;td&gt;I have&lt;/td&gt;&lt;td&gt;我有&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;du hast&lt;/span&gt;&lt;/td&gt;&lt;td&gt;you have&lt;/td&gt;&lt;td&gt;你有&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;er/sie hat&lt;/span&gt;&lt;/td&gt;&lt;td&gt;he/she has&lt;/td&gt;&lt;td&gt;他/她有&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;wir haben&lt;/span&gt;&lt;/td&gt;&lt;td&gt;we have&lt;/td&gt;&lt;td&gt;我們有&lt;/td&gt;&lt;/tr&gt;
        &lt;/table&gt;
    &lt;/div&gt;

    &lt;div class=&quot;verb-section&quot;&gt;
        &lt;h4 style=&quot;color: #c53030;&quot;&gt;&lt;span class=&quot;de&quot;&gt;sein&lt;/span&gt; = to be (是)&lt;/h4&gt;
        &lt;table class=&quot;conjugation-table&quot;&gt;
            &lt;tr&gt;&lt;th&gt;德語&lt;/th&gt;&lt;th&gt;英文&lt;/th&gt;&lt;th&gt;中文&lt;/th&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;ich bin&lt;/span&gt;&lt;/td&gt;&lt;td&gt;I am&lt;/td&gt;&lt;td&gt;我是&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;du bist&lt;/span&gt;&lt;/td&gt;&lt;td&gt;you are&lt;/td&gt;&lt;td&gt;你是&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;er/sie ist&lt;/span&gt;&lt;/td&gt;&lt;td&gt;he/she is&lt;/td&gt;&lt;td&gt;他/她是&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;wir sind&lt;/span&gt;&lt;/td&gt;&lt;td&gt;we are&lt;/td&gt;&lt;td&gt;我們是&lt;/td&gt;&lt;/tr&gt;
        &lt;/table&gt;
    &lt;/div&gt;

    &lt;h3&gt;3️⃣ 規則動詞 (Regular Verbs)&lt;/h3&gt;
    &lt;div class=&quot;note-box&quot;&gt;
        所有規則動詞都遵循這個規則：去掉 &lt;strong&gt;-en&lt;/strong&gt;，加上 &lt;strong&gt;-e / -st / -t / -en&lt;/strong&gt;
    &lt;/div&gt;
    &lt;div class=&quot;verb-section&quot;&gt;
        &lt;h4 style=&quot;color: #c53030;&quot;&gt;&lt;span class=&quot;de&quot;&gt;spielen&lt;/span&gt; = to play (玩)&lt;/h4&gt;
        &lt;table class=&quot;conjugation-table&quot;&gt;
            &lt;tr&gt;&lt;th&gt;德語&lt;/th&gt;&lt;th&gt;英文&lt;/th&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;ich spiel&lt;u&gt;e&lt;/u&gt;&lt;/span&gt;&lt;/td&gt;&lt;td&gt;I play&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;du spiel&lt;u&gt;st&lt;/u&gt;&lt;/span&gt;&lt;/td&gt;&lt;td&gt;you play&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;er/sie spiel&lt;u&gt;t&lt;/u&gt;&lt;/span&gt;&lt;/td&gt;&lt;td&gt;he/she plays&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;wir spiel&lt;u&gt;en&lt;/u&gt;&lt;/span&gt;&lt;/td&gt;&lt;td&gt;we play&lt;/td&gt;&lt;/tr&gt;
        &lt;/table&gt;
        &lt;p style=&quot;margin-top: 8px; font-size: 0.9em; color: #4a5568;&quot;&gt;同樣規則的動詞：&lt;span class=&quot;de&quot;&gt;wohnen, machen, hören, lieben, lernen&lt;/span&gt; 等。&lt;/p&gt;
    &lt;/div&gt;

    &lt;h3&gt;4️⃣ ⚠️ weil = because (動詞放句尾！)&lt;/h3&gt;
    &lt;div class=&quot;warning-box&quot;&gt;
        &lt;strong&gt;🚨 weil 是「邪惡」的字 — 它把動詞踢到句尾！&lt;/strong&gt;&lt;br&gt;
        而且 weil 前面一定要有&lt;strong&gt;逗號&lt;/strong&gt;！
    &lt;/div&gt;

    &lt;table&gt;
        &lt;tr&gt;&lt;th&gt;沒用 weil ✅&lt;/th&gt;&lt;th&gt;用 weil ⚠️&lt;/th&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;Es &lt;u&gt;ist&lt;/u&gt; super.&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;..., weil es super &lt;u&gt;ist&lt;/u&gt;.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;Ich &lt;u&gt;finde&lt;/u&gt; es toll.&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;..., weil ich es toll &lt;u&gt;finde&lt;/u&gt;.&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
    &lt;/table&gt;

    &lt;div class=&quot;tip-box&quot;&gt;
        &lt;strong&gt;💡 完整例子：&lt;/strong&gt;&lt;br&gt;
        ❌ Wrong: &lt;span class=&quot;de&quot;&gt;Ich gehe gern in den Park weil es ist super.&lt;/span&gt;&lt;br&gt;
        ✅ Right: &lt;span class=&quot;de&quot;&gt;Ich gehe gern in den Park, weil es super &lt;u&gt;ist&lt;/u&gt;.&lt;/span&gt;&lt;br&gt;
        &lt;em&gt;(I like going to the park because it is super)&lt;/em&gt;
    &lt;/div&gt;

    &lt;h3&gt;5️⃣ 程度副詞 (Intensifiers)&lt;/h3&gt;
    &lt;table&gt;
        &lt;tr&gt;&lt;th&gt;德語&lt;/th&gt;&lt;th&gt;英文&lt;/th&gt;&lt;th&gt;中文&lt;/th&gt;&lt;th&gt;例子&lt;/th&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;sehr&lt;/span&gt;&lt;/td&gt;&lt;td&gt;very&lt;/td&gt;&lt;td&gt;非常&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;sehr lustig&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;ziemlich&lt;/span&gt;&lt;/td&gt;&lt;td&gt;quite&lt;/td&gt;&lt;td&gt;相當&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;ziemlich faul&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;ein bisschen&lt;/span&gt;&lt;/td&gt;&lt;td&gt;a bit&lt;/td&gt;&lt;td&gt;有點&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;ein bisschen schüchtern&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;wirklich&lt;/span&gt;&lt;/td&gt;&lt;td&gt;really&lt;/td&gt;&lt;td&gt;真的&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;wirklich nett&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;nicht&lt;/span&gt;&lt;/td&gt;&lt;td&gt;not&lt;/td&gt;&lt;td&gt;不&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;nicht laut&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;
    &lt;/table&gt;

    &lt;h3&gt;6️⃣ gern / nicht gern (喜歡/不喜歡)&lt;/h3&gt;
    &lt;div class=&quot;note-box&quot;&gt;
        在動詞後加 &lt;strong&gt;gern&lt;/strong&gt; 表示「喜歡做」；加 &lt;strong&gt;nicht gern&lt;/strong&gt; 表示「不喜歡做」
    &lt;/div&gt;

    &lt;table&gt;
        &lt;tr&gt;&lt;th&gt;德語&lt;/th&gt;&lt;th&gt;中文&lt;/th&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;Ich spiele &lt;u&gt;gern&lt;/u&gt; Fußball.&lt;/span&gt;&lt;/td&gt;&lt;td&gt;我喜歡踢足球&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;Ich spiele &lt;u&gt;nicht gern&lt;/u&gt; Tennis.&lt;/span&gt;&lt;/td&gt;&lt;td&gt;我不喜歡打網球&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;span class=&quot;de&quot;&gt;Ich esse &lt;u&gt;gern&lt;/u&gt; Schokolade.&lt;/span&gt;&lt;/td&gt;&lt;td&gt;我喜歡吃巧克力&lt;/td&gt;&lt;/tr&gt;
    &lt;/table&gt;
&lt;/div&gt;

&lt;!-- ============ SENTENCE BUILDER ============ --&gt;
&lt;div id=&quot;builder&quot; class=&quot;tab-content&quot;&gt;
    &lt;h2&gt;🛠️ 造句練習器 / Sentence Builder&lt;/h2&gt;
    &lt;p&gt;跟著步驟造一個漂亮的德語句子！&lt;/p&gt;

    &lt;div class=&quot;builder-section&quot;&gt;
        &lt;h3&gt;步驟 1: 選一個運動&lt;/h3&gt;
        &lt;select id=&quot;sport-select&quot; onchange=&quot;updateSentence()&quot;&gt;
            &lt;option value=&quot;&quot;&gt;-- 選擇 --&lt;/option&gt;
            &lt;option value=&quot;Fußball&quot;&gt;Fußball (足球)&lt;/option&gt;
            &lt;option value=&quot;Basketball&quot;&gt;Basketball (籃球)&lt;/option&gt;
            &lt;option value=&quot;Tennis&quot;&gt;Tennis (網球)&lt;/option&gt;
            &lt;option value=&quot;Volleyball&quot;&gt;Volleyball (排球)&lt;/option&gt;
            &lt;option value=&quot;Eishockey&quot;&gt;Eishockey (冰球)&lt;/option&gt;
            &lt;option value=&quot;Tischtennis&quot;&gt;Tischtennis (桌球)&lt;/option&gt;
        &lt;/select&gt;

        &lt;h3&gt;步驟 2: 喜歡 還是 不喜歡？&lt;/h3&gt;
        &lt;select id=&quot;like-select&quot; onchange=&quot;updateSentence()&quot;&gt;
            &lt;option value=&quot;gern&quot;&gt;gern (喜歡)&lt;/option&gt;
            &lt;option value=&quot;nicht gern&quot;&gt;nicht gern (不喜歡)&lt;/option&gt;
        &lt;/select&gt;

        &lt;h3&gt;步驟 3: 多常做？&lt;/h3&gt;
        &lt;select id=&quot;freq-select&quot; onchange=&quot;updateSentence()&quot;&gt;
            &lt;option value=&quot;&quot;&gt;-- 不選頻率 --&lt;/option&gt;
            &lt;option value=&quot;jeden Tag&quot;&gt;jeden Tag (每天)&lt;/option&gt;
            &lt;option value=&quot;manchmal&quot;&gt;manchmal (有時)&lt;/option&gt;
            &lt;option value=&quot;oft&quot;&gt;oft (常常)&lt;/option&gt;
            &lt;option value=&quot;nie&quot;&gt;nie (從不)&lt;/option&gt;
        &lt;/select&gt;

        &lt;h3&gt;步驟 4: 為什麼？(用 weil)&lt;/h3&gt;
        &lt;select id=&quot;reason-select&quot; onchange=&quot;updateSentence()&quot;&gt;
            &lt;option value=&quot;&quot;&gt;-- 不選原因 --&lt;/option&gt;
            &lt;option value=&quot;es super ist&quot;&gt;es super ist (它很棒)&lt;/option&gt;
            &lt;option value=&quot;es toll ist&quot;&gt;es toll ist (它很好)&lt;/option&gt;
            &lt;option value=&quot;es interessant ist&quot;&gt;es interessant ist (它很有趣)&lt;/option&gt;
            &lt;option value=&quot;es langweilig ist&quot;&gt;es langweilig ist (它無聊)&lt;/option&gt;
            &lt;option value=&quot;es nervig ist&quot;&gt;es nervig ist (它煩人)&lt;/option&gt;
            &lt;option value=&quot;ich es furchtbar finde&quot;&gt;ich es furchtbar finde (我覺得糟糕)&lt;/option&gt;
        &lt;/select&gt;

// ============ SENTENCE BUILDER ============
function updateSentence() {
    const sport = document.getElementById(&#x27;sport-select&#x27;).value;
    const like = document.getElementById(&#x27;like-select&#x27;).value;
    const freq = document.getElementById(&#x27;freq-select&#x27;).value;
    const reason = document.getElementById(&#x27;reason-select&#x27;).value;

    const out = document.getElementById(&#x27;sentence-output&#x27;);
    const trans = document.getElementById(&#x27;sentence-translation&#x27;);

    if (!sport) {
        out.textContent = &#x27;👇 開始選擇上面的選項，這裡會顯示完整的句子...&#x27;;
        trans.textContent = &#x27;&#x27;;
        return;
    }

    let sentence = &#x27;Ich spiele&#x27;;
    let chineseTrans = &#x27;我&#x27;;

    if (freq) {
        sentence += &#x27; &#x27; + freq;
        const freqMap = {&#x27;jeden Tag&#x27;:&#x27;每天&#x27;, &#x27;manchmal&#x27;:&#x27;有時&#x27;, &#x27;oft&#x27;:&#x27;常常&#x27;, &#x27;nie&#x27;:&#x27;從不&#x27;};
        chineseTrans += (freqMap[freq] || freq);
    }

    sentence += &#x27; &#x27; + like + &#x27; &#x27; + sport;
    chineseTrans += (like === &#x27;gern&#x27; ? &#x27;喜歡玩&#x27; : &#x27;不喜歡玩&#x27;) + sport;

    if (reason) {
        sentence += &#x27;, weil &#x27; + reason;
        const reasonMap = {
            &#x27;es super ist&#x27;: &#x27;它很棒&#x27;,
            &#x27;es toll ist&#x27;: &#x27;它很好&#x27;,
            &#x27;es interessant ist&#x27;: &#x27;它有趣&#x27;,
            &#x27;es langweilig ist&#x27;: &#x27;它無聊&#x27;,
            &#x27;es nervig ist&#x27;: &#x27;它煩人&#x27;,
            &#x27;ich es furchtbar finde&#x27;: &#x27;我覺得糟糕&#x27;
        };
        chineseTrans += &#x27;，因為&#x27; + (reasonMap[reason] || reason);
    }

    sentence += &#x27;.&#x27;;
    chineseTrans += &#x27;。&#x27;;

    out.innerHTML = `🇩🇪 &lt;strong&gt;${sentence}&lt;/strong&gt;`;
    trans.textContent = &#x27;中文：&#x27; + chineseTrans;
}

let currentQuestion = 0;
let score = 0;
let selected = -1;

function loadQuestion() {
    const q = quizData[currentQuestion];
    document.getElementById(&#x27;q-text&#x27;).innerHTML = q.q;
    document.getElementById(&#x27;q-zh&#x27;).textContent = q.zh;
    document.getElementById(&#x27;q-current&#x27;).textContent = currentQuestion + 1;
    document.getElementById(&#x27;q-total&#x27;).textContent = quizData.length;

    const optsEl = document.getElementById(&#x27;q-options&#x27;);
    optsEl.innerHTML = &#x27;&#x27;;
    q.options.forEach((opt, idx) =&gt; {
        const li = document.createElement(&#x27;li&#x27;);
        li.innerHTML = String.fromCharCode(65 + idx) + &#x27;. &#x27; + opt;
        li.onclick = () =&gt; selectOption(idx, li);
        optsEl.appendChild(li);
    });

    document.getElementById(&#x27;feedback&#x27;).classList.remove(&#x27;show&#x27;, &#x27;correct&#x27;, &#x27;wrong&#x27;);
    document.getElementById(&#x27;next-btn&#x27;).disabled = true;
    document.getElementById(&#x27;progress-bar&#x27;).style.width = ((currentQuestion) / quizData.length * 100) + &#x27;%&#x27;;
    selected = -1;
}

function selectOption(idx, el) {
    if (selected !== -1) return;
    selected = idx;

    const q = quizData[currentQuestion];
    const items = document.querySelectorAll(&#x27;.options-list li&#x27;);
    const feedback = document.getElementById(&#x27;feedback&#x27;);

    items.forEach((item, i) =&gt; {
        item.style.cursor = &#x27;default&#x27;;
        if (i === q.correct) item.classList.add(&#x27;correct&#x27;);
        if (i === idx &amp;&amp; i !== q.correct) item.classList.add(&#x27;wrong&#x27;);
    });

    if (idx === q.correct) {
        score++;
        feedback.className = &#x27;quiz-feedback correct show&#x27;;
        feedback.innerHTML = &#x27;&lt;strong&gt;✅ 答對了！&lt;/strong&gt; &#x27; + q.explain;
    } else {
        feedback.className = &#x27;quiz-feedback wrong show&#x27;;
        feedback.innerHTML = &#x27;&lt;strong&gt;❌ 答錯了。&lt;/strong&gt; &#x27; + q.explain;
    }

    document.getElementById(&#x27;next-btn&#x27;).disabled = false;
    if (currentQuestion === quizData.length - 1) {
        document.getElementById(&#x27;next-btn&#x27;).textContent = &#x27;查看結果 →&#x27;;
    }
}

function nextQuestion() {
    currentQuestion++;
    if (currentQuestion &gt;= quizData.length) {
        showResults();
    } else {
        loadQuestion();
    }
}

function showResults() {
    document.getElementById(&#x27;quiz-screen&#x27;).style.display = &#x27;none&#x27;;
    document.getElementById(&#x27;results-screen&#x27;).style.display = &#x27;block&#x27;;
    document.getElementById(&#x27;final-score&#x27;).textContent = score;

    let msg;
    if (score === 15) msg = &#x27;🌟 完美！你完全掌握了 Y7 德語！&#x27;;
    else if (score &gt;= 12) msg = &#x27;✨ 太棒了！你的程度很好！&#x27;;
    else if (score &gt;= 9) msg = &#x27;👍 不錯！再複習一下文法就完美了！&#x27;;
    else if (score &gt;= 6) msg = &#x27;📚 加油！多看 cheat sheet，再來一次！&#x27;;
    else msg = &#x27;💪 別灰心！從概覽開始重新看，你會進步的！&#x27;;

    document.getElementById(&#x27;result-message&#x27;).textContent = msg;
}

function restartQuiz() {
    currentQuestion = 0;
    score = 0;
    document.getElementById(&#x27;quiz-screen&#x27;).style.display = &#x27;block&#x27;;
    document.getElementById(&#x27;results-screen&#x27;).style.display = &#x27;none&#x27;;
    document.getElementById(&#x27;next-btn&#x27;).textContent = &#x27;下一題 →&#x27;;
    loadQuestion();
}

loadQuestion();

      const target = card.dataset.target;
      const panel = document.getElementById('panel-' + target);
      if (!panel) return;
      panel.hidden = false;
      body.classList.add('in-panel');
      window.scrollTo(0, 0);
    });
  });

  document.querySelectorAll('[data-back]').forEach(btn => {
    btn.addEventListener('click', () => {
      // hide all panels
      document.querySelectorAll('.panel').forEach(p => p.hidden = true);
      body.classList.remove('in-panel');
      window.scrollTo(0, 0);
    });
  });
</script>
