function startQuiz(mode) {
  state.mode = mode;
  state.current = 0;
  state.score = 0;
  state.answered = false;
  state.dragOrder = null;
  if (mode === &#x27;vocab1&#x27;) state.questions = buildVocab1Quiz();
  else if (mode === &#x27;animalplant&#x27;) state.questions = buildAnimalPlantQuiz();
  else if (mode === &#x27;functions&#x27;) state.questions = buildFunctionsQuiz();
  else if (mode === &#x27;microscope&#x27;) state.questions = buildMicroscopeQuiz();
  else if (mode === &#x27;slidesteps&#x27;) state.questions = buildSlideStepsQuiz();
  else if (mode === &#x27;diffusion&#x27;) state.questions = buildDiffusionQuiz();
  else if (mode === &#x27;specialised&#x27;) state.questions = buildSpecialisedQuiz();
  else if (mode === &#x27;vocab2&#x27;) state.questions = buildVocab2Quiz();
  else if (mode === &#x27;foodchain&#x27;) state.questions = buildFoodchainQuiz();
  else if (mode === &#x27;bioaccum&#x27;) state.questions = buildBioaccumQuiz();
  else if (mode === &#x27;truefalse&#x27;) state.questions = buildTrueFalseQuiz();
  else state.questions = buildMixedQuiz();
  document.querySelectorAll(&#x27;.mode-card&#x27;).forEach(c =&gt; {
    c.classList.toggle(&#x27;active&#x27;, c.dataset.mode === mode);
  });
  renderQuestion();
  document.getElementById(&#x27;quizArea&#x27;).scrollIntoView({ behavior: &#x27;smooth&#x27;, block: &#x27;start&#x27; });
}

function renderQuestion() {
  const total = state.questions.length;
  if (state.current &gt;= total) { renderFinal(); return; }
  const q = state.questions[state.current];

  let body;
  if (q.type === &#x27;mcq&#x27;) body = renderMCQ(q);
  else if (q.type === &#x27;truefalse&#x27;) body = renderTF(q);
  else if (q.type === &#x27;drag&#x27;) body = renderDrag(q);

  $quiz.innerHTML = `
    &lt;div class=&quot;quiz&quot;&gt;
      &lt;div class=&quot;progress-bar&quot;&gt;
        &lt;span class=&quot;progress-text&quot;&gt;Question ${state.current + 1} / ${total}&lt;/span&gt;
        &lt;span class=&quot;score-pill&quot;&gt;&lt;span class=&quot;accent&quot;&gt;●&lt;/span&gt; Score: ${state.score}/${state.current}&lt;/span&gt;
      &lt;/div&gt;
      ${body}
    &lt;/div&gt;
  `;
  attachHandlers(q);
}

function renderMCQ(q) {
  const big = q.bigDisplay
    ? `&lt;div class=&quot;big-display&quot;&gt;&lt;div class=&quot;big-expr&quot;&gt;${q.bigDisplay.replace(/\n/g, &#x27;&lt;br&gt;&#x27;)}&lt;/div&gt;&lt;/div&gt;`
    : &#x27;&#x27;;
  const letters = [&#x27;A&#x27;, &#x27;B&#x27;, &#x27;C&#x27;, &#x27;D&#x27;];
  const opts = q.options.map((o, i) =&gt; `
    &lt;button class=&quot;option&quot; data-index=&quot;${i}&quot;&gt;
      &lt;span class=&quot;letter&quot;&gt;${letters[i]}&lt;/span&gt;
      &lt;span&gt;${o}&lt;/span&gt;
    &lt;/button&gt;
  `).join(&#x27;&#x27;);
  return `
    &lt;div class=&quot;question-label&quot;&gt;${q.prompt || &#x27;Question&#x27;}&lt;/div&gt;
    &lt;div class=&quot;question&quot;&gt;${q.question || &#x27;&#x27;}&lt;/div&gt;
    ${big}
    &lt;div class=&quot;options&quot; id=&quot;optionList&quot;&gt;${opts}&lt;/div&gt;
    &lt;div id=&quot;feedbackArea&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;controlArea&quot;&gt;&lt;/div&gt;
  `;
}

function renderTF(q) {
  return `
    &lt;div class=&quot;question-label&quot;&gt;${q.prompt}&lt;/div&gt;
    &lt;div class=&quot;question&quot;&gt;${q.question}&lt;/div&gt;
    &lt;div class=&quot;tf-container&quot; style=&quot;margin-top:18px&quot;&gt;
      &lt;button class=&quot;tf-btn&quot; data-answer=&quot;true&quot;&gt;TRUE&lt;/button&gt;
      &lt;button class=&quot;tf-btn&quot; data-answer=&quot;false&quot;&gt;FALSE&lt;/button&gt;
    &lt;/div&gt;
    &lt;div id=&quot;feedbackArea&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;controlArea&quot;&gt;&lt;/div&gt;
  `;
}

function renderDrag(q) {
  const shuffled = shuffle(q.correctOrder.map((s, i) =&gt; ({ text: s, originalIdx: i })));
  state.dragOrder = shuffled;
  const items = shuffled.map((item, displayIdx) =&gt; `
    &lt;div class=&quot;drag-item&quot; draggable=&quot;true&quot; data-original=&quot;${item.originalIdx}&quot; data-display=&quot;${displayIdx}&quot;&gt;
      &lt;span class=&quot;drag-num&quot;&gt;${displayIdx + 1}&lt;/span&gt;
      &lt;span class=&quot;drag-handle&quot;&gt;\u2630&lt;/span&gt;
      &lt;span&gt;${item.text}&lt;/span&gt;
    &lt;/div&gt;
  `).join(&#x27;&#x27;);
  return `
    &lt;div class=&quot;question-label&quot;&gt;${q.prompt}&lt;/div&gt;
    &lt;div class=&quot;question&quot;&gt;${q.question}&lt;/div&gt;
    &lt;div class=&quot;drag-area&quot;&gt;
      &lt;div class=&quot;drag-instructions&quot;&gt;Drag and drop to reorder. Then click CHECK ORDER.&lt;/div&gt;
      &lt;div class=&quot;drag-list&quot; id=&quot;dragList&quot;&gt;${items}&lt;/div&gt;
    &lt;/div&gt;
    &lt;div id=&quot;feedbackArea&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;controlArea&quot;&gt;
      &lt;div class=&quot;controls&quot;&gt;
        &lt;button class=&quot;btn&quot; id=&quot;checkOrderBtn&quot;&gt;Check Order&lt;/button&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  `;
}

function attachHandlers(q) {
  if (q.type === &#x27;mcq&#x27;) {
    document.querySelectorAll(&#x27;.option&#x27;).forEach(btn =&gt; {
      btn.addEventListener(&#x27;click&#x27;, () =&gt; handleMCQ(btn, q));
    });
  } else if (q.type === &#x27;truefalse&#x27;) {
    document.querySelectorAll(&#x27;.tf-btn&#x27;).forEach(btn =&gt; {
      btn.addEventListener(&#x27;click&#x27;, () =&gt; handleTF(btn, q));
    });
  } else if (q.type === &#x27;drag&#x27;) {
    setupDragDrop();
    document.getElementById(&#x27;checkOrderBtn&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; handleDrag(q));
  }
}

function setupDragDrop() {
  const list = document.getElementById(&#x27;dragList&#x27;);
  let dragSrc = null;
  list.querySelectorAll(&#x27;.drag-item&#x27;).forEach(item =&gt; {
    item.addEventListener(&#x27;dragstart&#x27;, (e) =&gt; {
      dragSrc = item;
      item.classList.add(&#x27;dragging&#x27;);
      e.dataTransfer.effectAllowed = &#x27;move&#x27;;
    });
    item.addEventListener(&#x27;dragend&#x27;, () =&gt; {
      item.classList.remove(&#x27;dragging&#x27;);
      list.querySelectorAll(&#x27;.drag-item&#x27;).forEach(i =&gt; i.classList.remove(&#x27;over&#x27;));
      updateDragNumbers();
    });
    item.addEventListener(&#x27;dragover&#x27;, (e) =&gt; {
      e.preventDefault();
      e.dataTransfer.dropEffect = &#x27;move&#x27;;
      item.classList.add(&#x27;over&#x27;);
      return false;
    });
    item.addEventListener(&#x27;dragleave&#x27;, () =&gt; item.classList.remove(&#x27;over&#x27;));
    item.addEventListener(&#x27;drop&#x27;, (e) =&gt; {
      e.preventDefault();
      if (dragSrc !== item) {
        const allItems = [...list.querySelectorAll(&#x27;.drag-item&#x27;)];
        const srcIdx = allItems.indexOf(dragSrc);
        const tgtIdx = allItems.indexOf(item);
        if (srcIdx &lt; tgtIdx) {
          item.parentNode.insertBefore(dragSrc, item.nextSibling);
        } else {
          item.parentNode.insertBefore(dragSrc, item);
        }
      }
      return false;
    });
    // touch support
    let touchY = 0;
    item.addEventListener(&#x27;touchstart&#x27;, (e) =&gt; {
      touchY = e.touches[0].clientY;
      item.classList.add(&#x27;dragging&#x27;);
    }, { passive: true });
    item.addEventListener(&#x27;touchmove&#x27;, (e) =&gt; {
      e.preventDefault();
      const y = e.touches[0].clientY;
      const allItems = [...list.querySelectorAll(&#x27;.drag-item:not(.dragging)&#x27;)];
      const before = allItems.find(i =&gt; {
        const r = i.getBoundingClientRect();
        return y &lt; r.top + r.height / 2;
      });
      if (before) list.insertBefore(item, before);
      else list.appendChild(item);
    }, { passive: false });
    item.addEventListener(&#x27;touchend&#x27;, () =&gt; {
      item.classList.remove(&#x27;dragging&#x27;);
      updateDragNumbers();
    });
  });
}

function updateDragNumbers() {
  const items = document.querySelectorAll(&#x27;#dragList .drag-item&#x27;);
  items.forEach((item, i) =&gt; {
    item.querySelector(&#x27;.drag-num&#x27;).textContent = i + 1;
  });
}

function handleDrag(q) {
  if (state.answered) return;
  state.answered = true;
  const items = [...document.querySelectorAll(&#x27;#dragList .drag-item&#x27;)];
  let allCorrect = true;
  items.forEach((item, displayIdx) =&gt; {
    const originalIdx = parseInt(item.dataset.original);
    if (originalIdx === displayIdx) {
      item.classList.add(&#x27;correct&#x27;);
    } else {
      item.classList.add(&#x27;wrong&#x27;);
      allCorrect = false;
    }
    item.draggable = false;
  });
  if (allCorrect) state.score++;
  document.getElementById(&#x27;checkOrderBtn&#x27;).remove();
  showFeedback(allCorrect, q.explain || &#x27;&#x27;);
  showNextButton();
}

function handleMCQ(btn, q) {
  if (state.answered) return;
  state.answered = true;
  const idx = parseInt(btn.dataset.index);
  const correct = idx === q.correct;
  if (correct) state.score++;
  document.querySelectorAll(&#x27;.option&#x27;).forEach((b, i) =&gt; {
    b.disabled = true;
    if (i === q.correct) b.classList.add(&#x27;correct&#x27;);
    else if (i === idx) b.classList.add(&#x27;wrong&#x27;);
  });
  showFeedback(correct, q.explain || &#x27;&#x27;);
  showNextButton();
}

function handleTF(btn, q) {
  if (state.answered) return;
  state.answered = true;
  const ans = btn.dataset.answer === &#x27;true&#x27;;
  const correct = ans === q.correct;
  if (correct) state.score++;
  document.querySelectorAll(&#x27;.tf-btn&#x27;).forEach(b =&gt; {
    b.disabled = true;
    const bAns = b.dataset.answer === &#x27;true&#x27;;
    if (bAns === q.correct) b.classList.add(&#x27;correct&#x27;);
    else if (bAns === ans) b.classList.add(&#x27;wrong&#x27;);
  });
  showFeedback(correct, q.explain || &#x27;&#x27;);
  showNextButton();
}

function showFeedback(correct, html) {
  const fa = document.getElementById(&#x27;feedbackArea&#x27;);
  fa.innerHTML = `
    &lt;div class=&quot;feedback ${correct ? &#x27;correct&#x27; : &#x27;wrong&#x27;} flash&quot;&gt;
      &lt;strong&gt;${correct ? &#x27;\u2713 Correct!&#x27; : &#x27;\u2717 Not quite&#x27;}&lt;/strong&gt;
      ${html}
    &lt;/div&gt;
  `;
}

function showNextButton() {
  const ca = document.getElementById(&#x27;controlArea&#x27;);
  const isLast = state.current === state.questions.length - 1;
  ca.innerHTML = `
    &lt;div class=&quot;controls&quot;&gt;
      &lt;button class=&quot;btn&quot; id=&quot;nextBtn&quot;&gt;${isLast ? &#x27;See Results&#x27; : &#x27;Next Question \u2192&#x27;}&lt;/button&gt;
    &lt;/div&gt;
  `;
  const next = document.getElementById(&#x27;nextBtn&#x27;);
  next.addEventListener(&#x27;click&#x27;, () =&gt; {
    state.current++;
    state.answered = false;
    renderQuestion();
  });
  next.focus();
}

function renderFinal() {
  const total = state.questions.length;
  const pct = Math.round((state.score / total) * 100);
  let grade, msg, icon;
  if (pct &gt;= 90)      { grade = &quot;Outstanding&quot;; msg = &quot;Top mark territory \u2014 you&#x27;re exam-ready!&quot;; icon = &quot;\u2605&quot;; }
  else if (pct &gt;= 75) { grade = &quot;Strong&quot;;      msg = &quot;Solid grasp. Try Mixed Test for full simulation.&quot;; icon = &quot;\u2713&quot;; }
  else if (pct &gt;= 55) { grade = &quot;Developing&quot;;  msg = &quot;Re-do this mode and check the cheat sheet for tricky parts.&quot;; icon = &quot;\u2197&quot;; }
  else                { grade = &quot;Keep going&quot;;  msg = &quot;Don&#x27;t worry \u2014 open the cheat sheet, redo this mode slowly.&quot;; icon = &quot;\u270D&quot;; }

  $quiz.innerHTML = `
    &lt;div class=&quot;quiz result&quot;&gt;
      &lt;div class=&quot;result-icon&quot;&gt;${icon}&lt;/div&gt;
      &lt;div class=&quot;result-grade&quot;&gt;${grade}&lt;/div&gt;
      &lt;div class=&quot;result-score&quot;&gt;${state.score}&lt;span class=&quot;total&quot;&gt;/${total}&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;result-msg&quot;&gt;${msg}&lt;/div&gt;
      &lt;div style=&quot;display:flex;gap:10px;justify-content:center;flex-wrap:wrap&quot;&gt;
        &lt;button class=&quot;btn&quot; onclick=&quot;startQuiz(&#x27;${state.mode}&#x27;)&quot;&gt;Try Again&lt;/button&gt;
        &lt;button class=&quot;btn secondary&quot; onclick=&quot;document.getElementById(&#x27;quizArea&#x27;).innerHTML=&#x27;&#x27;; document.querySelectorAll(&#x27;.mode-card&#x27;).forEach(c=&gt;c.classList.remove(&#x27;active&#x27;))&quot;&gt;Pick Another Mode&lt;/button&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  `;
}

$modes.querySelectorAll(&#x27;.mode-card&#x27;).forEach(card =&gt; {
  card.addEventListener(&#x27;click&#x27;, () =&gt; startQuiz(card.dataset.mode));
});
&lt;/script&gt;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i &gt; 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickN(arr, n) { return shuffle(arr).slice(0, n); }

function buildVocab1Quiz() {
  return pickN(VOCAB1, 8).map(item =&gt; {
    const askForDef = Math.random() &gt; 0.5;
    if (askForDef) {
      const opts = shuffle([item.def, ...item.wrongs]);
      return {
        type: &#x27;mcq&#x27;,
        bigDisplay: item.term,
        prompt: &#x27;Forces vocabulary&#x27;,
        question: `What does &quot;${item.term}&quot; mean?`,
        options: opts,
        correct: opts.indexOf(item.def),
        explain: `${item.term} = ${item.def}`
      };
    } else {
      const distractors = pickN(VOCAB1.filter(d =&gt; d.term !== item.term), 3).map(d =&gt; d.term);
      const opts = shuffle([item.term, ...distractors]);
      return {
        type: &#x27;mcq&#x27;,
        prompt: &#x27;Forces vocabulary&#x27;,
        question: `Which term means: &quot;${item.def}&quot;?`,
        options: opts,
        correct: opts.indexOf(item.term),
        explain: `${item.term} = ${item.def}`
      };
    }
  });
}

function startQuiz(mode) {
  state.mode = mode;
  state.current = 0;
  state.score = 0;
  state.answered = false;
  if (mode === &#x27;vocab1&#x27;) state.questions = buildVocab1Quiz();
  else if (mode === &#x27;massweight&#x27;) state.questions = buildMassWeightQuiz();
  else if (mode === &#x27;contact&#x27;) state.questions = buildContactQuiz();
  else if (mode === &#x27;weightcalc&#x27;) state.questions = buildWeightCalcQuiz();
  else if (mode === &#x27;resultant&#x27;) state.questions = buildResultantQuiz();
  else if (mode === &#x27;moments&#x27;) state.questions = buildMomentsQuiz();
  else if (mode === &#x27;workpower&#x27;) state.questions = buildWorkPowerQuiz();
  else if (mode === &#x27;hooke&#x27;) state.questions = buildHookeQuiz();
  else if (mode === &#x27;vocab2&#x27;) state.questions = buildVocab2Quiz();
  else if (mode === &#x27;stores&#x27;) state.questions = buildStoresQuiz();
  else if (mode === &#x27;heat&#x27;) state.questions = buildHeatQuiz();
  else if (mode === &#x27;truefalse&#x27;) state.questions = buildTrueFalseQuiz();
  else state.questions = buildMixedQuiz();
  document.querySelectorAll(&#x27;.mode-card&#x27;).forEach(c =&gt; {
    c.classList.toggle(&#x27;active&#x27;, c.dataset.mode === mode);
  });
  renderQuestion();
  document.getElementById(&#x27;quizArea&#x27;).scrollIntoView({ behavior: &#x27;smooth&#x27;, block: &#x27;start&#x27; });
}

function renderQuestion() {
  const total = state.questions.length;
  if (state.current &gt;= total) { renderFinal(); return; }
  const q = state.questions[state.current];

  let body;
  if (q.type === &#x27;mcq&#x27;) body = renderMCQ(q);
  else if (q.type === &#x27;truefalse&#x27;) body = renderTF(q);
  else if (q.type === &#x27;numinput&#x27;) body = renderNumInput(q);

  $quiz.innerHTML = `
    &lt;div class=&quot;quiz&quot;&gt;
      &lt;div class=&quot;progress-bar&quot;&gt;
        &lt;span class=&quot;progress-text&quot;&gt;Question ${state.current + 1} / ${total}&lt;/span&gt;
        &lt;span class=&quot;score-pill&quot;&gt;&lt;span class=&quot;accent&quot;&gt;●&lt;/span&gt; Score: ${state.score}/${state.current}&lt;/span&gt;
      &lt;/div&gt;
      ${body}
    &lt;/div&gt;
  `;
  attachHandlers(q);
}

function renderMCQ(q) {
  const big = q.bigDisplay
    ? `&lt;div class=&quot;big-display&quot;&gt;&lt;div class=&quot;big-expr&quot;&gt;${q.bigDisplay}&lt;/div&gt;&lt;/div&gt;`
    : &#x27;&#x27;;
  const letters = [&#x27;A&#x27;, &#x27;B&#x27;, &#x27;C&#x27;, &#x27;D&#x27;];
  const opts = q.options.map((o, i) =&gt; `
    &lt;button class=&quot;option&quot; data-index=&quot;${i}&quot;&gt;
      &lt;span class=&quot;letter&quot;&gt;${letters[i]}&lt;/span&gt;
      &lt;span&gt;${o}&lt;/span&gt;
    &lt;/button&gt;
  `).join(&#x27;&#x27;);
  return `
    &lt;div class=&quot;question-label&quot;&gt;${q.prompt || &#x27;Question&#x27;}&lt;/div&gt;
    &lt;div class=&quot;question&quot;&gt;${q.question || &#x27;&#x27;}&lt;/div&gt;
    ${big}
    &lt;div class=&quot;options&quot; id=&quot;optionList&quot;&gt;${opts}&lt;/div&gt;
    &lt;div id=&quot;feedbackArea&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;controlArea&quot;&gt;&lt;/div&gt;
  `;
}

    &lt;div class=&quot;tf-container&quot; style=&quot;margin-top:18px&quot;&gt;

  `;
}

function renderNumInput(q) {
  return `

    &lt;div class=&quot;question&quot;&gt;${q.question}&lt;/div&gt;
    &lt;div class=&quot;big-display&quot;&gt;&lt;div class=&quot;big-expr&quot;&gt;${q.formula}&lt;/div&gt;&lt;/div&gt;

      &lt;span class=&quot;unit-label&quot;&gt;${q.unit}&lt;/span&gt;
      &lt;button class=&quot;btn&quot; id=&quot;submitBtn&quot;&gt;Check&lt;/button&gt;

    &lt;div id=&quot;controlArea&quot;&gt;&lt;/div&gt;
  `;

function attachHandlers(q) {
  if (q.type === &#x27;mcq&#x27;) {
    document.querySelectorAll(&#x27;.option&#x27;).forEach(btn =&gt; {
      btn.addEventListener(&#x27;click&#x27;, () =&gt; handleMCQ(btn, q));
    });
  } else if (q.type === &#x27;truefalse&#x27;) {
    document.querySelectorAll(&#x27;.tf-btn&#x27;).forEach(btn =&gt; {
      btn.addEventListener(&#x27;click&#x27;, () =&gt; handleTF(btn, q));
    });
  } else if (q.type === &#x27;numinput&#x27;) {
    const submit = document.getElementById(&#x27;submitBtn&#x27;);
    const input = document.getElementById(&#x27;numAns&#x27;);
    const handler = () =&gt; handleNumInput(q);
    submit.addEventListener(&#x27;click&#x27;, handler);
    input.addEventListener(&#x27;keydown&#x27;, (e) =&gt; {
      if (e.key === &#x27;Enter&#x27;) { e.preventDefault(); handler(); }
    });
    input.focus();
  }
}

function handleMCQ(btn, q) {
  if (state.answered) return;
  state.answered = true;
  const idx = parseInt(btn.dataset.index);
  const correct = idx === q.correct;
  if (correct) state.score++;
  document.querySelectorAll(&#x27;.option&#x27;).forEach((b, i) =&gt; {
    b.disabled = true;
    if (i === q.correct) b.classList.add(&#x27;correct&#x27;);
    else if (i === idx) b.classList.add(&#x27;wrong&#x27;);
  });
  showFeedback(correct, q.explain || &#x27;&#x27;);
  showNextButton();
}

function handleTF(btn, q) {
  if (state.answered) return;
  state.answered = true;
  const ans = btn.dataset.answer === &#x27;true&#x27;;
  const correct = ans === q.correct;
  if (correct) state.score++;
  document.querySelectorAll(&#x27;.tf-btn&#x27;).forEach(b =&gt; {
    b.disabled = true;
    const bAns = b.dataset.answer === &#x27;true&#x27;;
    if (bAns === q.correct) b.classList.add(&#x27;correct&#x27;);
    else if (bAns === ans) b.classList.add(&#x27;wrong&#x27;);
  });
  showFeedback(correct, q.explain || &#x27;&#x27;);
  showNextButton();
}

function handleNumInput(q) {
  if (state.answered) return;
  state.answered = true;
  const input = document.getElementById(&#x27;numAns&#x27;);
  const userAns = parseFloat(input.value);
  // Allow tolerance for decimal answers
  const correct = !isNaN(userAns) &amp;&amp; Math.abs(userAns - q.correct) &lt; 0.05;
  if (correct) state.score++;
  input.disabled = true;
  document.getElementById(&#x27;submitBtn&#x27;).disabled = true;
  if (correct) {
    input.style.borderColor = &#x27;var(--good)&#x27;;
    input.style.background = &#x27;var(--good-soft)&#x27;;
    input.style.color = &#x27;var(--good)&#x27;;
  } else {
    input.style.borderColor = &#x27;var(--accent)&#x27;;
    input.style.background = &#x27;var(--accent-soft)&#x27;;
    input.style.color = &#x27;var(--accent)&#x27;;
  }
  const correctMsg = correct ? &#x27;&#x27; : ` (Answer: ${q.correct} ${q.unit})`;
  showFeedback(correct, q.explain + correctMsg);
  showNextButton();
}

function showFeedback(correct, html) {
  const fa = document.getElementById(&#x27;feedbackArea&#x27;);
  fa.innerHTML = `
    &lt;div class=&quot;feedback ${correct ? &#x27;correct&#x27; : &#x27;wrong&#x27;} flash&quot;&gt;
      &lt;strong&gt;${correct ? &#x27;\u2713 Correct!&#x27; : &#x27;\u2717 Not quite&#x27;}&lt;/strong&gt;
      ${html}
    &lt;/div&gt;
  `;
}

function showNextButton() {
  const ca = document.getElementById(&#x27;controlArea&#x27;);
  const isLast = state.current === state.questions.length - 1;
  ca.innerHTML = `
    &lt;div class=&quot;controls&quot;&gt;
      &lt;button class=&quot;btn&quot; id=&quot;nextBtn&quot;&gt;${isLast ? &#x27;See Results&#x27; : &#x27;Next Question \u2192&#x27;}&lt;/button&gt;
    &lt;/div&gt;
  `;
  const next = document.getElementById(&#x27;nextBtn&#x27;);
  next.addEventListener(&#x27;click&#x27;, () =&gt; {
    state.current++;
    state.answered = false;
    renderQuestion();
  });
  next.focus();
}

function renderFinal() {
  const total = state.questions.length;
  const pct = Math.round((state.score / total) * 100);
  let grade, msg, icon;
  if (pct &gt;= 90)      { grade = &quot;Outstanding&quot;; msg = &quot;Top mark territory \u2014 you&#x27;re exam-ready!&quot;; icon = &quot;\u2605&quot;; }
  else if (pct &gt;= 75) { grade = &quot;Strong&quot;;      msg = &quot;Solid grasp. Try Mixed Test for full simulation.&quot;; icon = &quot;\u2713&quot;; }
  else if (pct &gt;= 55) { grade = &quot;Developing&quot;;  msg = &quot;Re-do this mode and check the cheat sheet for tricky parts.&quot;; icon = &quot;\u2197&quot;; }
  else                { grade = &quot;Keep going&quot;;  msg = &quot;Don&#x27;t worry \u2014 open the cheat sheet, redo this mode slowly.&quot;; icon = &quot;\u270D&quot;; }

  $quiz.innerHTML = `
    &lt;div class=&quot;quiz result&quot;&gt;
      &lt;div class=&quot;result-icon&quot;&gt;${icon}&lt;/div&gt;
      &lt;div class=&quot;result-grade&quot;&gt;${grade}&lt;/div&gt;
      &lt;div class=&quot;result-score&quot;&gt;${state.score}&lt;span class=&quot;total&quot;&gt;/${total}&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;result-msg&quot;&gt;${msg}&lt;/div&gt;
      &lt;div style=&quot;display:flex;gap:10px;justify-content:center;flex-wrap:wrap&quot;&gt;
        &lt;button class=&quot;btn&quot; onclick=&quot;startQuiz(&#x27;${state.mode}&#x27;)&quot;&gt;Try Again&lt;/button&gt;
        &lt;button class=&quot;btn secondary&quot; onclick=&quot;document.getElementById(&#x27;quizArea&#x27;).innerHTML=&#x27;&#x27;; document.querySelectorAll(&#x27;.mode-card&#x27;).forEach(c=&gt;c.classList.remove(&#x27;active&#x27;))&quot;&gt;Pick Another Mode&lt;/button&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  `;
}

$modes.querySelectorAll(&#x27;.mode-card&#x27;).forEach(card =&gt; {
  card.addEventListener(&#x27;click&#x27;, () =&gt; startQuiz(card.dataset.mode));
});
&lt;/script&gt;

&lt;!-- ============ OVERVIEW ============ --&gt;
&lt;div id=&quot;overview&quot; class=&quot;tab-content active&quot;&gt;
    &lt;h2&gt;📚 整學期概覽&lt;/h2&gt;

    &lt;div class=&quot;formula&quot;&gt;
        Force（力）= Push 推 + Pull 拉 + Turning 轉動&lt;br&gt;
        &lt;div class=&quot;small&quot;&gt;單位：Newton (N) 牛頓&lt;/div&gt;
    &lt;/div&gt;

    &lt;h3&gt;🎯 7 個子單元路線&lt;/h3&gt;
    &lt;table&gt;
        &lt;tr&gt;&lt;th width=&quot;20%&quot;&gt;單元&lt;/th&gt;&lt;th&gt;主題&lt;/th&gt;&lt;th&gt;關鍵概念&lt;/th&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;1&lt;/td&gt;&lt;td&gt;What is a Force?&lt;/td&gt;&lt;td&gt;接觸 vs 非接觸力&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;2&lt;/td&gt;&lt;td&gt;Friction 摩擦&lt;/td&gt;&lt;td&gt;反運動方向的力&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;3&lt;/td&gt;&lt;td&gt;Balanced Forces 力平衡&lt;/td&gt;&lt;td&gt;合力、自由體圖&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;4&lt;/td&gt;&lt;td&gt;Gravity 重力&lt;/td&gt;&lt;td&gt;W = m × g（質量 vs 重量）&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;5&lt;/td&gt;&lt;td&gt;Moments 力矩&lt;/td&gt;&lt;td&gt;M = F × d（轉動力）&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;6&lt;/td&gt;&lt;td&gt;Work Done 功&lt;/td&gt;&lt;td&gt;W = F × d（連結 Energy！）&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;7&lt;/td&gt;&lt;td&gt;Hooke&#x27;s Law 虎克定律&lt;/td&gt;&lt;td&gt;彈簧的力與拉伸&lt;/td&gt;&lt;/tr&gt;
    &lt;/table&gt;

    &lt;h3&gt;📐 5 個必背公式&lt;/h3&gt;
    &lt;table&gt;
        &lt;tr&gt;&lt;th&gt;名稱&lt;/th&gt;&lt;th&gt;公式&lt;/th&gt;&lt;th&gt;單位&lt;/th&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Weight&lt;/strong&gt; 重量&lt;/td&gt;&lt;td&gt;W = m × g&lt;/td&gt;&lt;td&gt;N (m: kg, g: N/kg)&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Moment&lt;/strong&gt; 力矩&lt;/td&gt;&lt;td&gt;M = F × d&lt;/td&gt;&lt;td&gt;Nm&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Work Done&lt;/strong&gt; 功&lt;/td&gt;&lt;td&gt;W = F × d&lt;/td&gt;&lt;td&gt;J（焦耳！）&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Power&lt;/strong&gt; 功率&lt;/td&gt;&lt;td&gt;P = W ÷ t&lt;/td&gt;&lt;td&gt;W (Watts)&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Resultant Force&lt;/strong&gt; 合力&lt;/td&gt;&lt;td&gt;同向相加，反向相減&lt;/td&gt;&lt;td&gt;N&lt;/td&gt;&lt;/tr&gt;
    &lt;/table&gt;

    &lt;h3&gt;🌟 本學期 5 個關鍵點&lt;/h3&gt;
    &lt;div class=&quot;note-box&quot;&gt;
        &lt;strong&gt;1️⃣ Mass vs Weight 不同！&lt;/strong&gt;&lt;br&gt;
        Mass（質量）= kg，到處都一樣 | Weight（重量）= N，不同行星不同
    &lt;/div&gt;

    &lt;div class=&quot;note-box&quot;&gt;
        &lt;strong&gt;2️⃣ Resultant Force 決定運動&lt;/strong&gt;&lt;br&gt;

        做了多少 J 的功 = 轉移了多少 J 的能量（Autumn 學的！）
    &lt;/div&gt;
&lt;/div&gt;

    &lt;h2&gt;💪 8 大常見力 / 8 Common Forces&lt;/h2&gt;
    &lt;p&gt;分成兩種：&lt;strong&gt;Contact（接觸）&lt;/strong&gt;和 &lt;strong&gt;Non-Contact（非接觸）&lt;/strong&gt;&lt;/p&gt;

    &lt;h3&gt;🤚 接觸力 (Contact Forces) — 需要碰到&lt;/h3&gt;
    &lt;div class=&quot;force-cards&quot;&gt;
        &lt;div class=&quot;force-card contact&quot;&gt;

&lt;!-- ============ GRAVITY ============ --&gt;
&lt;div id=&quot;gravity&quot; class=&quot;tab-content&quot;&gt;
    &lt;h2&gt;🌍 Gravity 重力（最常考！）&lt;/h2&gt;

    &lt;div class=&quot;formula&quot;&gt;
        Weight (N) = Mass (kg) × g (N/kg)&lt;br&gt;
        &lt;div class=&quot;small&quot;&gt;重量 = 質量 × 重力場強度&lt;/div&gt;
    &lt;/div&gt;

    &lt;h3&gt;⚠️ Mass vs Weight（一定要分清楚！）&lt;/h3&gt;
    &lt;table&gt;
        &lt;tr&gt;&lt;th&gt;&lt;/th&gt;&lt;th&gt;Mass 質量&lt;/th&gt;&lt;th&gt;Weight 重量&lt;/th&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;定義&lt;/td&gt;&lt;td&gt;物質的含量&lt;/td&gt;&lt;td&gt;受重力的力&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;單位&lt;/td&gt;&lt;td&gt;&lt;strong&gt;kg&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;&lt;strong&gt;N&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;會變嗎？&lt;/td&gt;&lt;td&gt;不變（到處都一樣）&lt;/td&gt;&lt;td&gt;會變（不同行星不同）&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;怎麼測？&lt;/td&gt;&lt;td&gt;天平&lt;/td&gt;&lt;td&gt;force meter&lt;/td&gt;&lt;/tr&gt;
    &lt;/table&gt;

    &lt;h3&gt;🪐 不同行星的重力場強度 (g)&lt;/h3&gt;
    &lt;table&gt;
        &lt;tr&gt;&lt;th&gt;行星&lt;/th&gt;&lt;th&gt;g 值 (N/kg)&lt;/th&gt;&lt;th&gt;vs 地球&lt;/th&gt;&lt;th&gt;60 kg 的人在這裡的重量&lt;/th&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;🌑 Moon 月球&lt;/td&gt;&lt;td&gt;1.6&lt;/td&gt;&lt;td&gt;~1/6&lt;/td&gt;&lt;td&gt;96 N&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;🔴 Mars 火星&lt;/td&gt;&lt;td&gt;3.7&lt;/td&gt;&lt;td&gt;~1/3&lt;/td&gt;&lt;td&gt;222 N&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;🌍 &lt;strong&gt;Earth 地球&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;&lt;strong&gt;10&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;基準&lt;/td&gt;&lt;td&gt;&lt;strong&gt;600 N&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;🟠 Jupiter 木星&lt;/td&gt;&lt;td&gt;25&lt;/td&gt;&lt;td&gt;2.5×&lt;/td&gt;&lt;td&gt;1,500 N&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;☀️ Sun 太陽&lt;/td&gt;&lt;td&gt;270&lt;/td&gt;&lt;td&gt;27×&lt;/td&gt;&lt;td&gt;16,200 N（會被壓扁！）&lt;/td&gt;&lt;/tr&gt;
    &lt;/table&gt;

    &lt;h3&gt;🧮 計算範例&lt;/h3&gt;
    &lt;div class=&quot;note-box&quot;&gt;
        &lt;strong&gt;例 1：&lt;/strong&gt;地球上 50 kg 的人重多少？&lt;br&gt;
        W = m × g = 50 × 10 = &lt;strong&gt;500 N&lt;/strong&gt;
    &lt;/div&gt;

    &lt;div class=&quot;note-box&quot;&gt;
        &lt;strong&gt;例 2：&lt;/strong&gt;月球上 70 kg 的太空人重多少？&lt;br&gt;
        W = 70 × 1.6 = &lt;strong&gt;112 N&lt;/strong&gt;（很輕，難怪能跳很高！）
    &lt;/div&gt;

    &lt;div class=&quot;note-box&quot;&gt;
        &lt;strong&gt;例 3：&lt;/strong&gt;地球上某物體重 250 N，質量是多少？&lt;br&gt;
        m = W ÷ g = 250 ÷ 10 = &lt;strong&gt;25 kg&lt;/strong&gt;
    &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ============ FORCE SIMULATOR ============ --&gt;
&lt;div id=&quot;simulator&quot; class=&quot;tab-content&quot;&gt;
    &lt;h2&gt;🎮 力的模擬器 / Force Simulator&lt;/h2&gt;

            &lt;/div&gt;
            &lt;div class=&quot;control-group&quot;&gt;
                &lt;label&gt;→ 向右力 (N): &lt;span id=&quot;right-val&quot;&gt;0&lt;/span&gt;&lt;/label&gt;
                &lt;input type=&quot;range&quot; id=&quot;right-force&quot; min=&quot;0&quot; max=&quot;100&quot; value=&quot;0&quot; oninput=&quot;updateForces()&quot;&gt;
            &lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;result-display&quot;&gt;
            &lt;div style=&quot;font-size: 0.9em; opacity: 0.85;&quot;&gt;合力 Resultant Force&lt;/div&gt;
            &lt;div style=&quot;font-size: 1.5em; font-weight: bold; margin: 4px 0;&quot; id=&quot;resultant&quot;&gt;0 N&lt;/div&gt;
            &lt;div id=&quot;motion-status&quot; style=&quot;font-size: 0.95em;&quot;&gt;⏸️ 平衡 - 物體靜止&lt;/div&gt;
        &lt;/div&gt;

        &lt;div style=&quot;margin-top: 14px;&quot;&gt;
            &lt;button class=&quot;btn&quot; onclick=&quot;setExample(1)&quot;&gt;🎯 範例 1：平衡&lt;/button&gt;
            &lt;button class=&quot;btn&quot; onclick=&quot;setExample(2)&quot;&gt;🚀 範例 2：向右加速&lt;/button&gt;
            &lt;button class=&quot;btn&quot; onclick=&quot;setExample(3)&quot;&gt;⬅️ 範例 3：向左加速&lt;/button&gt;
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;tip-box&quot;&gt;
        &lt;strong&gt;💡 觀察重點：&lt;/strong&gt;
        &lt;ul style=&quot;margin: 8px 0 0 20px;&quot;&gt;
            &lt;li&gt;左右力相等 → &lt;strong&gt;合力 = 0&lt;/strong&gt; → 物體不動&lt;/li&gt;
            &lt;li&gt;右邊力較大 → 合力向右 → 物體向右動&lt;/li&gt;
            &lt;li&gt;左邊力較大 → 合力向左 → 物體向左動&lt;/li&gt;
            &lt;li&gt;合力越大 → 加速越快&lt;/li&gt;
        &lt;/ul&gt;
    &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ============ CALCULATOR ============ --&gt;
&lt;div id=&quot;calculator&quot; class=&quot;tab-content&quot;&gt;
    &lt;h2&gt;🧮 物理計算機 / Physics Calculator&lt;/h2&gt;

&lt;script&gt;
// ============ TAB SWITCHING ============
function showTab(event, tabId) {
    document.querySelectorAll(&#x27;.tab-content&#x27;).forEach(t =&gt; t.classList.remove(&#x27;active&#x27;));
    document.querySelectorAll(&#x27;.tab-btn&#x27;).forEach(b =&gt; b.classList.remove(&#x27;active&#x27;));
    document.getElementById(tabId).classList.add(&#x27;active&#x27;);
    event.target.classList.add(&#x27;active&#x27;);
}

// ============ FORCE SIMULATOR ============
function updateForces() {
    const left = parseInt(document.getElementById(&#x27;left-force&#x27;).value);
    const right = parseInt(document.getElementById(&#x27;right-force&#x27;).value);
    const resultant = right - left;

    document.getElementById(&#x27;left-val&#x27;).textContent = left;
    document.getElementById(&#x27;right-val&#x27;).textContent = right;

    const arrowLeft = document.getElementById(&#x27;arrow-left&#x27;);
    const arrowRight = document.getElementById(&#x27;arrow-right&#x27;);
    arrowLeft.style.opacity = left &gt; 0 ? Math.min(left/30, 1) : 0;
    arrowLeft.style.borderRightWidth = (10 + left/3) + &#x27;px&#x27;;
    arrowRight.style.opacity = right &gt; 0 ? Math.min(right/30, 1) : 0;
    arrowRight.style.borderLeftWidth = (10 + right/3) + &#x27;px&#x27;;

    const resDiv = document.getElementById(&#x27;resultant&#x27;);
    const motionDiv = document.getElementById(&#x27;motion-status&#x27;);

    if (resultant === 0) {
        resDiv.textContent = &#x27;0 N&#x27;;
        motionDiv.textContent = &#x27;⏸️ 平衡 - 物體靜止 / 等速&#x27;;
        document.getElementById(&#x27;box&#x27;).style.left = &#x27;50%&#x27;;
    } else if (resultant &gt; 0) {
        resDiv.textContent = resultant + &#x27; N →&#x27;;
        motionDiv.textContent = &#x27;🚀 不平衡 - 物體向右加速 (Resultant: &#x27; + resultant + &#x27; N)&#x27;;
        const newPos = Math.min(85, 50 + resultant * 0.5);
        document.getElementById(&#x27;box&#x27;).style.left = newPos + &#x27;%&#x27;;
    } else {
        resDiv.textContent = Math.abs(resultant) + &#x27; N ←&#x27;;
        motionDiv.textContent = &#x27;⬅️ 不平衡 - 物體向左加速 (Resultant: &#x27; + Math.abs(resultant) + &#x27; N)&#x27;;
        const newPos = Math.max(15, 50 + resultant * 0.5);
        document.getElementById(&#x27;box&#x27;).style.left = newPos + &#x27;%&#x27;;
    }
}

function setExample(n) {
    if (n === 1) {
        document.getElementById(&#x27;left-force&#x27;).value = 30;
        document.getElementById(&#x27;right-force&#x27;).value = 30;
    } else if (n === 2) {
        document.getElementById(&#x27;left-force&#x27;).value = 10;
        document.getElementById(&#x27;right-force&#x27;).value = 50;
    } else if (n === 3) {
        document.getElementById(&#x27;left-force&#x27;).value = 60;
        document.getElementById(&#x27;right-force&#x27;).value = 20;
    }
    updateForces();
}

// ============ CALCULATORS ============
function calcWeight() {
    const m = parseFloat(document.getElementById(&#x27;weight-mass&#x27;).value) || 0;
    const g = parseFloat(document.getElementById(&#x27;weight-planet&#x27;).value);
    const w = m * g;
    document.getElementById(&#x27;weight-calc&#x27;).innerHTML =
        `W = ${m} × ${g} = &lt;strong&gt;${w.toFixed(1)} N&lt;/strong&gt;`;
}

function calcMoment() {
    const f = parseFloat(document.getElementById(&#x27;moment-force&#x27;).value) || 0;
    const d = parseFloat(document.getElementById(&#x27;moment-distance&#x27;).value) || 0;
    const m = f * d;
    document.getElementById(&#x27;moment-calc&#x27;).innerHTML =
        `M = ${f} × ${d} = &lt;strong&gt;${m.toFixed(1)} Nm&lt;/strong&gt;`;
}

function calcWork() {
    const f = parseFloat(document.getElementById(&#x27;work-force&#x27;).value) || 0;
    const d = parseFloat(document.getElementById(&#x27;work-distance&#x27;).value) || 0;
    const w = f * d;
    document.getElementById(&#x27;work-calc&#x27;).innerHTML =
        `Work Done = ${f} × ${d} = &lt;strong&gt;${w.toFixed(1)} J&lt;/strong&gt;`;
}

function calcSeesaw() {
    const lf = parseFloat(document.getElementById(&#x27;ss-left-f&#x27;).value) || 0;
    const ld = parseFloat(document.getElementById(&#x27;ss-left-d&#x27;).value) || 0;
    const rf = parseFloat(document.getElementById(&#x27;ss-right-f&#x27;).value) || 0;
    const rd = parseFloat(document.getElementById(&#x27;ss-right-d&#x27;).value) || 0;

    const leftM = lf * ld;
    const rightM = rf * rd;

    let status = &#x27;&#x27;;
    if (Math.abs(leftM - rightM) &lt; 0.01) {
        status = &#x27;&lt;strong&gt;✅ 平衡！&lt;/strong&gt;&#x27;;
    } else if (leftM &gt; rightM) {
        status = &#x27;&lt;strong&gt;⬇️ 左邊往下傾&lt;/strong&gt;（左邊力矩較大）&#x27;;
    } else {
        status = &#x27;&lt;strong&gt;⬇️ 右邊往下傾&lt;/strong&gt;（右邊力矩較大）&#x27;;
    }

    document.getElementById(&#x27;seesaw-calc&#x27;).innerHTML =
        `左邊：${lf} × ${ld} = ${leftM} Nm | 右邊：${rf} × ${rd} = ${rightM} Nm&lt;br&gt;${status}`;
}

// Initialize calculators
calcWeight();
calcMoment();
calcWork();
calcSeesaw();
updateForces();

// ============ QUIZ ============
const quizData = [
    {
        q: &quot;What is the unit of force?&quot;,
        zh: &quot;力的單位是什麼？&quot;,
        options: [&quot;Joule (J)&quot;, &quot;Newton (N)&quot;, &quot;Watt (W)&quot;, &quot;Kilogram (kg)&quot;],
        correct: 1,
        explain: &quot;力的單位是 Newton (N) 牛頓。J 是能量、W 是功率、kg 是質量。&quot;
    },
    {
        q: &quot;Which is a NON-CONTACT force?&quot;,
        zh: &quot;哪一個是非接觸力？&quot;,
        options: [&quot;Friction&quot;, &quot;Tension&quot;, &quot;Gravity&quot;, &quot;Air resistance&quot;],
        correct: 2,
        explain: &quot;Gravity（重力）不需要碰到 — 地球從遠處吸引你！&quot;
    },
    {
        q: &quot;Mass is measured in ___, weight is measured in ___.&quot;,
        zh: &quot;質量單位是 ___，重量單位是 ___。&quot;,
        options: [&quot;N, kg&quot;, &quot;kg, N&quot;, &quot;g, N&quot;, &quot;N, N&quot;],
        correct: 1,
        explain: &quot;Mass = kg（質量是物質含量），Weight = N（重量是力）&quot;
    },
    {
        q: &quot;If forces on an object are balanced, what happens?&quot;,
        zh: &quot;如果物體上的力平衡，會發生什麼？&quot;,
        options: [
            &quot;It will accelerate&quot;,
            &quot;It will stop or move at constant speed&quot;,
            &quot;It will speed up&quot;,
            &quot;It will fall&quot;
        ],
        correct: 1,
        explain: &quot;平衡 = 合力為 0 → 物體保持原狀（不動或等速直線）&quot;
    },
    {
        q: &quot;A 60 kg person on Earth (g = 10 N/kg). What is their weight?&quot;,
        zh: &quot;60 kg 的人在地球上重多少？(g = 10)&quot;,
        options: [&quot;6 N&quot;, &quot;60 N&quot;, &quot;600 N&quot;, &quot;6000 N&quot;],
        correct: 2,
        explain: &quot;W = m × g = 60 × 10 = 600 N&quot;
    },
    {
        q: &quot;Where would you weigh the LEAST?&quot;,
        zh: &quot;在哪裡你的重量最小？&quot;,
        options: [&quot;Earth&quot;, &quot;Moon&quot;, &quot;Mars&quot;, &quot;Jupiter&quot;],
        correct: 1,
        explain: &quot;Moon 月球的 g = 1.6 是最小的，所以重量最小（你會跳得很高！）&quot;
    },
    {
        q: &quot;Force right = 20 N, Force left = 8 N. Resultant force?&quot;,
        zh: &quot;向右 20 N，向左 8 N，合力是？&quot;,
        options: [&quot;28 N right&quot;, &quot;12 N right&quot;, &quot;12 N left&quot;, &quot;28 N left&quot;],
        correct: 1,
        explain: &quot;20 - 8 = 12 N，方向往大的那邊 = 右&quot;
    },
    {
        q: &quot;Moment formula is:&quot;,
        zh: &quot;力矩公式是：&quot;,
        options: [
            &quot;M = mass × gravity&quot;,
            &quot;M = Force × distance from pivot&quot;,
            &quot;M = Force ÷ distance&quot;,
            &quot;M = mass × distance&quot;
        ],
        correct: 1,
        explain: &quot;Moment = Force × distance from pivot。距離支點越遠，力矩越大！&quot;
    },
    {
        q: &quot;A force of 50 N moves a box 4 m. Work done?&quot;,
        zh: &quot;50 N 的力把箱子移動 4 m，做了多少功？&quot;,
        options: [&quot;12.5 J&quot;, &quot;200 J&quot;, &quot;200 N&quot;, &quot;54 J&quot;],
        correct: 1,
        explain: &quot;Work Done = F × d = 50 × 4 = 200 J（單位是 J，不是 N！）&quot;
    },
    {
        q: &quot;Hooke&#x27;s Law applies when:&quot;,
        zh: &quot;虎克定律適用於：&quot;,
        options: [
            &quot;The spring is broken&quot;,
            &quot;Force is below the elastic limit&quot;,
            &quot;The spring is permanently stretched&quot;,
            &quot;Always, with no exceptions&quot;
        ],
        correct: 1,
        explain: &quot;只有在彈性極限內，力與拉伸才成正比。超過彈性極限就不成立了！&quot;
    },
    {
        q: &quot;Why do astronauts bounce on the Moon?&quot;,
        zh: &quot;太空人為什麼在月球上跳得很高？&quot;,
        options: [
            &quot;They have less mass&quot;,
            &quot;There is no gravity&quot;,
            &quot;Gravity is weaker (g = 1.6 vs 10)&quot;,
            &quot;Their muscles are stronger&quot;
        ],
        correct: 2,
        explain: &quot;月球的 g = 1.6 N/kg，比地球（10）小很多，所以重量小，可以跳更高&quot;
    },
    {
        q: &quot;On a seesaw: child A weighs 50 N at 2 m. Child B weighs 25 N. Where should B sit to balance?&quot;,
        zh: &quot;翹翹板：A 50N 坐在 2m，B 25N 應坐在？&quot;,
        options: [&quot;1 m&quot;, &quot;2 m&quot;, &quot;3 m&quot;, &quot;4 m&quot;],
        correct: 3,
        explain: &quot;左邊力矩 = 50 × 2 = 100。右邊：25 × d = 100 → d = 4m。較輕的人坐遠一點才能平衡！&quot;
    }
];

let currentQuestion = 0;
let score = 0;
let selected = -1;

function loadQuestion() {
    const q = quizData[currentQuestion];
    document.getElementById(&#x27;q-text&#x27;).textContent = q.q;
    document.getElementById(&#x27;q-zh&#x27;).textContent = q.zh;
    document.getElementById(&#x27;q-current&#x27;).textContent = currentQuestion + 1;
    document.getElementById(&#x27;q-total&#x27;).textContent = quizData.length;

    const optsEl = document.getElementById(&#x27;q-options&#x27;);
    optsEl.innerHTML = &#x27;&#x27;;
    q.options.forEach((opt, idx) =&gt; {
        const li = document.createElement(&#x27;li&#x27;);
        li.textContent = String.fromCharCode(65 + idx) + &#x27;. &#x27; + opt;
        li.onclick = () =&gt; selectOption(idx, li);
        optsEl.appendChild(li);
    });

    document.getElementById(&#x27;feedback&#x27;).classList.remove(&#x27;show&#x27;, &#x27;correct&#x27;, &#x27;wrong&#x27;);
    document.getElementById(&#x27;next-btn&#x27;).disabled = true;
    document.getElementById(&#x27;progress-bar&#x27;).style.width = ((currentQuestion) / quizData.length * 100) + &#x27;%&#x27;;
    selected = -1;
}

function selectOption(idx, el) {
    if (selected !== -1) return;
    selected = idx;

    const q = quizData[currentQuestion];
    const items = document.querySelectorAll(&#x27;.options-list li&#x27;);
    const feedback = document.getElementById(&#x27;feedback&#x27;);

    items.forEach((item, i) =&gt; {
        item.style.cursor = &#x27;default&#x27;;
        if (i === q.correct) item.classList.add(&#x27;correct&#x27;);
        if (i === idx &amp;&amp; i !== q.correct) item.classList.add(&#x27;wrong&#x27;);
    });

    if (idx === q.correct) {
        score++;
        feedback.className = &#x27;quiz-feedback correct show&#x27;;
        feedback.innerHTML = &#x27;&lt;strong&gt;✅ 答對了！&lt;/strong&gt; &#x27; + q.explain;
    } else {
        feedback.className = &#x27;quiz-feedback wrong show&#x27;;
        feedback.innerHTML = &#x27;&lt;strong&gt;❌ 答錯了。&lt;/strong&gt; &#x27; + q.explain;
    }

    document.getElementById(&#x27;next-btn&#x27;).disabled = false;
    if (currentQuestion === quizData.length - 1) {
        document.getElementById(&#x27;next-btn&#x27;).textContent = &#x27;查看結果 →&#x27;;
    }
}

function nextQuestion() {
    currentQuestion++;
    if (currentQuestion &gt;= quizData.length) {
        showResults();
    } else {
        loadQuestion();
    }
}

function showResults() {
    document.getElementById(&#x27;quiz-screen&#x27;).style.display = &#x27;none&#x27;;
    document.getElementById(&#x27;results-screen&#x27;).style.display = &#x27;block&#x27;;
    document.getElementById(&#x27;final-score&#x27;).textContent = score;

    let msg;
    if (score === 12) msg = &#x27;🌟 完美！你是 Forces 大師！&#x27;;
    else if (score &gt;= 10) msg = &#x27;✨ 太棒了！物理觀念很紮實！&#x27;;
    else if (score &gt;= 7) msg = &#x27;👍 不錯！再複習一下計算公式！&#x27;;
    else if (score &gt;= 4) msg = &#x27;📚 加油！多看 Cheat Sheet！&#x27;;
    else msg = &#x27;💪 別灰心！從概覽開始重新學！&#x27;;

    document.getElementById(&#x27;result-message&#x27;).textContent = msg;
}

function restartQuiz() {
    currentQuestion = 0;
    score = 0;
    document.getElementById(&#x27;quiz-screen&#x27;).style.display = &#x27;block&#x27;;
    document.getElementById(&#x27;results-screen&#x27;).style.display = &#x27;none&#x27;;
    document.getElementById(&#x27;next-btn&#x27;).textContent = &#x27;下一題 →&#x27;;
    loadQuestion();
}

loadQuestion();

.flashcards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin: 16px 0;
}

.flashcard {
    perspective: 1000px;
    height: 130px;
    cursor: pointer;
}

.flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s;
    transform-style: preserve-3d;
}

.flashcard.flipped .flashcard-inner {
    transform: rotateY(180deg);
}

.flashcard-front, .flashcard-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 14px;
}

.flashcard-front {
    background: linear-gradient(135deg, #4299e1, #2c5282);
    color: white;
    font-weight: 700;
    font-size: 1.1em;
}

.flashcard-back {
    background: linear-gradient(135deg, #f7fafc, #e2e8f0);
    color: #2c3e50;
    transform: rotateY(180deg);
    font-size: 0.9em;
}

/* Memory Match Game */
.match-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin: 20px 0;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
}

.match-card {
    aspect-ratio: 3/4;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 600;
    text-align: center;
    padding: 8px;
    font-size: 0.85em;
    transition: all 0.3s;
    user-select: none;
}

.match-card:hover { transform: scale(1.03); }

.match-card.flipped {
    background: white;
    color: #2c3e50;
    border: 2px solid #667eea;
}

.match-card.matched {
    background: linear-gradient(135deg, #48bb78, #2f855a);
    color: white;
    cursor: default;
}

.match-card.hidden-text { color: transparent; }

/* Tip Boxes */
.tip-box {
    background: linear-gradient(135deg, #fef9c3, #fed7aa);
    padding: 14px 18px;
    border-radius: 10px;
    border-left: 5px solid #f59e0b;
    margin: 14px 0;
}

.tip-box strong { color: #92400e; }

.warning-box {
    background: linear-gradient(135deg, #fee2e2, #fecaca);
    padding: 14px 18px;
    border-radius: 10px;
    border-left: 5px solid #dc2626;
    margin: 14px 0;
}

.note-box {
    background: linear-gradient(135deg, #dbeafe, #bfdbfe);
    padding: 14px 18px;
    border-radius: 10px;
    border-left: 5px solid #2563eb;
    margin: 14px 0;
}

.formula {
    background: linear-gradient(135deg, #1a365d, #2c5282);
    color: white;
    padding: 16px 24px;
    border-radius: 12px;
    text-align: center;
    font-size: 1.2em;
    font-weight: 600;
    margin: 16px 0;
}

.eng {
    color: #718096;
    font-style: italic;
    font-size: 0.9em;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin: 14px 0;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

th {
    background: #1a365d;
    color: white;
    padding: 10px 14px;
    text-align: left;
}

td {
    padding: 10px 14px;
    border-bottom: 1px solid #e2e8f0;
}

tr:last-child td { border-bottom: none; }
tr:hover td { background: #f7fafc; }

footer {
    text-align: center;
    color: white;
    margin-top: 30px;
    padding: 16px;
    opacity: 0.9;
    font-size: 0.9em;
}

@media (max-width: 600px) {
    .container { padding: 12px; }
    header { padding: 20px; }
    header h1 { font-size: 1.6em; }
    .tab-content { padding: 20px; }
    .match-grid { grid-template-columns: repeat(3, 1fr); }
    .tab-btn { font-size: 0.9em; padding: 10px 12px; }
}

&lt;!-- ============ TAB 1: OVERVIEW ============ --&gt;
&lt;div id=&quot;overview&quot; class=&quot;tab-content active&quot;&gt;
    &lt;h2&gt;📚 課程概覽 / Topic Overview&lt;/h2&gt;

    &lt;div class=&quot;formula&quot;&gt;
        Physics is the study of matter and the interactions of matter&lt;br&gt;
        &lt;span style=&quot;font-size: 0.85em; opacity: 0.9;&quot;&gt;物理學 = 研究物質與物質之間的相互作用&lt;/span&gt;
    &lt;/div&gt;

    &lt;h3&gt;🎯 本單元學什麼？&lt;/h3&gt;
    &lt;p&gt;這個學期你會學到 &lt;strong&gt;Energy（能量）&lt;/strong&gt; 這個物理學中最重要的概念之一。能量是讓所有事情發生的「燃料」—— 從你跑步、燈泡發光、到太陽照耀地球，都跟能量有關！&lt;/p&gt;

    &lt;div class=&quot;note-box&quot;&gt;
        &lt;strong&gt;💡 關鍵想法：&lt;/strong&gt; 能量儲存在「stores」中，並可以在不同形式之間「transfer（轉移）」。&lt;br&gt;
        &lt;span class=&quot;eng&quot;&gt;Energy is found in stores and allows work to be done.&lt;/span&gt;
    &lt;/div&gt;

    &lt;h3&gt;🌟 你會學到的核心概念&lt;/h3&gt;
    &lt;table&gt;
        &lt;tr&gt;&lt;th&gt;概念&lt;/th&gt;&lt;th&gt;說明&lt;/th&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Energy Stores&lt;/strong&gt; 能量儲存&lt;/td&gt;&lt;td&gt;能量可以儲存在 8 種不同形式（動能、位能、化學能等）&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Energy Transfer&lt;/strong&gt; 能量轉移&lt;/td&gt;&lt;td&gt;能量可以從一個儲存轉移到另一個&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Conservation&lt;/strong&gt; 能量守恆&lt;/td&gt;&lt;td&gt;能量不能被創造或消滅，只能轉移&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Heat Transfer&lt;/strong&gt; 熱能轉移&lt;/td&gt;&lt;td&gt;傳導、對流、輻射 三種方式&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Insulators &amp; Conductors&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;絕緣體和導體的差別&lt;/td&gt;&lt;/tr&gt;
    &lt;/table&gt;

    &lt;div class=&quot;tip-box&quot;&gt;
        &lt;strong&gt;📏 單位 Unit:&lt;/strong&gt; 能量的單位是 &lt;strong&gt;Joule (J) 焦耳&lt;/strong&gt;。1000 J = 1 kJ（千焦耳）。&lt;br&gt;
        舉例：吃一片土司 ≈ 300,000 J；走一步 ≈ 50 J。
    &lt;/div&gt;

    &lt;h3&gt;🌱 Tudor Habit: Responsibility（責任）&lt;/h3&gt;
    &lt;p&gt;透過學習能量資源（fossil fuels vs renewable energy）對地球的影響，培養對環境的責任感和永續發展（sustainability）的觀念。&lt;/p&gt;
&lt;/div&gt;

&lt;!-- ============ TAB 2: STORES ============ --&gt;
&lt;div id=&quot;stores&quot; class=&quot;tab-content&quot;&gt;
    &lt;h2&gt;🔋 八大能量儲存 / 8 Energy Stores&lt;/h2&gt;
    &lt;p&gt;能量可以儲存在以下八種不同形式中。記住它們對 GCSE 也有幫助！&lt;span class=&quot;eng&quot;&gt;點選卡片查看更多範例 →&lt;/span&gt;&lt;/p&gt;

    &lt;div class=&quot;stores-grid&quot;&gt;
        &lt;div class=&quot;store-card&quot; onclick=&quot;alert(&#x27;動能 (Kinetic Energy)\\n\\n• 任何在移動的物體\\n• 速度越快，動能越大\\n• 例子：跑步的人、行駛的車、飛翔的鳥&#x27;)&quot;&gt;
            &lt;div class=&quot;icon&quot;&gt;🏃&lt;/div&gt;
            &lt;div class=&quot;name&quot;&gt;Kinetic&lt;/div&gt;
            &lt;div class=&quot;chinese&quot;&gt;動能&lt;/div&gt;
            &lt;div class=&quot;example&quot;&gt;移動中的物體&lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;store-card&quot; onclick=&quot;alert(&#x27;重力位能 (Gravitational Potential Energy)\\n\\n• 物體在高處時擁有的能量\\n• 高度越高、質量越大，GPE 越大\\n• 例子：高架上的書、屋頂、樹頂的鳥&#x27;)&quot;&gt;
            &lt;div class=&quot;icon&quot;&gt;⛰️&lt;/div&gt;
            &lt;div class=&quot;name&quot;&gt;Gravitational&lt;/div&gt;
            &lt;div class=&quot;chinese&quot;&gt;重力位能&lt;/div&gt;
            &lt;div class=&quot;example&quot;&gt;高處的物體&lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;store-card&quot; onclick=&quot;alert(&#x27;彈性位能 (Elastic Potential Energy)\\n\\n• 物體被拉伸或壓縮時儲存的能量\\n• 例子：拉緊的彈簧、橡皮筋、弓&#x27;)&quot;&gt;
            &lt;div class=&quot;icon&quot;&gt;🪀&lt;/div&gt;
            &lt;div class=&quot;name&quot;&gt;Elastic&lt;/div&gt;
            &lt;div class=&quot;chinese&quot;&gt;彈性位能&lt;/div&gt;
            &lt;div class=&quot;example&quot;&gt;拉緊的彈簧&lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;store-card&quot; onclick=&quot;alert(&#x27;化學能 (Chemical Energy)\\n\\n• 儲存在化學鍵中的能量\\n• 食物、燃料、電池都有化學能\\n• 例子：巧克力、汽油、AA 電池&#x27;)&quot;&gt;
            &lt;div class=&quot;icon&quot;&gt;🍫&lt;/div&gt;
            &lt;div class=&quot;name&quot;&gt;Chemical&lt;/div&gt;
            &lt;div class=&quot;chinese&quot;&gt;化學能&lt;/div&gt;
            &lt;div class=&quot;example&quot;&gt;食物、電池、燃料&lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;store-card&quot; onclick=&quot;alert(&#x27;熱能 (Thermal Energy)\\n\\n• 物體溫度越高，熱能越多\\n• 粒子振動越快，熱能越大\\n• 例子：熱茶、火、夏天的沙灘&#x27;)&quot;&gt;
            &lt;div class=&quot;icon&quot;&gt;🔥&lt;/div&gt;
            &lt;div class=&quot;name&quot;&gt;Thermal&lt;/div&gt;
            &lt;div class=&quot;chinese&quot;&gt;熱能&lt;/div&gt;
            &lt;div class=&quot;example&quot;&gt;熱的物體&lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;store-card&quot; onclick=&quot;alert(&#x27;磁能 (Magnetic Energy)\\n\\n• 磁鐵吸引或排斥時儲存的能量\\n• 例子：冰箱磁鐵、磁懸浮列車&#x27;)&quot;&gt;
            &lt;div class=&quot;icon&quot;&gt;🧲&lt;/div&gt;
            &lt;div class=&quot;name&quot;&gt;Magnetic&lt;/div&gt;
            &lt;div class=&quot;chinese&quot;&gt;磁能&lt;/div&gt;
            &lt;div class=&quot;example&quot;&gt;磁鐵&lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;store-card&quot; onclick=&quot;alert(&#x27;靜電能 (Electrostatic Energy)\\n\\n• 帶電物體的能量\\n• 例子：摩擦過的氣球、閃電&#x27;)&quot;&gt;
            &lt;div class=&quot;icon&quot;&gt;⚡&lt;/div&gt;
            &lt;div class=&quot;name&quot;&gt;Electrostatic&lt;/div&gt;
            &lt;div class=&quot;chinese&quot;&gt;靜電能&lt;/div&gt;
            &lt;div class=&quot;example&quot;&gt;充電的氣球&lt;/div&gt;
        &lt;/div&gt;

        &lt;div class=&quot;store-card&quot; onclick=&quot;alert(&#x27;核能 (Nuclear Energy)\\n\\n• 儲存在原子核中的能量\\n• 例子：核能發電廠、太陽（核融合）&#x27;)&quot;&gt;
            &lt;div class=&quot;icon&quot;&gt;⚛️&lt;/div&gt;
            &lt;div class=&quot;name&quot;&gt;Nuclear&lt;/div&gt;
            &lt;div class=&quot;chinese&quot;&gt;核能&lt;/div&gt;
            &lt;div class=&quot;example&quot;&gt;原子核&lt;/div&gt;
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;h2&gt;♻️ 能量守恆定律&lt;/h2&gt;

    &lt;div class=&quot;formula&quot;&gt;
        Energy cannot be created or destroyed,&lt;br&gt;only transferred between stores.&lt;br&gt;
        &lt;span style=&quot;font-size: 0.85em; opacity: 0.9;&quot;&gt;能量不能被創造或消滅，只能在儲存之間轉移&lt;/span&gt;
    &lt;/div&gt;

    &lt;h3&gt;🔄 4 種轉移方式&lt;/h3&gt;
    &lt;table&gt;
        &lt;tr&gt;&lt;th&gt;方式&lt;/th&gt;&lt;th&gt;例子&lt;/th&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;By heating&lt;/strong&gt; 加熱&lt;/td&gt;&lt;td&gt;烤箱烤麵包、暖氣&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Mechanically&lt;/strong&gt; 機械方式&lt;/td&gt;&lt;td&gt;推、拉、敲、撞&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;Electrically&lt;/strong&gt; 用電&lt;/td&gt;&lt;td&gt;電線把電送到燈泡&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;By radiation&lt;/strong&gt; 輻射&lt;/td&gt;&lt;td&gt;陽光、聲波、電磁波&lt;/td&gt;&lt;/tr&gt;
    &lt;/table&gt;

    &lt;h3&gt;💡 經典轉移例子&lt;/h3&gt;
    &lt;div class=&quot;tip-box&quot;&gt;
        🕯 &lt;strong&gt;蠟燭&lt;/strong&gt;：化學（蠟）→ 熱 + 光&lt;br&gt;
        ⚽ &lt;strong&gt;踢足球&lt;/strong&gt;：化學（人體肌肉）→ 動能（球）&lt;br&gt;
        💧 &lt;strong&gt;水力發電&lt;/strong&gt;：重力位能 → 動能 → 電能&lt;br&gt;
        🌱 &lt;strong&gt;光合作用&lt;/strong&gt;：光（太陽）→ 化學能（植物）&lt;br&gt;
        🚗 &lt;strong&gt;電動車&lt;/strong&gt;：化學能（電池）→ 電能 → 動能
    &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ============ TAB 3: HEAT TRANSFER ============ --&gt;
&lt;div id=&quot;transfer&quot; class=&quot;tab-content&quot;&gt;
    &lt;h2&gt;🔥 熱能轉移三種方式&lt;/h2&gt;
    &lt;p&gt;熱能可以透過三種主要方式從熱處傳到冷處：&lt;/p&gt;

    &lt;div class=&quot;transfer-cards&quot;&gt;
        &lt;div class=&quot;transfer-card conduction&quot;&gt;
            &lt;div class=&quot;big-icon&quot;&gt;🔧&lt;/div&gt;
            &lt;h4&gt;Conduction 傳導&lt;/h4&gt;
            &lt;div class=&quot;subtitle&quot;&gt;在固體中（特別是金屬）&lt;/div&gt;
            &lt;ul&gt;
                &lt;li&gt;📍 發生於：固體（solids）&lt;/li&gt;
                &lt;li&gt;⚙️ 原理：粒子振動，撞擊鄰居&lt;/li&gt;
                &lt;li&gt;⚡ 金屬有自由電子 → 傳導快&lt;/li&gt;
                &lt;li&gt;📌 例子：金屬湯匙在熱湯中&lt;/li&gt;
            &lt;/ul&gt;
        &lt;/div&gt;

        &lt;div class=&quot;transfer-card convection&quot;&gt;
            &lt;div class=&quot;big-icon&quot;&gt;🌊&lt;/div&gt;
            &lt;h4&gt;Convection 對流&lt;/h4&gt;
            &lt;div class=&quot;subtitle&quot;&gt;在液體和氣體中&lt;/div&gt;
            &lt;ul&gt;
                &lt;li&gt;📍 發生於：液體 + 氣體（fluids）&lt;/li&gt;
                &lt;li&gt;⚙️ 原理：熱空氣上升，冷空氣下降&lt;/li&gt;
                &lt;li&gt;🔄 形成「對流環」（convection current）&lt;/li&gt;
                &lt;li&gt;📌 例子：暖氣讓房間溫暖&lt;/li&gt;
            &lt;/ul&gt;
        &lt;/div&gt;

        &lt;div class=&quot;transfer-card radiation&quot;&gt;
            &lt;div class=&quot;big-icon&quot;&gt;☀️&lt;/div&gt;
            &lt;h4&gt;Radiation 輻射&lt;/h4&gt;
            &lt;div class=&quot;subtitle&quot;&gt;真空中也可以！&lt;/div&gt;
            &lt;ul&gt;
                &lt;li&gt;📍 發生於：任何地方（包括真空）&lt;/li&gt;
                &lt;li&gt;⚙️ 原理：電磁波（紅外線）&lt;/li&gt;
                &lt;li&gt;🚫 不需要粒子！&lt;/li&gt;
                &lt;li&gt;📌 例子：太陽光加熱地球&lt;/li&gt;
            &lt;/ul&gt;
        &lt;/div&gt;
    &lt;/div&gt;

    &lt;h3&gt;🆚 三種方式的對比&lt;/h3&gt;
    &lt;table&gt;
        &lt;tr&gt;&lt;th&gt;項目&lt;/th&gt;&lt;th&gt;Conduction&lt;/th&gt;&lt;th&gt;Convection&lt;/th&gt;&lt;th&gt;Radiation&lt;/th&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;需要粒子嗎？&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;✅ 是&lt;/td&gt;&lt;td&gt;✅ 是&lt;/td&gt;&lt;td&gt;❌ 否&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;能在真空中嗎？&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;❌ 不行&lt;/td&gt;&lt;td&gt;❌ 不行&lt;/td&gt;&lt;td&gt;✅ 可以&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;主要發生在&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;固體&lt;/td&gt;&lt;td&gt;液體/氣體&lt;/td&gt;&lt;td&gt;任何地方&lt;/td&gt;&lt;/tr&gt;
        &lt;tr&gt;&lt;td&gt;&lt;strong&gt;速度&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;慢&lt;/td&gt;&lt;td&gt;中&lt;/td&gt;&lt;td&gt;非常快（光速）&lt;/td&gt;&lt;/tr&gt;
    &lt;/table&gt;

    &lt;div class=&quot;warning-box&quot;&gt;
        &lt;strong&gt;⚠️ 考試秘訣 Exam Tips：&lt;/strong&gt;
        &lt;ul style=&quot;margin-top: 8px; padding-left: 20px;&quot;&gt;
            &lt;li&gt;看到「&lt;strong&gt;vacuum / space 真空/太空&lt;/strong&gt;」→ Radiation&lt;/li&gt;
            &lt;li&gt;看到「&lt;strong&gt;black 黑色&lt;/strong&gt;」→ 吸/放熱輻射最強&lt;/li&gt;
            &lt;li&gt;看到「&lt;strong&gt;shiny silver 銀亮&lt;/strong&gt;」→ 反射輻射最強&lt;/li&gt;
            &lt;li&gt;看到「&lt;strong&gt;liquid / gas 液氣&lt;/strong&gt;」→ 通常是 Convection&lt;/li&gt;
            &lt;li&gt;看到「&lt;strong&gt;metal 金屬&lt;/strong&gt;」→ 通常是 Conduction&lt;/li&gt;
        &lt;/ul&gt;

&lt;script&gt;
// ============ TAB SWITCHING ============
function showTab(tabId) {
    document.querySelectorAll(&#x27;.tab-content&#x27;).forEach(t =&gt; t.classList.remove(&#x27;active&#x27;));
    document.querySelectorAll(&#x27;.tab-btn&#x27;).forEach(b =&gt; b.classList.remove(&#x27;active&#x27;));

// ============ QUIZ DATA &amp; LOGIC ============
const quizData = [
    {
        q: &quot;What is the unit of energy?&quot;,
        zh: &quot;能量的單位是什麼？&quot;,
        options: [&quot;Newton (N)&quot;, &quot;Joule (J)&quot;, &quot;Watt (W)&quot;, &quot;Kelvin (K)&quot;],
        correct: 1,
        explain: &quot;焦耳（Joule, J）是能量的標準國際單位。&quot;
    },
    {
        q: &quot;Which of these is NOT an energy store?&quot;,
        zh: &quot;下列哪一個「不是」能量儲存？&quot;,
        options: [&quot;Kinetic&quot;, &quot;Chemical&quot;, &quot;Sound&quot;, &quot;Gravitational&quot;],
        correct: 2,
        explain: &quot;聲音（Sound）是能量「轉移」的方式，不是儲存方式。&quot;
    },
    {
        q: &quot;Which heat transfer can travel through a vacuum?&quot;,
        zh: &quot;哪種熱能轉移可以在真空中傳遞？&quot;,
        options: [&quot;Conduction&quot;, &quot;Convection&quot;, &quot;Radiation&quot;, &quot;Insulation&quot;],
        correct: 2,
        explain: &quot;只有輻射（Radiation）不需要粒子。這就是太陽如何加熱地球的原因！&quot;
    },
    {
        q: &quot;Why are metals good thermal conductors?&quot;,
        zh: &quot;為什麼金屬是好的熱導體？&quot;,
        options: [&quot;They have free electrons&quot;, &quot;They are heavy&quot;, &quot;They are shiny&quot;, &quot;They are cold&quot;],
        correct: 0,
        explain: &quot;金屬有自由電子（free electrons），可以快速傳遞能量。&quot;
    },
    {
        q: &quot;Convection mainly happens in:&quot;,
        zh: &quot;對流主要發生在：&quot;,
        options: [&quot;Solids only&quot;, &quot;Liquids and gases&quot;, &quot;Vacuums&quot;, &quot;Metals only&quot;],
        correct: 1,
        explain: &quot;對流需要粒子能夠移動，所以只發生在液體和氣體中。&quot;
    },
    {
        q: &quot;Energy can be:&quot;,
        zh: &quot;能量可以：&quot;,
        options: [&quot;Created and destroyed&quot;, &quot;Only created&quot;, &quot;Only destroyed&quot;, &quot;Transferred but not created or destroyed&quot;],
        correct: 3,
        explain: &quot;能量守恆定律：能量不能被創造或消滅，只能轉移。&quot;
    },
    {
        q: &quot;Which colour is the BEST absorber of thermal radiation?&quot;,
        zh: &quot;哪種顏色是熱輻射最好的吸收者？&quot;,
        options: [&quot;White&quot;, &quot;Silver&quot;, &quot;Black&quot;, &quot;Red&quot;],
        correct: 2,
        explain: &quot;黑色（Black）吸收和發射輻射的能力最強。所以夏天穿白色比較涼！&quot;
    },
    {
        q: &quot;A stretched rubber band stores which type of energy?&quot;,
        zh: &quot;一條拉緊的橡皮筋儲存哪種能量？&quot;,
        options: [&quot;Chemical&quot;, &quot;Magnetic&quot;, &quot;Elastic potential&quot;, &quot;Nuclear&quot;],
        correct: 2,
        explain: &quot;拉伸或壓縮的物體儲存彈性位能（Elastic potential energy）。&quot;
    },
    {
        q: &quot;Which is a GOOD insulator?&quot;,
        zh: &quot;哪一個是好的絕緣體？&quot;,
        options: [&quot;Copper&quot;, &quot;Iron&quot;, &quot;Air&quot;, &quot;Aluminium&quot;],
        correct: 2,
        explain: &quot;空氣是極佳的絕緣體！這就是為什麼羽絨衣中間有空氣可以保暖。&quot;
    },
    {
        q: &quot;A vacuum flask stops heat loss by conduction because:&quot;,
        zh: &quot;保溫瓶能阻止傳導散熱是因為：&quot;,
        options: [&quot;It is shiny&quot;, &quot;It has a vacuum (no particles)&quot;, &quot;It is sealed&quot;, &quot;It is small&quot;],
        correct: 1,
        explain: &quot;真空中沒有粒子，所以傳導和對流都無法發生！&quot;

let currentQuestion = 0;
let score = 0;
let selected = -1;

function loadQuestion() {
    const q = quizData[currentQuestion];
    document.getElementById(&#x27;q-text&#x27;).textContent = q.q;
    document.getElementById(&#x27;q-zh&#x27;).textContent = q.zh;
    document.getElementById(&#x27;q-current&#x27;).textContent = currentQuestion + 1;
    document.getElementById(&#x27;q-total&#x27;).textContent = quizData.length;

    const optsEl = document.getElementById(&#x27;q-options&#x27;);
    optsEl.innerHTML = &#x27;&#x27;;
    q.options.forEach((opt, idx) =&gt; {
        const li = document.createElement(&#x27;li&#x27;);
        li.textContent = String.fromCharCode(65 + idx) + &#x27;. &#x27; + opt;
        li.onclick = () =&gt; selectOption(idx, li);
        optsEl.appendChild(li);
    });

    document.getElementById(&#x27;feedback&#x27;).classList.remove(&#x27;show&#x27;, &#x27;correct&#x27;, &#x27;wrong&#x27;);
    document.getElementById(&#x27;next-btn&#x27;).disabled = true;
    document.getElementById(&#x27;progress-bar&#x27;).style.width = ((currentQuestion) / quizData.length * 100) + &#x27;%&#x27;;
    selected = -1;
}

function selectOption(idx, el) {
    if (selected !== -1) return;
    selected = idx;

    const q = quizData[currentQuestion];
    const items = document.querySelectorAll(&#x27;.options-list li&#x27;);
    const feedback = document.getElementById(&#x27;feedback&#x27;);

    items.forEach((item, i) =&gt; {
        item.style.cursor = &#x27;default&#x27;;
        if (i === q.correct) item.classList.add(&#x27;correct&#x27;);
        if (i === idx &amp;&amp; i !== q.correct) item.classList.add(&#x27;wrong&#x27;);
    });

    if (idx === q.correct) {
        score++;
        feedback.className = &#x27;quiz-feedback correct show&#x27;;
        feedback.innerHTML = &#x27;&lt;strong&gt;✅ 答對了！&lt;/strong&gt; &#x27; + q.explain;
    } else {
        feedback.className = &#x27;quiz-feedback wrong show&#x27;;
        feedback.innerHTML = &#x27;&lt;strong&gt;❌ 答錯了。&lt;/strong&gt; &#x27; + q.explain;
    }

    document.getElementById(&#x27;next-btn&#x27;).disabled = false;
    if (currentQuestion === quizData.length - 1) {
        document.getElementById(&#x27;next-btn&#x27;).textContent = &#x27;查看結果 →&#x27;;
    }
}

function nextQuestion() {
    currentQuestion++;
    if (currentQuestion &gt;= quizData.length) {
        showResults();
    } else {
        loadQuestion();
    }
}

function showResults() {
    document.getElementById(&#x27;quiz-screen&#x27;).style.display = &#x27;none&#x27;;
    document.getElementById(&#x27;results-screen&#x27;).style.display = &#x27;block&#x27;;
    document.getElementById(&#x27;final-score&#x27;).textContent = score;

    let msg;
    if (score === 10) msg = &#x27;🌟 完美！你完全掌握了 Energy 主題！&#x27;;
    else if (score &gt;= 8) msg = &#x27;✨ 太棒了！你的程度很好！&#x27;;
    else if (score &gt;= 6) msg = &#x27;👍 不錯！還有一些可以加強的地方。&#x27;;
    else if (score &gt;= 4) msg = &#x27;📚 加油！再複習一下 Cheat Sheet 就會更熟！&#x27;;
    else msg = &#x27;💪 別灰心！從頭看一次概覽，你會進步的！&#x27;;

    document.getElementById(&#x27;result-message&#x27;).textContent = msg;
}

function restartQuiz() {
    currentQuestion = 0;
    score = 0;
    document.getElementById(&#x27;quiz-screen&#x27;).style.display = &#x27;block&#x27;;
    document.getElementById(&#x27;results-screen&#x27;).style.display = &#x27;none&#x27;;
    document.getElementById(&#x27;next-btn&#x27;).textContent = &#x27;下一題 →&#x27;;
    loadQuestion();
}

loadQuestion();

// ============ MEMORY MATCH GAME ============
const matchPairs = [
    { en: &#x27;Conduction&#x27;, zh: &#x27;傳導&#x27; },
    { en: &#x27;Convection&#x27;, zh: &#x27;對流&#x27; },
    { en: &#x27;Radiation&#x27;, zh: &#x27;輻射&#x27; },
    { en: &#x27;Joule&#x27;, zh: &#x27;焦耳&#x27; },
    { en: &#x27;Insulator&#x27;, zh: &#x27;絕緣體&#x27; },
    { en: &#x27;Conductor&#x27;, zh: &#x27;導體&#x27; },
    { en: &#x27;Kinetic&#x27;, zh: &#x27;動能&#x27; },
    { en: &#x27;Vacuum&#x27;, zh: &#x27;真空&#x27; }
];

let matchCards = [];
let flippedCards = [];
let matchedCount = 0;
let moves = 0;

function initMatchGame() {
    matchCards = [];
    matchPairs.forEach(pair =&gt; {
        matchCards.push({ text: pair.en, type: &#x27;en&#x27;, pairId: pair.en });
        matchCards.push({ text: pair.zh, type: &#x27;zh&#x27;, pairId: pair.en });
    });

    // Shuffle
    for (let i = matchCards.length - 1; i &gt; 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [matchCards[i], matchCards[j]] = [matchCards[j], matchCards[i]];
    }

    const grid = document.getElementById(&#x27;matchGrid&#x27;);
    grid.innerHTML = &#x27;&#x27;;
    matchCards.forEach((card, idx) =&gt; {
        const cardEl = document.createElement(&#x27;div&#x27;);
        cardEl.className = &#x27;match-card hidden-text&#x27;;
        cardEl.textContent = card.text;
        cardEl.dataset.index = idx;
        cardEl.dataset.pairId = card.pairId;
        cardEl.onclick = () =&gt; flipMatchCard(cardEl);
        grid.appendChild(cardEl);
    });

    flippedCards = [];
    matchedCount = 0;
    moves = 0;
    document.getElementById(&#x27;moves&#x27;).textContent = moves;
    document.getElementById(&#x27;matched&#x27;).textContent = matchedCount;
    document.getElementById(&#x27;matchVictory&#x27;).style.display = &#x27;none&#x27;;
}

function flipMatchCard(card) {
    if (card.classList.contains(&#x27;matched&#x27;) || card.classList.contains(&#x27;flipped&#x27;) || flippedCards.length &gt;= 2) return;

    card.classList.add(&#x27;flipped&#x27;);
    card.classList.remove(&#x27;hidden-text&#x27;);
    flippedCards.push(card);

    if (flippedCards.length === 2) {
        moves++;
        document.getElementById(&#x27;moves&#x27;).textContent = moves;

        if (flippedCards[0].dataset.pairId === flippedCards[1].dataset.pairId) {
            setTimeout(() =&gt; {
                flippedCards.forEach(c =&gt; {
                    c.classList.add(&#x27;matched&#x27;);
                    c.classList.remove(&#x27;flipped&#x27;);
                });
                matchedCount++;
                document.getElementById(&#x27;matched&#x27;).textContent = matchedCount;
                flippedCards = [];

                if (matchedCount === matchPairs.length) {
                    setTimeout(() =&gt; {
                        document.getElementById(&#x27;finalMoves&#x27;).textContent = moves;
                        document.getElementById(&#x27;matchVictory&#x27;).style.display = &#x27;block&#x27;;
                    }, 400);
                }
            }, 500);
        } else {
            setTimeout(() =&gt; {
                flippedCards.forEach(c =&gt; {
                    c.classList.remove(&#x27;flipped&#x27;);
                    c.classList.add(&#x27;hidden-text&#x27;);
                });
                flippedCards = [];
            }, 1000);
        }
    }
}

function resetMatchGame() {
    initMatchGame();
}

initMatchGame();
&lt;/script&gt;

// =========================================================
// QUESTION BANKS — built from official Tudor Grange Spring Learning Journey
// =========================================================

// 1. UNIT 1 KEY VOCAB
const VOCAB1 = [
  { term: &quot;Enjambment&quot;, def: &quot;When a sentence runs over a line break (no punctuation at the line end)&quot;, wrongs: [&quot;A pause in the middle of a line&quot;, &quot;A type of rhyming pattern&quot;, &quot;A 14-line poem&quot;] },
  { term: &quot;Tone&quot;, def: &quot;The mood or attitude of a poem (defiant, hopeful, sad, etc.)&quot;, wrongs: [&quot;The volume the poem should be read at&quot;, &quot;The sound of words rhyming&quot;, &quot;The number of lines&quot;] },
  { term: &quot;Sensory language&quot;, def: &quot;Language that appeals to the five senses to make the reader feel the experience&quot;, wrongs: [&quot;Language only about feelings/emotions&quot;, &quot;Language with rhyming words&quot;, &quot;Language used only in love poems&quot;] },
  { term: &quot;Defiance&quot;, def: &quot;Bold refusal to obey or accept; standing up against pressure&quot;, wrongs: [&quot;Quietly accepting one&#x27;s situation&quot;, &quot;Feeling sad about something&quot;, &quot;A type of rhyme scheme&quot;] },
  { term: &quot;Identity&quot;, def: &quot;Who you are — culture, beliefs, language, family, body, experience&quot;, wrongs: [&quot;Your home address&quot;, &quot;Your favourite hobby&quot;, &quot;Your school subjects&quot;] },
  { term: &quot;Explain&quot;, def: &quot;To make something clear by giving REASONS or showing HOW it works&quot;, wrongs: [&quot;To list things in order&quot;, &quot;To copy out a quote&quot;, &quot;To translate from another language&quot;] }
];

// 2. SPOT THE TONE — quotes from identity-style poems
const TONE_LINES = [
  { line: &quot;I will not bend. I will not break. My name is mine.&quot;, tone: &quot;Defiant&quot;, explain: &quot;Repetition of \u2018I will not\u2019 + ownership claim = bold refusal. DEFIANT.&quot; },
  { line: &quot;I miss the smell of my grandmother&#x27;s kitchen, gone now, forever gone.&quot;, tone: &quot;Nostalgic&quot;, explain: &quot;Sensory memory + word \u2018gone\u2019 + repetition of loss = NOSTALGIC longing for the past.&quot; },
  { line: &quot;Tomorrow I will rise. Tomorrow I will speak my name aloud.&quot;, tone: &quot;Hopeful&quot;, explain: &quot;Future-tense verbs (\u2018will rise\u2019, \u2018will speak\u2019) + repetition = HOPEFUL.&quot; },
  { line: &quot;Here \u2014 there. Then \u2014 now. Who am I?&quot;, tone: &quot;Conflicted&quot;, explain: &quot;Contrasts (here/there, then/now) + rhetorical question about identity = CONFLICTED.&quot; },
  { line: &quot;How dare you decide what I should call myself?&quot;, tone: &quot;Angry&quot;, explain: &quot;Direct address (\u2018you\u2019), accusatory rhetorical question, exclamation = ANGRY.&quot; },

const $quiz = document.getElementById(&#x27;quizArea&#x27;);

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i &gt; 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickN(arr, n) { return shuffle(arr).slice(0, n); }

function buildVocab1Quiz() {
  return pickN(VOCAB1, 6).map(item =&gt; {
    const askForDef = Math.random() &gt; 0.5;
    if (askForDef) {
      const opts = shuffle([item.def, ...item.wrongs]);
      return {
        type: &#x27;mcq&#x27;,
        bigDisplay: item.term,
        prompt: &#x27;Identity vocabulary&#x27;,
        question: `What does &quot;${item.term}&quot; mean?`,
        options: opts,
        correct: opts.indexOf(item.def),
        explain: `${item.term} = ${item.def}`
      };
    } else {
      const distractors = pickN(VOCAB1.filter(d =&gt; d.term !== item.term), 3).map(d =&gt; d.term);
      const opts = shuffle([item.term, ...distractors]);
      return {
        type: &#x27;mcq&#x27;,
        prompt: &#x27;Identity vocabulary&#x27;,
        question: `Which term means: &quot;${item.def}&quot;?`,
        options: opts,
        correct: opts.indexOf(item.term),
        explain: `${item.term} = ${item.def}`
      };
    }
  });
}
