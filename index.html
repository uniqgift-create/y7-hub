<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    min-height: 100dvh;
  }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* HOME */
  .home {
    padding: 20px 16px 32px;
    max-width: 720px;
    margin: 0 auto;
  }
  .home-header {
    text-align: center;
    margin-bottom: 24px;
    padding-top: 8px;
  }
  .home-header h1 {
    margin: 0 0 6px;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .home-header p {
    margin: 0;
    color: #94a3b8;
    font-size: 14px;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 14px 16px;
    background: #1e293b;
    border: 1px solid #334155;
    border-left: 4px solid var(--accent, #64748b);
    border-radius: 14px;
    color: #e2e8f0;
    text-align: left;
    cursor: pointer;
    font: inherit;
    transition: transform 0.1s ease, background 0.15s ease;
  }
  .card:active { transform: scale(0.98); background: #273449; }
  .card-emoji { font-size: 28px; flex-shrink: 0; line-height: 1; }
  .card-text { flex: 1; min-width: 0; }
  .card-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .card-subtitle { font-size: 13px; color: #94a3b8; }
  .card-arrow { font-size: 24px; color: #64748b; flex-shrink: 0; }

  .footnote {
    margin-top: 28px;
    padding: 14px;
    background: #1e293b;
    border-radius: 12px;
    font-size: 12px;
    color: #94a3b8;
    line-height: 1.5;
  }
  .footnote strong { color: #cbd5e1; }

  /* PANEL (full-screen quiz view) */
  .panel {
    position: fixed;
    inset: 0;
    background: #0f172a;
    display: flex;
    flex-direction: column;
    z-index: 10;
  }
  .panel-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    padding-top: calc(10px + env(safe-area-inset-top));
    background: #1e293b;
    border-bottom: 2px solid var(--accent, #64748b);
    flex-shrink: 0;
  }
  .back-btn {
    background: #334155;
    color: #e2e8f0;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .back-btn:active { background: #475569; }
  .panel-title {
    font-size: 16px;
    font-weight: 600;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .quiz-frame {
    flex: 1;
    width: 100%;
    border: none;
    background: white;
    /* iOS Safari needs this trick to allow proper scrolling inside iframes */
    -webkit-overflow-scrolling: touch;
  }

  /* Hide home when a panel is shown */
  body.in-panel .home { display: none; }
</style>
</head>

    --bg: #F4F1E8;

  .container {

  /* --- Header --- */
  header {

  h1 {

    font-style: italic;

  /* --- Mode selector --- */
  .mode-grid {
    display: grid;
    grid-template-columns: 1fr;

  .mode-card:hover {
    transform: translate(-2px, -2px);

  }
  .mode-card.active {
    background: var(--ink);
    color: var(--paper);

  .mode-card.active .mode-num {
    color: var(--accent);
  }
  .mode-num {
    font-size: 38px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    font-family: &#x27;Courier New&#x27;, monospace;
  }
  .mode-title {
    font-weight: 900;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 8px;

  .mode-desc {

  /* --- Quiz card --- */
  .quiz {

  .big-display {

  .options {

  .option {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 14px 18px;
    cursor: pointer;
    font-family: inherit;
    font-size: 17px;
    color: var(--ink);
    text-align: left;
    transition: all 0.15s;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .option:hover:not(:disabled) {
    background: var(--ink);
    color: var(--paper);
  }
  .option:disabled { cursor: default; opacity: 0.6; }
  .option.correct {
    background: var(--good-soft) !important;
    border-color: var(--good) !important;
    color: var(--good) !important;
    opacity: 1;

  .option.wrong {
    background: var(--accent-soft) !important;
    border-color: var(--accent) !important;
    color: var(--accent) !important;
    opacity: 1;
  }
  .option .letter {
    background: var(--ink);
    color: var(--paper);

    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: &#x27;Courier New&#x27;, monospace;
    font-weight: 900;
    font-size: 13px;
    flex-shrink: 0;
  }
  .option.correct .letter { background: var(--good); }
  .option.wrong .letter { background: var(--accent); }

  /* --- Text input mode --- */
  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;

  .input-row input {
    flex: 1;

    font-family: inherit;

    font-weight: 900;

  .feedback {
    margin-top: 18px;

  .feedback.correct strong { color: var(--good); }
  .feedback.wrong strong { color: var(--accent); }

  .controls {

    display: flex;
    gap: 10px;
    justify-content: flex-end;

  }

// =========================================================

const ELEMENTS = [
  { sym: &#x27;H&#x27;,  name: &#x27;Hydrogen&#x27; },
  { sym: &#x27;He&#x27;, name: &#x27;Helium&#x27; },
  { sym: &#x27;Li&#x27;, name: &#x27;Lithium&#x27; },

  { sym: &#x27;N&#x27;,  name: &#x27;Nitrogen&#x27; },

// =========================================================
// QUIZ ENGINE
// =========================================================

let state = {
  mode: null,
  questions: [],
  current: 0,
  score: 0,
  answered: false
};

const $quiz = document.getElementById(&#x27;quizArea&#x27;);
const $modes = document.getElementById(&#x27;modeGrid&#x27;);

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i &gt; 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickN(arr, n) { return shuffle(arr).slice(0, n); }

// --- Build symbol-quiz questions
function buildSymbolQuiz() {
  const picked = pickN(ELEMENTS, 10);
  return picked.map(el =&gt; {
    // Half ask &quot;what is the name?&quot;, half ask &quot;what is the symbol?&quot;
    const askName = Math.random() &gt; 0.5;
    const allOthers = ELEMENTS.filter(e =&gt; e.sym !== el.sym);
    const distractors = pickN(allOthers, 3);
    if (askName) {
      const opts = shuffle([el, ...distractors]).map(e =&gt; e.name);
      return {
        type: &#x27;symbol&#x27;,
        bigDisplay: el.sym,
        prompt: &#x27;What element is this?&#x27;,
        sub: &#x27;Pick the correct name&#x27;,
        options: opts,
        correct: opts.indexOf(el.name),
        explain: `${el.sym} is the symbol for ${el.name}.`
      };
    } else {
      const opts = shuffle([el, ...distractors]).map(e =&gt; e.sym);
      return {
        type: &#x27;name&#x27;,
        bigDisplay: el.name,
        bigDisplayClass: &#x27;small-text&#x27;,
        prompt: &#x27;What is the symbol for this element?&#x27;,
        sub: &#x27;Pick the correct symbol&#x27;,
        options: opts,
        correct: opts.indexOf(el.sym),
        explain: `The symbol for ${el.name} is ${el.sym}.`
      };
    }
  });
}

function buildAtomQuiz() {
  const picked = pickN(FORMULAE, 8);
  return picked.map(f =&gt; ({
    type: &#x27;atoms&#x27;,
    formula: f,
    prompt: &#x27;How many atoms of each element?&#x27;,
    sub: &#x27;Type the count for each. Total auto-calculates.&#x27;,
    explain: &#x27;&#x27;
  }));
}

function buildMixedQuiz() {
  return pickN(MIXED_QUESTIONS, 12);
}

function startQuiz(mode) {
  state.mode = mode;
  state.current = 0;
  state.score = 0;
  state.answered = false;
  if (mode === &#x27;symbols&#x27;)      state.questions = buildSymbolQuiz();
  else if (mode === &#x27;atoms&#x27;)   state.questions = buildAtomQuiz();
  else                          state.questions = buildMixedQuiz();
  // Highlight active mode card
  document.querySelectorAll(&#x27;.mode-card&#x27;).forEach(c =&gt; {
    c.classList.toggle(&#x27;active&#x27;, c.dataset.mode === mode);
  });
  renderQuestion();
}

function renderQuestion() {
  const total = state.questions.length;
  if (state.current &gt;= total) {
    renderFinal();
    return;
  }
  const q = state.questions[state.current];

  let body = &#x27;&#x27;;
  if (q.type === &#x27;atoms&#x27;) body = renderAtomQuestion(q);
  else                    body = renderMCQ(q);

  $quiz.innerHTML = `
    &lt;div class=&quot;quiz&quot;&gt;
      &lt;div class=&quot;progress-bar&quot;&gt;
        &lt;span class=&quot;progress-text&quot;&gt;Question ${state.current + 1} / ${total}&lt;/span&gt;
        &lt;span class=&quot;score-pill&quot;&gt;&lt;span class=&quot;accent&quot;&gt;●&lt;/span&gt; Score: ${state.score}/${state.current}&lt;/span&gt;
      &lt;/div&gt;
      ${body}
    &lt;/div&gt;
  `;
  attachHandlers(q);
}

function renderMCQ(q) {
  const big = q.bigDisplay
    ? `&lt;div class=&quot;big-display&quot;&gt;&lt;div class=&quot;big-symbol${q.bigDisplayClass ? &#x27; &#x27; + q.bigDisplayClass : &#x27;&#x27;}&quot; style=&quot;${q.bigDisplay.length &gt; 4 ? &#x27;font-size:36px&#x27; : &#x27;&#x27;}&quot;&gt;${q.bigDisplay}&lt;/div&gt;&lt;/div&gt;`
    : &#x27;&#x27;;
  const letters = [&#x27;A&#x27;, &#x27;B&#x27;, &#x27;C&#x27;, &#x27;D&#x27;];
  const opts = q.options.map((o, i) =&gt; `
    &lt;button class=&quot;option&quot; data-index=&quot;${i}&quot;&gt;
      &lt;span class=&quot;letter&quot;&gt;${letters[i]}&lt;/span&gt;
      &lt;span&gt;${o}&lt;/span&gt;
    &lt;/button&gt;
  `).join(&#x27;&#x27;);
  const twoCol = q.options.every(o =&gt; o.length &lt; 14) ? &#x27;two-col&#x27; : &#x27;&#x27;;
  return `
    &lt;div class=&quot;question-label&quot;&gt;${q.prompt || &#x27;Question&#x27;}&lt;/div&gt;
    &lt;div class=&quot;question&quot;&gt;${q.q || &#x27;&#x27;}&lt;/div&gt;
    ${q.sub ? `&lt;div class=&quot;question-sub&quot;&gt;${q.sub}&lt;/div&gt;` : &#x27;&#x27;}
    ${big}
    &lt;div class=&quot;options ${twoCol}&quot; id=&quot;optionList&quot;&gt;${opts}&lt;/div&gt;
    &lt;div id=&quot;feedbackArea&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;controlArea&quot;&gt;&lt;/div&gt;
  `;
}

function renderAtomQuestion(q) {
  const elements = Object.keys(q.formula.atoms);
  const rows = elements.map(el =&gt; `
    &lt;div class=&quot;atom-row&quot;&gt;
      &lt;label&gt;${el}&lt;/label&gt;
      &lt;input type=&quot;number&quot; min=&quot;0&quot; max=&quot;50&quot; data-el=&quot;${el}&quot; placeholder=&quot;?&quot;&gt;
    &lt;/div&gt;
  `).join(&#x27;&#x27;);
  return `
    &lt;div class=&quot;question-label&quot;&gt;Counting atoms&lt;/div&gt;
    &lt;div class=&quot;question&quot;&gt;How many atoms of each element?&lt;/div&gt;
    &lt;div class=&quot;question-sub&quot;&gt;Read the subscript numbers carefully — no number means 1.&lt;/div&gt;
    &lt;div class=&quot;big-display&quot;&gt;&lt;div class=&quot;big-symbol&quot;&gt;${q.formula.html}&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;atom-counts&quot;&gt;${rows}&lt;/div&gt;
    &lt;div class=&quot;controls&quot;&gt;
      &lt;button class=&quot;btn&quot; id=&quot;checkBtn&quot;&gt;Check Answer&lt;/button&gt;
    &lt;/div&gt;
    &lt;div id=&quot;feedbackArea&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;controlArea&quot;&gt;&lt;/div&gt;
  `;
}

function attachHandlers(q) {
  if (q.type === &#x27;atoms&#x27;) {
    document.getElementById(&#x27;checkBtn&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; checkAtoms(q));
    // Also allow Enter key
    document.querySelectorAll(&#x27;.atom-row input&#x27;).forEach(inp =&gt; {
      inp.addEventListener(&#x27;keypress&#x27;, e =&gt; {
        if (e.key === &#x27;Enter&#x27;) checkAtoms(q);
      });
    });
    // Auto-focus first input
    const first = document.querySelector(&#x27;.atom-row input&#x27;);
    if (first) first.focus();
  } else {
    document.querySelectorAll(&#x27;.option&#x27;).forEach(btn =&gt; {
      btn.addEventListener(&#x27;click&#x27;, () =&gt; handleMCQ(btn, q));
    });
  }
}

function handleMCQ(btn, q) {
  if (state.answered) return;
  state.answered = true;
  const idx = parseInt(btn.dataset.index);
  const correct = idx === q.correct;
  if (correct) state.score++;
  // Mark all
  document.querySelectorAll(&#x27;.option&#x27;).forEach((b, i) =&gt; {
    b.disabled = true;
    if (i === q.correct) b.classList.add(&#x27;correct&#x27;);
    else if (i === idx) b.classList.add(&#x27;wrong&#x27;);
  });
  showFeedback(correct, q.explain || &#x27;&#x27;);
  showNextButton();
}

function checkAtoms(q) {
  if (state.answered) return;
  state.answered = true;
  const inputs = document.querySelectorAll(&#x27;.atom-row input&#x27;);
  let allRight = true;
  let answers = {};
  let userTotal = 0;
  inputs.forEach(inp =&gt; {
    const el = inp.dataset.el;
    const v = parseInt(inp.value) || 0;
    answers[el] = v;
    userTotal += v;
    if (v !== q.formula.atoms[el]) allRight = false;
    inp.disabled = true;
  });
  const correctTotal = Object.values(q.formula.atoms).reduce((a, b) =&gt; a + b, 0);
  if (allRight) state.score++;

  let msg = &#x27;&#x27;;
  Object.keys(q.formula.atoms).forEach(el =&gt; {
    const correct = q.formula.atoms[el];
    const user = answers[el];
    if (user === correct) {
      msg += `&lt;span style=&quot;color:var(--good)&quot;&gt;✓ ${el}: ${correct}&lt;/span&gt; &amp;nbsp; `;
    } else {
      msg += `&lt;span style=&quot;color:var(--accent)&quot;&gt;✗ ${el}: you said ${user}, correct is ${correct}&lt;/span&gt; &amp;nbsp; `;
    }
  });
  msg += `&lt;br&gt;&lt;br&gt;&lt;strong&gt;Total atoms: ${correctTotal}&lt;/strong&gt;`;

  showFeedback(allRight, msg);
  showNextButton();
}

function showFeedback(correct, html) {
  const fa = document.getElementById(&#x27;feedbackArea&#x27;);
  fa.innerHTML = `
    &lt;div class=&quot;feedback ${correct ? &#x27;correct&#x27; : &#x27;wrong&#x27;} flash&quot;&gt;
      &lt;strong&gt;${correct ? &#x27;✓ Correct!&#x27; : &#x27;✗ Not quite&#x27;}&lt;/strong&gt;
      ${html}
    &lt;/div&gt;
  `;
}

function showNextButton() {
  const ca = document.getElementById(&#x27;controlArea&#x27;);
  const isLast = state.current === state.questions.length - 1;
  ca.innerHTML = `
    &lt;div class=&quot;controls&quot;&gt;
      &lt;button class=&quot;btn&quot; id=&quot;nextBtn&quot;&gt;${isLast ? &#x27;See Results&#x27; : &#x27;Next Question →&#x27;}&lt;/button&gt;
    &lt;/div&gt;
  `;
  document.getElementById(&#x27;nextBtn&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
    state.current++;
    state.answered = false;
    renderQuestion();
  });
}

function renderFinal() {
  const total = state.questions.length;
  const pct = Math.round((state.score / total) * 100);
  let grade, msg, icon;
  if (pct &gt;= 85)      { grade = &quot;Excellent&quot;; msg = &quot;Outstanding work — you&#x27;re exam-ready!&quot;; icon = &quot;★&quot;; }
  else if (pct &gt;= 70) { grade = &quot;Good&quot;;      msg = &quot;Solid grasp. Review the ones you missed and try again.&quot;; icon = &quot;✓&quot;; }
  else if (pct &gt;= 50) { grade = &quot;Developing&quot;;msg = &quot;On the right track. Re-do this mode and check the cheat sheet.&quot;; icon = &quot;↗&quot;; }
  else                { grade = &quot;Keep going&quot;;msg = &quot;Don&#x27;t worry — read the cheat sheet, then try again. Practice makes it stick.&quot;; icon = &quot;↻&quot;; }

  $quiz.innerHTML = `
    &lt;div class=&quot;quiz result&quot;&gt;
      &lt;div class=&quot;result-icon&quot;&gt;${icon}&lt;/div&gt;
      &lt;div class=&quot;result-grade&quot;&gt;${grade}&lt;/div&gt;
      &lt;div class=&quot;result-score&quot;&gt;${state.score}&lt;span class=&quot;total&quot;&gt;/${total}&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;result-msg&quot;&gt;${msg}&lt;/div&gt;
      &lt;div style=&quot;display:flex;gap:10px;justify-content:center;flex-wrap:wrap&quot;&gt;
        &lt;button class=&quot;btn&quot; onclick=&quot;startQuiz(&#x27;${state.mode}&#x27;)&quot;&gt;Try Again&lt;/button&gt;
        &lt;button class=&quot;btn secondary&quot; onclick=&quot;document.getElementById(&#x27;quizArea&#x27;).innerHTML=&#x27;&#x27;; document.querySelectorAll(&#x27;.mode-card&#x27;).forEach(c=&gt;c.classList.remove(&#x27;active&#x27;))&quot;&gt;Pick Another Mode&lt;/button&gt;
      &lt;/div&gt;
    &lt;/div&gt;

// =========================================================
// HELPERS
// =========================================================
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i &gt; 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickN(arr, n) { return shuffle(arr).slice(0, n); }
function uniqueDistractors(correct, gen, count = 3) {
  const set = new Set();
  let attempts = 0;
  while (set.size &lt; count &amp;&amp; attempts &lt; 50) {
    const v = gen();
    if (v !== correct &amp;&amp; !set.has(v)) set.add(v);
    attempts++;
  }
  return Array.from(set);
}
function fmt(n) {
  // pretty-print numbers, keeping decimals tidy
  if (Number.isInteger(n)) return n.toString();
  return parseFloat(n.toFixed(4)).toString();
}

// =========================================================
// BIDMAS QUESTION GENERATORS
// =========================================================
function genBidmas() {
  const templates = [
    () =&gt; {
      // a + b * c
      const a = rand(2, 20), b = rand(2, 9), c = rand(2, 9);
      return { expr: `${a} + ${b} \u00d7 ${c}`, ans: a + b*c };
    },
    () =&gt; {
      // (a + b) * c
      const a = rand(2, 9), b = rand(2, 9), c = rand(2, 7);
      return { expr: `(${a} + ${b}) \u00d7 ${c}`, ans: (a + b) * c };
    },
    () =&gt; {
      // a + b^2 - c
      const a = rand(5, 20), b = rand(2, 7), c = rand(1, 10);
      return { expr: `${a} + ${b}&lt;sup&gt;2&lt;/sup&gt; \u2212 ${c}`, ans: a + b*b - c };
    },
    () =&gt; {
      // a - b*c + d  -- left-to-right A/S
      const a = rand(15, 40), b = rand(2, 6), c = rand(2, 5), d = rand(2, 9);
      return { expr: `${a} \u2212 ${b} \u00d7 ${c} + ${d}`, ans: a - b*c + d };
    },
    () =&gt; {
      // (a + b)^2 / c
      const c = [1, 2, 4, 5][rand(0,3)];
      const sumSq = rand(2, 6) * rand(2, 6);
      // Actually just compute fresh
      const a = rand(1, 5), b = rand(1, 5);
      const sumVal = a + b;
      // Pick c so it divides
      const validC = [1, sumVal, sumVal*sumVal].filter(x =&gt; sumVal*sumVal % x === 0);
      const cc = validC[rand(0, validC.length - 1)];
      return { expr: `(${a} + ${b})&lt;sup&gt;2&lt;/sup&gt; \u00f7 ${cc}`, ans: (sumVal*sumVal) / cc };
    },
    () =&gt; {
      // a*b - c*d
      const a = rand(2, 9), b = rand(2, 9), c = rand(2, 9), d = rand(2, 9);
      return { expr: `${a} \u00d7 ${b} \u2212 ${c} \u00d7 ${d}`, ans: a*b - c*d };
    },
    () =&gt; {
      // a + b^2 / c   (where c divides b^2)
      const b = rand(2, 8);
      const divisors = [];
      for (let i = 1; i &lt;= b*b; i++) if (b*b % i === 0) divisors.push(i);
      const c = divisors[rand(0, divisors.length - 1)];
      const a = rand(3, 20);
      return { expr: `${a} + ${b}&lt;sup&gt;2&lt;/sup&gt; \u00f7 ${c}`, ans: a + (b*b)/c };
    }
  ];
  const tpl = templates[rand(0, templates.length - 1)];
  const q = tpl();
  return {
    type: &#x27;bidmas&#x27;,
    bigDisplay: q.expr,
    prompt: &#x27;Calculate (no calculator)&#x27;,
    sub: &#x27;Apply BIDMAS carefully — show working in your head.&#x27;,
    correctText: q.ans.toString(),
    explain: `Apply BIDMAS in order. Answer = ${q.ans}.`
  };
}

// =========================================================
// NEGATIVE NUMBERS GENERATORS
// =========================================================
function genNeg() {
  const templates = [
    () =&gt; {
      // a - (-b)
      const a = rand(-15, 15), b = rand(1, 12);
      return { expr: `${a} \u2212 (\u2212${b})`, ans: a + b };
    },
    () =&gt; {
      // -a + (-b)
      const a = rand(1, 15), b = rand(1, 15);
      return { expr: `\u2212${a} + (\u2212${b})`, ans: -a - b };
    },
    () =&gt; {
      // (-a) * (-b)
      const a = rand(2, 9), b = rand(2, 9);
      return { expr: `(\u2212${a}) \u00d7 (\u2212${b})`, ans: a * b };
    },
    () =&gt; {
      // (-a) * b
      const a = rand(2, 12), b = rand(2, 9);
      return { expr: `(\u2212${a}) \u00d7 ${b}`, ans: -a * b };
    },
    () =&gt; {
      // (-a) / (-b)
      const b = rand(2, 6); const k = rand(2, 8); const a = b * k;
      return { expr: `(\u2212${a}) \u00f7 (\u2212${b})`, ans: k };
    },
    () =&gt; {
      // a - b + (-c)
      const a = rand(-10, 10), b = rand(1, 12), c = rand(1, 10);
      return { expr: `${a} \u2212 ${b} + (\u2212${c})`, ans: a - b - c };
    },
    () =&gt; {
      // (-a)^2 - b
      const a = rand(2, 8), b = rand(1, 20);
      return { expr: `(\u2212${a})&lt;sup&gt;2&lt;/sup&gt; \u2212 ${b}`, ans: a*a - b };
    },
    () =&gt; {
      // -a^2 + b   -- TRAP: this means -(a^2)
      const a = rand(2, 7), b = rand(1, 20);
      return { expr: `\u2212${a}&lt;sup&gt;2&lt;/sup&gt; + ${b}`, ans: -(a*a) + b, hint: &quot;Watch the trap: \u2212a\u00b2 means \u2212(a\u00b2), not (\u2212a)\u00b2.&quot; };
    },
    () =&gt; {
      // Temperature rises and falls
      const start = rand(-15, 5);
      const rise = rand(3, 15);
      const fall = rand(3, 15);
      return {
        expr: `Temp starts at ${start}\u00b0C, rises ${rise}\u00b0C, falls ${fall}\u00b0C.`,
        ans: start + rise - fall,
        wordy: true
      };
    }
  ];
  const tpl = templates[rand(0, templates.length - 1)];
  const q = tpl();
  return {
    type: &#x27;neg&#x27;,
    bigDisplay: q.expr,
    prompt: q.wordy ? &#x27;Word problem&#x27; : &#x27;Negative numbers&#x27;,
    sub: q.hint || &#x27;Apply the sign rules carefully.&#x27;,
    correctText: q.ans.toString(),
    explain: q.hint ? `${q.hint}  Answer = ${q.ans}.` : `Answer = ${q.ans}.`
  };
}

// =========================================================
// ALGEBRA GENERATORS
// =========================================================
function genAlgebra() {
  const templates = [
    () =&gt; {
      // simplify ax + b - cx + d -&gt; like terms
      const a = rand(2, 9), b = rand(1, 9), c = rand(2, 9), d = rand(1, 9);
      const sign = rand(0, 1) ? &#x27;+&#x27; : &#x27;\u2212&#x27;;
      const xCoef = a - c;
      const constant = sign === &#x27;+&#x27; ? b + d : b - d;
      const xPart = xCoef === 0 ? &#x27;&#x27; : (xCoef === 1 ? &#x27;x&#x27; : (xCoef === -1 ? &#x27;\u2212x&#x27; : `${xCoef}x`));
      const cPart = constant &gt; 0 ? `+${constant}` : (constant &lt; 0 ? `${constant}` : &#x27;&#x27;);
      let ansStr;
      if (xCoef === 0 &amp;&amp; constant === 0) ansStr = &#x27;0&#x27;;
      else if (xCoef === 0) ansStr = constant.toString();
      else if (constant === 0) ansStr = xPart;
      else ansStr = `${xPart}${cPart}`;
      return {
        expr: `${a}x + ${b} ${sign} ${c}x ${sign === &#x27;+&#x27; ? &#x27;+&#x27; : &#x27;\u2212&#x27;} ${d}`,
        opts: &#x27;mc&#x27;,
        ansStr: ansStr,
        explain: `Collect like terms: x-terms: ${a}x ${sign} ${c}x = ${xCoef}x. Constants: ${b} ${sign} ${d} = ${constant}. Combine: ${ansStr}.`,
        // distractors generated from common errors
        distractors: [
          `${a + c}x ${sign === &#x27;+&#x27; ? &#x27;+&#x27; : &#x27;\u2212&#x27;} ${Math.abs(constant)}`,  // adding instead of subtracting coefs
          `${xCoef}x + ${(sign === &#x27;+&#x27; ? b - d : b + d)}`,                        // wrong sign on constants
          `${a - c}x${sign === &#x27;+&#x27; ? &#x27;+&#x27; : &#x27;\u2212&#x27;}${b + d}`                     // mixed up
        ]
      };
    },
    () =&gt; {
      // multiply: 4 * 3a -&gt; 12a
      const a = rand(2, 9), b = rand(2, 9);
      return {
        expr: `${a} \u00d7 ${b}a`,
        opts: &#x27;mc&#x27;,
        ansStr: `${a*b}a`,
        explain: `${a} \u00d7 ${b}a = ${a*b}a.`,
        distractors: [`${a+b}a`, `${a*b}a\u00b2`, `${a*b}`]
      };
    },
    () =&gt; {
      // a * a -&gt; a^2
      return {
        expr: `a \u00d7 a`,
        opts: &#x27;mc&#x27;,
        ansStr: &#x27;a\u00b2&#x27;,
        explain: `a \u00d7 a = a\u00b2 (a squared).`,
        distractors: [&#x27;2a&#x27;, &#x27;a&#x27;, &#x27;0&#x27;]
      };
    },
    () =&gt; {
      // 3a * 2b -&gt; 6ab
      const a = rand(2, 6), b = rand(2, 6);
      return {
        expr: `${a}a \u00d7 ${b}b`,
        opts: &#x27;mc&#x27;,
        ansStr: `${a*b}ab`,
        explain: `${a}a \u00d7 ${b}b = ${a*b}ab.`,
        distractors: [`${a+b}ab`, `${a*b}a\u00b2b\u00b2`, `${a*b}(a+b)`]
      };
    },
    () =&gt; {
      // zero pair: 5x + 3 - 5x + 9
      const a = rand(2, 9), b = rand(1, 9), c = rand(1, 9);
      return {
        expr: `${a}x + ${b} \u2212 ${a}x + ${c}`,
        opts: &#x27;mc&#x27;,
        ansStr: `${b+c}`,
        explain: `The +${a}x and \u2212${a}x are a zero pair (cancel out). Left with ${b} + ${c} = ${b+c}.`,
        distractors: [`${2*a}x + ${b+c}`, `${b+c}x`, `${a}x + ${b+c}`]
      };
    },
    () =&gt; {
      // substitute: 3x + 5 when x = -2
      const a = rand(2, 6), b = rand(-7, 7), x = rand(-5, 5);
      const ans = a*x + b;
      return {
        expr: `Find ${a}x ${b &gt;= 0 ? &#x27;+&#x27; : &#x27;\u2212&#x27;} ${Math.abs(b)} when x = ${x}`,
        opts: &#x27;mc&#x27;,
        ansStr: ans.toString(),
        explain: `Substitute x = ${x}: ${a}(${x}) ${b &gt;= 0 ? &#x27;+&#x27; : &#x27;\u2212&#x27;} ${Math.abs(b)} = ${a*x} ${b &gt;= 0 ? &#x27;+&#x27; : &#x27;\u2212&#x27;} ${Math.abs(b)} = ${ans}.`,
        distractors: [(a*x - b).toString(), (a + x + b).toString(), ((a*x)*(-1) + b).toString()]
      };
    },
    () =&gt; {
      // substitute: x^2 + 2x  when x = -3
      const x = rand(-5, 5);
      if (x === 0) return null;
      const ans = x*x + 2*x;
      return {
        expr: `Find x&lt;sup&gt;2&lt;/sup&gt; + 2x when x = ${x}`,
        opts: &#x27;mc&#x27;,
        ansStr: ans.toString(),
        explain: `Substitute: (${x})\u00b2 + 2(${x}) = ${x*x} + ${2*x} = ${ans}.`,
        distractors: [(2*x + 2*x).toString(), (x*x - 2*x).toString(), (-(x*x) + 2*x).toString()]
      };
    }
  ];
  let q = null;
  while (!q) {
    const tpl = templates[rand(0, templates.length - 1)];
    q = tpl();
  }
  // Build options
  const opts = shuffle([q.ansStr, ...q.distractors.slice(0, 3)]);
  return {
    type: &#x27;algebra&#x27;,
    bigDisplay: q.expr,
    prompt: &#x27;Algebra&#x27;,
    sub: &#x27;Pick the correct simplified expression or value.&#x27;,
    options: opts,
    correct: opts.indexOf(q.ansStr),
    explain: q.explain
  };
}

// AREA &amp; PERIMETER GENERATORS
// =========================================================
function svgRect(w, h, label = &#x27;&#x27;) {
  // Simple rectangle SVG with labelled sides, scaled
  const SCALE = 12;
  const W = w * SCALE, H = h * SCALE;
  const PAD = 30;
  return `&lt;svg class=&quot;shape-svg&quot; viewBox=&quot;0 0 ${W + PAD*2} ${H + PAD*2 + 20}&quot; width=&quot;${W + PAD*2}&quot; height=&quot;${H + PAD*2 + 20}&quot;&gt;
    &lt;rect x=&quot;${PAD}&quot; y=&quot;${PAD}&quot; width=&quot;${W}&quot; height=&quot;${H}&quot; fill=&quot;#FFF4E6&quot; stroke=&quot;#0B3D5C&quot; stroke-width=&quot;3&quot;/&gt;
    &lt;text x=&quot;${PAD + W/2}&quot; y=&quot;${PAD + H + 18}&quot; text-anchor=&quot;middle&quot; font-family=&quot;Georgia&quot; font-size=&quot;14&quot; fill=&quot;#0B3D5C&quot; font-weight=&quot;bold&quot;&gt;${w} cm&lt;/text&gt;
    &lt;text x=&quot;${PAD - 8}&quot; y=&quot;${PAD + H/2 + 4}&quot; text-anchor=&quot;end&quot; font-family=&quot;Georgia&quot; font-size=&quot;14&quot; fill=&quot;#0B3D5C&quot; font-weight=&quot;bold&quot;&gt;${h} cm&lt;/text&gt;
  &lt;/svg&gt;`;
}
function svgTriangle(b, h) {
  const SCALE = 10;
  const B = b * SCALE, H = h * SCALE;
  const PAD = 30;
  // right triangle for clarity
  return `&lt;svg class=&quot;shape-svg&quot; viewBox=&quot;0 0 ${B + PAD*2} ${H + PAD*2 + 20}&quot; width=&quot;${B + PAD*2}&quot; height=&quot;${H + PAD*2 + 20}&quot;&gt;
    &lt;polygon points=&quot;${PAD},${PAD + H} ${PAD + B},${PAD + H} ${PAD + B*0.4},${PAD}&quot;
             fill=&quot;#FFF4E6&quot; stroke=&quot;#0B3D5C&quot; stroke-width=&quot;3&quot;/&gt;
    &lt;line x1=&quot;${PAD + B*0.4}&quot; y1=&quot;${PAD}&quot; x2=&quot;${PAD + B*0.4}&quot; y2=&quot;${PAD + H}&quot; stroke=&quot;#D63E2F&quot; stroke-width=&quot;2&quot; stroke-dasharray=&quot;4,3&quot;/&gt;
    &lt;text x=&quot;${PAD + B/2}&quot; y=&quot;${PAD + H + 18}&quot; text-anchor=&quot;middle&quot; font-family=&quot;Georgia&quot; font-size=&quot;14&quot; fill=&quot;#0B3D5C&quot; font-weight=&quot;bold&quot;&gt;base ${b} cm&lt;/text&gt;
    &lt;text x=&quot;${PAD + B*0.4 + 6}&quot; y=&quot;${PAD + H/2 + 4}&quot; font-family=&quot;Georgia&quot; font-size=&quot;14&quot; fill=&quot;#D63E2F&quot; font-weight=&quot;bold&quot;&gt;h = ${h} cm&lt;/text&gt;
  &lt;/svg&gt;`;
}
function svgTrapezium(a, b, h) {
  const SCALE = 10;
  const A = a * SCALE, B = b * SCALE, H = h * SCALE;
  const PAD = 30;
  const offset = (B - A) / 2;
  return `&lt;svg class=&quot;shape-svg&quot; viewBox=&quot;0 0 ${B + PAD*2} ${H + PAD*2 + 20}&quot; width=&quot;${B + PAD*2}&quot; height=&quot;${H + PAD*2 + 20}&quot;&gt;
    &lt;polygon points=&quot;${PAD + offset},${PAD} ${PAD + offset + A},${PAD} ${PAD + B},${PAD + H} ${PAD},${PAD + H}&quot;
             fill=&quot;#FFF4E6&quot; stroke=&quot;#0B3D5C&quot; stroke-width=&quot;3&quot;/&gt;
    &lt;text x=&quot;${PAD + offset + A/2}&quot; y=&quot;${PAD - 6}&quot; text-anchor=&quot;middle&quot; font-family=&quot;Georgia&quot; font-size=&quot;14&quot; fill=&quot;#0B3D5C&quot; font-weight=&quot;bold&quot;&gt;${a} cm&lt;/text&gt;
    &lt;text x=&quot;${PAD + B/2}&quot; y=&quot;${PAD + H + 18}&quot; text-anchor=&quot;middle&quot; font-family=&quot;Georgia&quot; font-size=&quot;14&quot; fill=&quot;#0B3D5C&quot; font-weight=&quot;bold&quot;&gt;${b} cm&lt;/text&gt;
    &lt;text x=&quot;${PAD + B + 6}&quot; y=&quot;${PAD + H/2 + 4}&quot; font-family=&quot;Georgia&quot; font-size=&quot;14&quot; fill=&quot;#D63E2F&quot; font-weight=&quot;bold&quot;&gt;h=${h} cm&lt;/text&gt;
  &lt;/svg&gt;`;
}
function svgParallelogram(b, h) {
  const SCALE = 10;
  const B = b * SCALE, H = h * SCALE;
  const PAD = 35;
  const slant = H * 0.4;
  return `&lt;svg class=&quot;shape-svg&quot; viewBox=&quot;0 0 ${B + slant + PAD*2} ${H + PAD*2 + 20}&quot; width=&quot;${B + slant + PAD*2}&quot; height=&quot;${H + PAD*2 + 20}&quot;&gt;
    &lt;polygon points=&quot;${PAD + slant},${PAD} ${PAD + slant + B},${PAD} ${PAD + B},${PAD + H} ${PAD},${PAD + H}&quot;
             fill=&quot;#FFF4E6&quot; stroke=&quot;#0B3D5C&quot; stroke-width=&quot;3&quot;/&gt;
    &lt;line x1=&quot;${PAD + slant}&quot; y1=&quot;${PAD}&quot; x2=&quot;${PAD + slant}&quot; y2=&quot;${PAD + H}&quot; stroke=&quot;#D63E2F&quot; stroke-width=&quot;2&quot; stroke-dasharray=&quot;4,3&quot;/&gt;
    &lt;text x=&quot;${PAD + slant + B/2}&quot; y=&quot;${PAD - 6}&quot; text-anchor=&quot;middle&quot; font-family=&quot;Georgia&quot; font-size=&quot;14&quot; fill=&quot;#0B3D5C&quot; font-weight=&quot;bold&quot;&gt;${b} cm&lt;/text&gt;
    &lt;text x=&quot;${PAD + slant + 6}&quot; y=&quot;${PAD + H/2 + 4}&quot; font-family=&quot;Georgia&quot; font-size=&quot;14&quot; fill=&quot;#D63E2F&quot; font-weight=&quot;bold&quot;&gt;h=${h} cm&lt;/text&gt;
  &lt;/svg&gt;`;
}

function genArea() {
  const templates = [
    () =&gt; {
      const w = rand(4, 14), h = rand(3, 12);
      return {
        svg: svgRect(w, h),
        question: &#x27;Find the AREA of this rectangle.&#x27;,
        ans: w * h,
        unit: &#x27;cm\u00b2&#x27;,
        explain: `Area = length \u00d7 width = ${w} \u00d7 ${h} = ${w*h} cm\u00b2.`
      };
    },
    () =&gt; {
      const w = rand(4, 14), h = rand(3, 12);
      return {
        svg: svgRect(w, h),
        question: &#x27;Find the PERIMETER of this rectangle.&#x27;,
        ans: 2*(w + h),
        unit: &#x27;cm&#x27;,
        explain: `Perimeter = 2(l + w) = 2(${w} + ${h}) = 2 \u00d7 ${w+h} = ${2*(w+h)} cm.`
      };
    },
    () =&gt; {
      const b = rand(4, 16), h = rand(3, 12);
      return {
        svg: svgTriangle(b, h),
        question: &#x27;Find the AREA of this triangle.&#x27;,
        ans: 0.5 * b * h,
        unit: &#x27;cm\u00b2&#x27;,
        explain: `Area = \u00bd \u00d7 base \u00d7 height = \u00bd \u00d7 ${b} \u00d7 ${h} = ${0.5*b*h} cm\u00b2.`
      };
    },
    () =&gt; {
      const b = rand(5, 16), h = rand(3, 10);
      return {
        svg: svgParallelogram(b, h),
        question: &#x27;Find the AREA of this parallelogram.&#x27;,
        ans: b * h,
        unit: &#x27;cm\u00b2&#x27;,
        explain: `Area = base \u00d7 perpendicular height = ${b} \u00d7 ${h} = ${b*h} cm\u00b2. (Use the dotted line, NOT the slanted side.)`
      };
    },
    () =&gt; {
      const a = rand(4, 9), b = rand(10, 16), h = rand(4, 10);
      return {
        svg: svgTrapezium(a, b, h),
        question: &#x27;Find the AREA of this trapezium.&#x27;,
        ans: 0.5 * (a + b) * h,
        unit: &#x27;cm\u00b2&#x27;,
        explain: `Area = \u00bd(a + b)h = \u00bd \u00d7 (${a} + ${b}) \u00d7 ${h} = \u00bd \u00d7 ${a+b} \u00d7 ${h} = ${0.5*(a+b)*h} cm\u00b2.`
      };
    },
    () =&gt; {
      // Stretch: work backwards. Parallelogram area + base, find height.
      const b = rand(4, 12), h = rand(3, 10);
      const area = b * h;
      return {
        svg: null,
        question: `A parallelogram has area ${area} cm\u00b2 and base ${b} cm. Find its perpendicular height.`,
        ans: h,
        unit: &#x27;cm&#x27;,
        explain: `Area = base \u00d7 h \u2192 ${area} = ${b} \u00d7 h \u2192 h = ${area} \u00f7 ${b} = ${h} cm.`
      };
    },
    () =&gt; {
      // Stretch: triangle work backwards
      const b = rand(4, 12), h = rand(4, 12);
      const area = 0.5 * b * h;
      if (!Number.isInteger(area)) return null;
      return {
        svg: null,
        question: `A triangle has area ${area} cm\u00b2 and base ${b} cm. Find its perpendicular height.`,
        ans: h,
        unit: &#x27;cm&#x27;,
        explain: `Area = \u00bd \u00d7 b \u00d7 h \u2192 ${area} = \u00bd \u00d7 ${b} \u00d7 h \u2192 h = (2 \u00d7 ${area}) \u00f7 ${b} = ${h} cm.`
      };
    },
    () =&gt; {
      // Stretch: trapezium work backwards
      const a = rand(4, 9), b = rand(10, 16), h = rand(4, 10);
      const area = 0.5 * (a + b) * h;
      if (!Number.isInteger(area)) return null;
      return {
        svg: null,
        question: `A trapezium has area ${area} cm\u00b2, parallel sides ${a} cm and ${b} cm. Find its perpendicular height.`,
        ans: h,
        unit: &#x27;cm&#x27;,
        explain: `${area} = \u00bd \u00d7 (${a}+${b}) \u00d7 h = ${(a+b)/2} \u00d7 h. So h = ${area} \u00f7 ${(a+b)/2} = ${h} cm.`
      };
    }
  ];
  let q = null;
  while (!q) {
    const tpl = templates[rand(0, templates.length - 1)];
    q = tpl();
  }
  return {
    type: &#x27;area&#x27;,
    svg: q.svg,
    question: q.question,
    correctText: q.ans.toString(),
    unit: q.unit,
    explain: q.explain
  };
}

// =========================================================
// COORDINATES GENERATORS
// =========================================================
function gridSVG(highlight) {
  const SIZE = 280;
  const STEP = SIZE / 12; // -6 to +6
  const center = SIZE / 2;
  let svg = `&lt;svg class=&quot;grid-svg&quot; viewBox=&quot;0 0 ${SIZE} ${SIZE}&quot; width=&quot;${SIZE}&quot; height=&quot;${SIZE}&quot;&gt;`;
  // Grid lines
  for (let i = 1; i &lt; 12; i++) {
    svg += `&lt;line x1=&quot;${i*STEP}&quot; y1=&quot;0&quot; x2=&quot;${i*STEP}&quot; y2=&quot;${SIZE}&quot; stroke=&quot;#E5E5E5&quot; stroke-width=&quot;0.5&quot;/&gt;`;
    svg += `&lt;line x1=&quot;0&quot; y1=&quot;${i*STEP}&quot; x2=&quot;${SIZE}&quot; y2=&quot;${i*STEP}&quot; stroke=&quot;#E5E5E5&quot; stroke-width=&quot;0.5&quot;/&gt;`;
  }
  // Axes
  svg += `&lt;line x1=&quot;${center}&quot; y1=&quot;0&quot; x2=&quot;${center}&quot; y2=&quot;${SIZE}&quot; stroke=&quot;#0B3D5C&quot; stroke-width=&quot;1.5&quot;/&gt;`;
  svg += `&lt;line x1=&quot;0&quot; y1=&quot;${center}&quot; x2=&quot;${SIZE}&quot; y2=&quot;${center}&quot; stroke=&quot;#0B3D5C&quot; stroke-width=&quot;1.5&quot;/&gt;`;
  // Numbers
  for (let i = -6; i &lt;= 6; i++) {
    if (i === 0) continue;
    svg += `&lt;text x=&quot;${center + i*STEP}&quot; y=&quot;${center + 12}&quot; text-anchor=&quot;middle&quot; font-size=&quot;9&quot; font-family=&quot;Courier New&quot; fill=&quot;#666&quot;&gt;${i}&lt;/text&gt;`;
    svg += `&lt;text x=&quot;${center - 4}&quot; y=&quot;${center - i*STEP + 3}&quot; text-anchor=&quot;end&quot; font-size=&quot;9&quot; font-family=&quot;Courier New&quot; fill=&quot;#666&quot;&gt;${i}&lt;/text&gt;`;
  }
  // Highlighted point
  if (highlight) {
    const px = center + highlight.x * STEP;
    const py = center - highlight.y * STEP;
    svg += `&lt;circle cx=&quot;${px}&quot; cy=&quot;${py}&quot; r=&quot;6&quot; fill=&quot;#D63E2F&quot; stroke=&quot;#0B3D5C&quot; stroke-width=&quot;2&quot;/&gt;`;
  }
  svg += `&lt;/svg&gt;`;
  return svg;
}

function genCoords() {
  const templates = [
    () =&gt; {
      // Read off coordinates of a marked point
      let x = 0, y = 0;
      while (x === 0 &amp;&amp; y === 0) {
        x = rand(-5, 5);
        y = rand(-5, 5);
      }
      return {
        svg: gridSVG({x, y}),
        question: &#x27;What are the coordinates of the marked point?&#x27;,
        opts: &#x27;mc&#x27;,
        correct: `(${x}, ${y})`,
        distractors: [`(${y}, ${x})`, `(${-x}, ${y})`, `(${x}, ${-y})`],
        explain: `Read x first (across), then y (up). Point is at (${x}, ${y}).`
      };
    },
    () =&gt; {
      // Which quadrant
      let x = 0, y = 0;
      while (x === 0 || y === 0) {
        x = rand(-5, 5);
        y = rand(-5, 5);
      }
      const quadrant = (x &gt; 0 &amp;&amp; y &gt; 0) ? &#x27;1st&#x27; : (x &lt; 0 &amp;&amp; y &gt; 0) ? &#x27;2nd&#x27; : (x &lt; 0 &amp;&amp; y &lt; 0) ? &#x27;3rd&#x27; : &#x27;4th&#x27;;
      return {
        svg: null,
        question: `In which quadrant is the point (${x}, ${y})?`,
        opts: &#x27;mc&#x27;,
        correct: quadrant,
        distractors: [&#x27;1st&#x27;, &#x27;2nd&#x27;, &#x27;3rd&#x27;, &#x27;4th&#x27;].filter(q =&gt; q !== quadrant),
        explain: `x = ${x} (${x &gt; 0 ? &#x27;+&#x27; : &#x27;\u2212&#x27;}), y = ${y} (${y &gt; 0 ? &#x27;+&#x27; : &#x27;\u2212&#x27;}) \u2192 ${quadrant} quadrant.`
      };
    },
    () =&gt; {
      // Midpoint of two points
      const x1 = rand(-6, 6), y1 = rand(-6, 6);
      const x2 = rand(-6, 6), y2 = rand(-6, 6);
      const mx = (x1 + x2) / 2;
      const my = (y1 + y2) / 2;
      // Only use if midpoint is integer or .5 — to keep clean
      return {
        svg: null,
        question: `Find the midpoint of the line segment joining A(${x1}, ${y1}) and B(${x2}, ${y2}).`,
        opts: &#x27;mc&#x27;,
        correct: `(${mx}, ${my})`,
        distractors: [`(${x1+x2}, ${y1+y2})`, `(${x2-x1}, ${y2-y1})`, `(${mx+1}, ${my-1})`],
        explain: `Midpoint = ((x\u2081+x\u2082)/2, (y\u2081+y\u2082)/2) = ((${x1}+${x2})/2, (${y1}+${y2})/2) = (${mx}, ${my}).`
      };
    },
    () =&gt; {
      // Find 4th vertex of rectangle
      const x1 = rand(-5, -1), y1 = rand(-5, -1);
      const x2 = rand(1, 5), y2 = rand(1, 5);
      // Three corners: (x1,y1), (x2,y1), (x2,y2). Fourth: (x1,y2)
      return {
        svg: null,
        question: `Three corners of a rectangle are at (${x1}, ${y1}), (${x2}, ${y1}) and (${x2}, ${y2}). Find the 4th corner.`,
        opts: &#x27;mc&#x27;,
        correct: `(${x1}, ${y2})`,
        distractors: [`(${x2}, ${y1})`, `(${x1+x2}, ${y1+y2})`, `(${-x1}, ${-y2})`],
        explain: `For a rectangle, the 4th corner shares x with one diagonal corner and y with the other. So 4th corner = (${x1}, ${y2}).`
      };
    }
  ];
  const tpl = templates[rand(0, templates.length - 1)];
  const q = tpl();
  const opts = shuffle([q.correct, ...q.distractors.slice(0, 3)]);
  return {
    type: &#x27;coords&#x27;,
    svg: q.svg,
    question: q.question,
    options: opts,
    correct: opts.indexOf(q.correct),
    explain: q.explain
  };
}

// =========================================================
// DECIMALS GENERATORS
// =========================================================
function genDecimals() {
  const templates = [
    () =&gt; {
      // Round to 1 d.p.
      const intPart = rand(0, 99);
      const dec = rand(10, 99);
      const num = parseFloat(`${intPart}.${dec}`);
      const ans = Math.round(num * 10) / 10;
      return {
        question: `Round ${num.toFixed(2)} to 1 decimal place.`,
        correct: ans.toFixed(1),
        distractors: [(Math.floor(num*10)/10).toFixed(1), (ans + 0.1).toFixed(1), Math.round(num).toFixed(1)],
        explain: `Look at the 2nd decimal: ${dec.toString()[1]}. ${dec.toString()[1] &gt;= &#x27;5&#x27; ? &#x27;Round UP.&#x27; : &#x27;Round DOWN.&#x27;} Answer: ${ans.toFixed(1)}.`
      };
    },
    () =&gt; {
      // Round to 2 d.p.
      const intPart = rand(0, 99);
      const dec1 = rand(10, 99);
      const dec2 = rand(10, 99);
      const num = parseFloat(`${intPart}.${dec1}${dec2}`);
      const ans = Math.round(num * 100) / 100;
      return {
        question: `Round ${num.toFixed(4)} to 2 decimal places.`,
        correct: ans.toFixed(2),
        distractors: [(Math.floor(num*100)/100).toFixed(2), (ans + 0.01).toFixed(2), num.toFixed(1)],
        explain: `Look at the 3rd decimal digit. Round to ${ans.toFixed(2)}.`
      };
    },
    () =&gt; {
      // Order decimals
      const nums = [];
      while (nums.length &lt; 4) {
        const n = parseFloat((Math.random() * 1).toFixed(rand(2, 3)));
        if (!nums.includes(n)) nums.push(n);
      }
      const sorted = [...nums].sort((a, b) =&gt; a - b);
      const correct = sorted.map(n =&gt; n.toString()).join(&#x27;, &#x27;);
      // Distractors: reverse order, swap two, etc.
      const reversed = [...sorted].reverse();
      const swapped = [...sorted];
      [swapped[0], swapped[1]] = [swapped[1], swapped[0]];
      const lengthSorted = [...nums].sort((a, b) =&gt; a.toString().length - b.toString().length);
      return {
        question: `Put these in order, smallest first: ${nums.join(&#x27;, &#x27;)}`,
        correct: correct,
        distractors: [reversed.join(&#x27;, &#x27;), swapped.join(&#x27;, &#x27;), lengthSorted.join(&#x27;, &#x27;)],
        explain: `Compare digit by digit (line up decimal points). Order: ${correct}.`
      };
    },
    () =&gt; {
      // 0.a x 0.b
      const a = rand(1, 9), b = rand(1, 9);
      const ans = (a * b) / 100;
      return {
        question: `Calculate: 0.${a} \u00d7 0.${b}`,
        correct: ans.toString(),
        distractors: [((a*b)/10).toString(), ((a*b)/1000).toString(), (a*b).toString()],
        explain: `Ignore decimals: ${a}\u00d7${b} = ${a*b}. Total decimal places = 2. Answer = ${ans}.`
      };
    },
    () =&gt; {
      // a / 0.b -&gt; times by 10
      const b = [2, 4, 5][rand(0,2)];
      const result = rand(2, 30);
      const a = result * (b/10); // a / 0.b = result, so a = result * 0.b
      // round a to 1 dp
      const aNice = parseFloat(a.toFixed(2));
      // Actually let&#x27;s just construct: a = result * 0.b, result is integer
      // Then a / 0.b = result. Use clean values.
      const k = rand(2, 20);
      const ansVal = k * 10 / b; // we want a / 0.b
      // Simpler: a / 0.b =&gt; 10a/b. Pick a=multiple of b.
      const aa = b * rand(2, 12) / 10;
      const aaStr = aa.toString();
      const final = aa / (b/10);
      return {
        question: `Calculate: ${aaStr} \u00f7 0.${b}`,
        correct: final.toString(),
        distractors: [(aa * b).toString(), (aa / b).toString(), ((aa * 10) / b).toFixed(1)],
        explain: `Multiply both by 10: ${aaStr}\u00d710 \u00f7 ${b} = ${aa*10} \u00f7 ${b} = ${final}.`
      };
    },
    () =&gt; {
      // sum/diff with different decimal lengths
      const a = (rand(10, 99) / 10).toFixed(1);
      const b = (rand(100, 999) / 100).toFixed(2);
      const c = parseFloat(a) + parseFloat(b);
      return {
        question: `Calculate: ${a} + ${b}`,
        correct: c.toFixed(2),
        distractors: [(parseFloat(a) + parseFloat(b)/10).toFixed(2), (parseFloat(a) - parseFloat(b)).toFixed(2), (parseFloat(a)*parseFloat(b)).toFixed(2)],
        explain: `Line up decimal points: ${a} + ${b} = ${c.toFixed(2)}.`
      };
    }
  ];
  const tpl = templates[rand(0, templates.length - 1)];
  const q = tpl();
  const opts = shuffle([q.correct, ...q.distractors.slice(0, 3).filter(d =&gt; d !== q.correct)]);
  while (opts.length &lt; 4) opts.push((parseFloat(q.correct) + Math.random()).toFixed(2));
  return {
    type: &#x27;decimals&#x27;,
    question: q.question,
    options: opts,
    correct: opts.indexOf(q.correct),
    explain: q.explain
  };
}

// =========================================================
// QUIZ ENGINE
// =========================================================
let state = {
  mode: null,
  questions: [],
  current: 0,
  score: 0,
  answered: false
};

const $quiz = document.getElementById(&#x27;quizArea&#x27;);
const $modes = document.getElementById(&#x27;modeGrid&#x27;);

function buildQuestions(mode, n) {
  const out = [];
  const generators = {
    bidmas: genBidmas,
    negatives: genNeg,
    algebra: genAlgebra,
    area: genArea,
    coords: genCoords,
    decimals: genDecimals
  };
  if (mode === &#x27;mixed&#x27;) {
    const order = [&#x27;bidmas&#x27;,&#x27;negatives&#x27;,&#x27;algebra&#x27;,&#x27;area&#x27;,&#x27;coords&#x27;,&#x27;decimals&#x27;];
    for (let i = 0; i &lt; n; i++) {
      const g = generators[order[i % order.length]];
      out.push(g());
    }
    return shuffle(out);
  }
  for (let i = 0; i &lt; n; i++) out.push(generators[mode]());
  return out;
}

function startQuiz(mode) {
  state.mode = mode;
  state.current = 0;
  state.score = 0;
  state.answered = false;
  state.questions = buildQuestions(mode, mode === &#x27;mixed&#x27; ? 15 : 10);
  document.querySelectorAll(&#x27;.mode-card&#x27;).forEach(c =&gt; {
    c.classList.toggle(&#x27;active&#x27;, c.dataset.mode === mode);
  });
  renderQuestion();
  // Scroll to quiz
  document.getElementById(&#x27;quizArea&#x27;).scrollIntoView({ behavior: &#x27;smooth&#x27;, block: &#x27;start&#x27; });
}

function renderQuestion() {
  const total = state.questions.length;
  if (state.current &gt;= total) { renderFinal(); return; }
  const q = state.questions[state.current];

  let body;
  if (q.options) {
    body = renderMCQ(q);
  } else {
    body = renderInputQ(q);
  }

  $quiz.innerHTML = `
    &lt;div class=&quot;quiz&quot;&gt;
      &lt;div class=&quot;progress-bar&quot;&gt;
        &lt;span class=&quot;progress-text&quot;&gt;Question ${state.current + 1} / ${total}&lt;/span&gt;
        &lt;span class=&quot;score-pill&quot;&gt;&lt;span class=&quot;accent&quot;&gt;●&lt;/span&gt; Score: ${state.score}/${state.current}&lt;/span&gt;
      &lt;/div&gt;
      ${body}
    &lt;/div&gt;
  `;
  attachHandlers(q);
}

function renderMCQ(q) {
  const big = q.bigDisplay
    ? `&lt;div class=&quot;big-display&quot;&gt;&lt;div class=&quot;big-expr&quot;&gt;${q.bigDisplay}&lt;/div&gt;&lt;/div&gt;`
    : (q.svg ? q.svg : &#x27;&#x27;);
  const letters = [&#x27;A&#x27;, &#x27;B&#x27;, &#x27;C&#x27;, &#x27;D&#x27;];
  const opts = q.options.map((o, i) =&gt; `
    &lt;button class=&quot;option&quot; data-index=&quot;${i}&quot;&gt;
      &lt;span class=&quot;letter&quot;&gt;${letters[i]}&lt;/span&gt;
      &lt;span&gt;${o}&lt;/span&gt;
    &lt;/button&gt;
  `).join(&#x27;&#x27;);
  const twoCol = q.options.every(o =&gt; o.length &lt; 12) ? &#x27;two-col&#x27; : &#x27;&#x27;;
  return `
    &lt;div class=&quot;question-label&quot;&gt;${q.prompt || (q.type || &#x27;&#x27;).toUpperCase()}&lt;/div&gt;
    &lt;div class=&quot;question&quot;&gt;${q.question || &#x27;&#x27;}&lt;/div&gt;
    ${q.sub ? `&lt;div class=&quot;question-sub&quot;&gt;${q.sub}&lt;/div&gt;` : &#x27;&#x27;}
    ${big}
    &lt;div class=&quot;options ${twoCol}&quot; id=&quot;optionList&quot;&gt;${opts}&lt;/div&gt;
    &lt;div id=&quot;feedbackArea&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;controlArea&quot;&gt;&lt;/div&gt;
  `;
}

function renderInputQ(q) {
  const big = q.bigDisplay
    ? `&lt;div class=&quot;big-display&quot;&gt;&lt;div class=&quot;big-expr&quot;&gt;${q.bigDisplay}&lt;/div&gt;&lt;/div&gt;`
    : (q.svg ? q.svg : &#x27;&#x27;);
  return `
    &lt;div class=&quot;question-label&quot;&gt;${q.prompt || (q.type || &#x27;&#x27;).toUpperCase()}&lt;/div&gt;
    &lt;div class=&quot;question&quot;&gt;${q.question || &#x27;Calculate the answer&#x27;}&lt;/div&gt;
    ${q.sub ? `&lt;div class=&quot;question-sub&quot;&gt;${q.sub}&lt;/div&gt;` : &#x27;&#x27;}
    ${big}
    &lt;div class=&quot;input-row&quot;&gt;
      &lt;input id=&quot;ansInput&quot; type=&quot;text&quot; inputmode=&quot;decimal&quot; placeholder=&quot;Type answer${q.unit ? &#x27; (&#x27;+q.unit+&#x27;)&#x27; : &#x27;&#x27;}&quot; autocomplete=&quot;off&quot;&gt;
      &lt;button id=&quot;checkBtn&quot;&gt;Check&lt;/button&gt;
    &lt;/div&gt;
    &lt;div id=&quot;feedbackArea&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;controlArea&quot;&gt;&lt;/div&gt;
  `;
}

function attachHandlers(q) {
  if (q.options) {
    document.querySelectorAll(&#x27;.option&#x27;).forEach(btn =&gt; {
      btn.addEventListener(&#x27;click&#x27;, () =&gt; handleMCQ(btn, q));
    });
  } else {
    const inp = document.getElementById(&#x27;ansInput&#x27;);
    const btn = document.getElementById(&#x27;checkBtn&#x27;);
    btn.addEventListener(&#x27;click&#x27;, () =&gt; checkInput(q));
    inp.addEventListener(&#x27;keypress&#x27;, e =&gt; {
      if (e.key === &#x27;Enter&#x27;) checkInput(q);
    });
    inp.focus();
  }
}

function handleMCQ(btn, q) {
  if (state.answered) return;
  state.answered = true;
  const idx = parseInt(btn.dataset.index);
  const correct = idx === q.correct;
  if (correct) state.score++;
  document.querySelectorAll(&#x27;.option&#x27;).forEach((b, i) =&gt; {
    b.disabled = true;
    if (i === q.correct) b.classList.add(&#x27;correct&#x27;);
    else if (i === idx) b.classList.add(&#x27;wrong&#x27;);
  });
  showFeedback(correct, q.explain || &#x27;&#x27;);
  showNextButton();
}

function checkInput(q) {
  if (state.answered) return;
  const inp = document.getElementById(&#x27;ansInput&#x27;);
  const userRaw = inp.value.trim();
  if (userRaw === &#x27;&#x27;) return;
  state.answered = true;
  inp.disabled = true;
  document.getElementById(&#x27;checkBtn&#x27;).disabled = true;
  // Compare numerically when possible
  const userNum = parseFloat(userRaw);
  const correctNum = parseFloat(q.correctText);
  let correct = false;
  if (!isNaN(userNum) &amp;&amp; !isNaN(correctNum)) {
    correct = Math.abs(userNum - correctNum) &lt; 0.0001;
  } else {
    correct = userRaw === q.correctText;
  }
  if (correct) state.score++;
  showFeedback(correct, `${correct ? &#x27;&#x27; : &#x27;Correct answer: &lt;strong style=&quot;font-family:Courier New;font-size:18px&quot;&gt;&#x27; + q.correctText + (q.unit ? &#x27; &#x27; + q.unit : &#x27;&#x27;) + &#x27;&lt;/strong&gt;&lt;br&gt;&lt;br&gt;&#x27;}${q.explain || &#x27;&#x27;}`);
  showNextButton();
}

function showFeedback(correct, html) {
  const fa = document.getElementById(&#x27;feedbackArea&#x27;);
  fa.innerHTML = `
    &lt;div class=&quot;feedback ${correct ? &#x27;correct&#x27; : &#x27;wrong&#x27;} flash&quot;&gt;
      &lt;strong&gt;${correct ? &#x27;✓ Correct!&#x27; : &#x27;✗ Not quite&#x27;}&lt;/strong&gt;
      ${html}
    &lt;/div&gt;
  `;
}

function showNextButton() {
  const ca = document.getElementById(&#x27;controlArea&#x27;);
  const isLast = state.current === state.questions.length - 1;
  ca.innerHTML = `
    &lt;div class=&quot;controls&quot;&gt;
      &lt;button class=&quot;btn&quot; id=&quot;nextBtn&quot;&gt;${isLast ? &#x27;See Results&#x27; : &#x27;Next Question →&#x27;}&lt;/button&gt;
    &lt;/div&gt;
  `;
  const next = document.getElementById(&#x27;nextBtn&#x27;);
  next.addEventListener(&#x27;click&#x27;, () =&gt; {
    state.current++;
    state.answered = false;
    renderQuestion();
  });
  next.focus();
}

function renderFinal() {
  const total = state.questions.length;
  const pct = Math.round((state.score / total) * 100);
  let grade, msg, icon;
  if (pct &gt;= 90)      { grade = &quot;Outstanding&quot;; msg = &quot;Top mark territory — you&#x27;re stretch-ready!&quot;; icon = &quot;★&quot;; }
  else if (pct &gt;= 75) { grade = &quot;Strong&quot;;      msg = &quot;Solid work. Try Mixed mode to test under pressure.&quot;; icon = &quot;✓&quot;; }
  else if (pct &gt;= 55) { grade = &quot;Developing&quot;;  msg = &quot;Re-do this mode and check the cheat sheet for tricky steps.&quot;; icon = &quot;↗&quot;; }
  else                { grade = &quot;Keep going&quot;;  msg = &quot;Don&#x27;t worry — open the cheat sheet, redo this mode slowly.&quot;; icon = &quot;↻&quot;; }

  $quiz.innerHTML = `
    &lt;div class=&quot;quiz result&quot;&gt;
      &lt;div class=&quot;result-icon&quot;&gt;${icon}&lt;/div&gt;
      &lt;div class=&quot;result-grade&quot;&gt;${grade}&lt;/div&gt;
      &lt;div class=&quot;result-score&quot;&gt;${state.score}&lt;span class=&quot;total&quot;&gt;/${total}&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;result-msg&quot;&gt;${msg}&lt;/div&gt;
      &lt;div style=&quot;display:flex;gap:10px;justify-content:center;flex-wrap:wrap&quot;&gt;
        &lt;button class=&quot;btn&quot; onclick=&quot;startQuiz(&#x27;${state.mode}&#x27;)&quot;&gt;Try Again&lt;/button&gt;
        &lt;button class=&quot;btn secondary&quot; onclick=&quot;document.getElementById(&#x27;quizArea&#x27;).innerHTML=&#x27;&#x27;; document.querySelectorAll(&#x27;.mode-card&#x27;).forEach(c=&gt;c.classList.remove(&#x27;active&#x27;))&quot;&gt;Pick Another Mode&lt;/button&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  `;
}

$modes.querySelectorAll(&#x27;.mode-card&#x27;).forEach(card =&gt; {
  card.addEventListener(&#x27;click&#x27;, () =&gt; startQuiz(card.dataset.mode));
});
&lt;/script&gt;

  .option.correct { background: var(--good-soft) !important; border-color: var(--good) !important; color: var(--good) !important; opacity: 1; }
  .option.wrong   { background: var(--accent-soft) !important; border-color: var(--accent) !important; color: var(--accent) !important; opacity: 1; }
  .option .letter {
    background: var(--ink);
    color: var(--paper);
    width: 26px; height: 26px;
    min-width: 26px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: &#x27;Courier New&#x27;, monospace;
    font-weight: 900;
    font-size: 13px;
    flex-shrink: 0;
  }
  .option.correct .letter { background: var(--good); }
  .option.wrong   .letter { background: var(--accent); }

  .tf-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .tf-btn {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 24px;
    cursor: pointer;
    font-family: inherit;
    font-size: 20px;
    font-weight: 900;
    color: var(--ink);
    transition: all 0.15s;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .tf-btn:hover:not(:disabled) { background: var(--ink); color: var(--paper); }
  .tf-btn:disabled { cursor: default; opacity: 0.6; }
  .tf-btn.correct { background: var(--good-soft) !important; border-color: var(--good) !important; color: var(--good) !important; opacity: 1; }
  .tf-btn.wrong { background: var(--accent-soft) !important; border-color: var(--accent) !important; color: var(--accent) !important; opacity: 1; }

  .drag-area {
    margin: 18px 0;
  }
  .drag-instructions {
    font-style: italic;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 10px;
  }
  .drag-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .drag-item {
    background: var(--paper);
    border: 2px solid var(--ink);
    padding: 12px 16px;
    font-size: 16px;
    cursor: grab;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .drag-item.dragging { opacity: 0.4; }
  .drag-item.over { border-color: var(--cell); border-style: dashed; }
  .drag-handle {
    color: var(--muted);
    font-family: &#x27;Courier New&#x27;, monospace;
    font-weight: 900;
  }
  .drag-num {
    background: var(--ink);
    color: var(--paper);
    width: 28px; height: 28px;
    min-width: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: &#x27;Courier New&#x27;, monospace;
    font-weight: 900;
    font-size: 13px;
  }
  .drag-item.correct { background: var(--good-soft); border-color: var(--good); }
  .drag-item.wrong { background: var(--accent-soft); border-color: var(--accent); }
  .drag-item.correct .drag-num { background: var(--good); }
  .drag-item.wrong .drag-num { background: var(--accent); }

  .feedback {
    margin-top: 18px;
    padding: 14px 18px;
    border: 2px solid var(--ink);
    background: var(--paper);
    font-size: 15px;
    line-height: 1.5;
  }
  .feedback.correct { background: var(--good-soft); border-color: var(--good); }
  .feedback.wrong   { background: var(--accent-soft); border-color: var(--accent); }
  .feedback strong {
    display: block;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 13px;
  }
  .feedback.correct strong { color: var(--good); }
  .feedback.wrong   strong { color: var(--accent); }

  .controls {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .btn {
    padding: 12px 22px;
    border: 2px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
    font-family: inherit;
    font-weight: 900;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .btn:hover { background: var(--accent); border-color: var(--accent); }
  .btn.secondary { background: var(--paper); color: var(--ink); }
  .btn.secondary:hover { background: var(--ink); color: var(--paper); }

  .result {
    text-align: center;
    padding: 40px 24px;
  }
  .result-icon {
    font-size: 64px;
    margin-bottom: 12px;
  }
  .result-score {
    font-size: 48px;
    font-weight: 900;
    color: var(--ink);
    line-height: 1;
    font-family: &#x27;Courier New&#x27;, monospace;
  }
  .result-score .total { color: var(--muted); font-size: 24px; }
  .result-msg { font-size: 18px; margin: 14px 0 24px 0; font-style: italic; }
  .result-grade {
    display: inline-block;
    padding: 8px 18px;
    background: var(--ink);
    color: var(--paper);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 900;
    font-size: 14px;
    margin-bottom: 18px;
  }

  .footer-hint {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    margin-top: 16px;
  }

  @keyframes flashCorrect {
    0% { transform: scale(1); }
    50% { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
  .flash { animation: flashCorrect 0.3s ease; }

&lt;script&gt;
// =========================================================
// QUESTION BANKS
// =========================================================

// 1. SPRING 1 VOCAB — 11 official words
const VOCAB1 = [
  { term: &quot;Cell membrane&quot;, def: &quot;Thin barrier around every cell that controls what enters and leaves&quot;, wrongs: [&quot;Rigid outer layer found only in plant cells&quot;, &quot;Jelly that fills the cell&quot;, &quot;Site of respiration&quot;] },
  { term: &quot;Cell wall&quot;, def: &quot;Rigid outer layer of cellulose found in PLANT cells only&quot;, wrongs: [&quot;Thin barrier around every cell&quot;, &quot;The control centre of the cell&quot;, &quot;Where photosynthesis happens&quot;] },
  { term: &quot;Cytoplasm&quot;, def: &quot;Jelly-like substance filling the cell where most chemical reactions happen&quot;, wrongs: [&quot;The control centre with DNA&quot;, &quot;A green structure that absorbs sunlight&quot;, &quot;Tiny structures that make proteins&quot;] },
  { term: &quot;Ribosome&quot;, def: &quot;Tiny structures that make proteins&quot;, wrongs: [&quot;The site of photosynthesis&quot;, &quot;Stores water in plant cells&quot;, &quot;Controls what enters and leaves&quot;] },
  { term: &quot;Chloroplast&quot;, def: &quot;Green structure containing chlorophyll where photosynthesis happens (plant only)&quot;, wrongs: [&quot;Site of respiration in all cells&quot;, &quot;Control centre with DNA&quot;, &quot;Stores water in plant cells&quot;] },
  { term: &quot;Mitochondria&quot;, def: &quot;Site of respiration; releases energy from glucose. \u2018Powerhouse\u2019 of the cell&quot;, wrongs: [&quot;Site of photosynthesis&quot;, &quot;Tiny structures that make proteins&quot;, &quot;The rigid outer layer of plant cells&quot;] },
  { term: &quot;Vacuole&quot;, def: &quot;Large fluid-filled space in plant cells that stores water and keeps cell firm&quot;, wrongs: [&quot;The control centre of the cell&quot;, &quot;Site of respiration&quot;, &quot;Where proteins are made&quot;] },
  { term: &quot;Nucleus&quot;, def: &quot;Control centre of the cell containing DNA / chromosomes&quot;, wrongs: [&quot;The site of photosynthesis&quot;, &quot;Jelly-like substance filling the cell&quot;, &quot;A protein-making structure&quot;] },
  { term: &quot;Objective lens&quot;, def: &quot;The lens nearest the specimen on a microscope (\u00d74, \u00d710 or \u00d740)&quot;, wrongs: [&quot;The lens you look through (eyepiece)&quot;, &quot;Knob used to focus&quot;, &quot;Platform that holds the slide&quot;] },
  { term: &quot;Microscope&quot;, def: &quot;Instrument that magnifies tiny objects so we can see cells&quot;, wrongs: [&quot;A type of stain for slides&quot;, &quot;A specialised plant cell&quot;, &quot;A chemical that releases energy&quot;] },
  { term: &quot;Diffusion&quot;, def: &quot;Movement of particles from HIGH concentration to LOW concentration&quot;, wrongs: [&quot;Movement that requires energy&quot;, &quot;Particles moving from low to high concentration&quot;, &quot;The breaking down of food in cells&quot;] }
];

// 2. ANIMAL vs PLANT
const ANIMAL_PLANT_QS = [
  { part: &quot;Cell wall&quot;, answer: &quot;Plant only&quot;, explain: &quot;Cell walls are made of cellulose and found ONLY in plant cells. Animal cells don&#x27;t have them.&quot; },
  { part: &quot;Cell membrane&quot;, answer: &quot;Both&quot;, explain: &quot;EVERY cell has a cell membrane to control what enters and leaves.&quot; },
  { part: &quot;Chloroplasts&quot;, answer: &quot;Plant only&quot;, explain: &quot;Chloroplasts contain chlorophyll for photosynthesis \u2014 only plants make their own food, so plant cells only.&quot; },
  { part: &quot;Mitochondria&quot;, answer: &quot;Both&quot;, explain: &quot;All living cells respire to release energy, so all cells have mitochondria.&quot; },
  { part: &quot;Large vacuole&quot;, answer: &quot;Plant only&quot;, explain: &quot;Plants have a large permanent vacuole filled with cell sap to keep cells turgid (firm). Animal cells only have tiny temporary ones.&quot; },
  { part: &quot;Nucleus&quot;, answer: &quot;Both&quot;, explain: &quot;Both animal and plant cells need a control centre with DNA.&quot; },
  { part: &quot;Cytoplasm&quot;, answer: &quot;Both&quot;, explain: &quot;Both have cytoplasm \u2014 the jelly where reactions happen.&quot; },
  { part: &quot;Ribosomes&quot;, answer: &quot;Both&quot;, explain: &quot;All cells need to make proteins, so both have ribosomes.&quot; }
];

// 3. CELL FUNCTIONS
const FUNCTION_QS = [
  { part: &quot;Nucleus&quot;, func: &quot;Control centre \u2014 contains DNA and tells the cell what to do&quot;, wrongs: [&quot;Releases energy from glucose&quot;, &quot;Site of photosynthesis&quot;, &quot;Provides structure and support&quot;] },
  { part: &quot;Mitochondria&quot;, func: &quot;Site of respiration \u2014 releases energy from glucose&quot;, wrongs: [&quot;Control centre containing DNA&quot;, &quot;Site of photosynthesis&quot;, &quot;Stores water in plant cells&quot;] },
  { part: &quot;Cell membrane&quot;, func: &quot;Controls what enters and leaves the cell&quot;, wrongs: [&quot;Provides rigid structure&quot;, &quot;Makes proteins&quot;, &quot;Stores genetic information&quot;] },
  { part: &quot;Cell wall&quot;, func: &quot;Provides structure and support; made of cellulose&quot;, wrongs: [&quot;Releases energy from glucose&quot;, &quot;Controls what enters the cell&quot;, &quot;Site of photosynthesis&quot;] },
  { part: &quot;Chloroplasts&quot;, func: &quot;Site of photosynthesis \u2014 contain chlorophyll, absorb sunlight, make glucose&quot;, wrongs: [&quot;Site of respiration&quot;, &quot;Stores water in plant cells&quot;, &quot;Controls what enters the cell&quot;] },
  { part: &quot;Ribosomes&quot;, func: &quot;Make proteins \u2014 read instructions from the nucleus&quot;, wrongs: [&quot;Control what enters the cell&quot;, &quot;Site of photosynthesis&quot;, &quot;Site of respiration&quot;] },
  { part: &quot;Cytoplasm&quot;, func: &quot;Where most chemical reactions in the cell happen&quot;, wrongs: [&quot;Control centre with DNA&quot;, &quot;Site of photosynthesis&quot;, &quot;Provides rigid structure&quot;] },
  { part: &quot;Permanent vacuole&quot;, func: &quot;Stores cell sap (water + sugars) and keeps the plant cell firm&quot;, wrongs: [&quot;Makes proteins&quot;, &quot;Controls what enters the cell&quot;, &quot;Site of respiration&quot;] }
];

// 4. MICROSCOPE
const MICROSCOPE_QS = [
  {
    q: &quot;Total magnification = ?&quot;,
    options: [&quot;Eyepiece + objective lens&quot;, &quot;Eyepiece \u00d7 objective lens&quot;, &quot;Objective lens \u00f7 eyepiece&quot;, &quot;Just the objective lens&quot;],
    correct: 1,
    explain: &quot;Multiply: e.g. \u00d710 eyepiece \u00d7 \u00d740 objective = \u00d7400 total.&quot;
  },
  {
    q: &quot;A microscope has a \u00d710 eyepiece and a \u00d740 objective. What is the total magnification?&quot;,
    options: [&quot;\u00d750&quot;, &quot;\u00d7400&quot;, &quot;\u00d74&quot;, &quot;\u00d7140&quot;],
    correct: 1,
    explain: &quot;10 \u00d7 40 = 400. Total magnification = \u00d7400.&quot;
  },
  {
    q: &quot;Why do you start focusing on LOW power, not high power?&quot;,
    options: [&quot;High power is broken on most microscopes&quot;, &quot;Low power gives a wider field of view, so it\u2019s easier to find your specimen&quot;, &quot;High power doesn\u2019t need light&quot;, &quot;Because low power is more accurate&quot;],
    correct: 1,
    explain: &quot;Low power = wider view = easier to FIND the specimen. THEN switch to high power once it\u2019s in view.&quot;
  },
  {
    q: &quot;What is the OBJECTIVE LENS?&quot;,
    options: [&quot;The lens you look through&quot;, &quot;The lens nearest the specimen&quot;, &quot;The mirror at the bottom&quot;, &quot;The platform that holds the slide&quot;],
    correct: 1,
    explain: &quot;Objective = OBJECT-ive = nearest the OBJECT (specimen). Comes in different magnifications.&quot;
  },
  {
    q: &quot;Which knob should you use FIRST to focus?&quot;,
    options: [&quot;Fine focus&quot;, &quot;Coarse focus&quot;, &quot;There\u2019s only one focus knob&quot;, &quot;Eyepiece&quot;],
    correct: 1,
    explain: &quot;COARSE focus first (big knob, big movements) to get rough focus. Then FINE focus (small knob) for sharp image.&quot;
  },
  {
    q: &quot;Why do you add a STAIN (e.g. iodine, methylene blue) when preparing a slide?&quot;,
    options: [&quot;To make the slide stick to the stage&quot;, &quot;To kill the cells&quot;, &quot;To make cell parts more VISIBLE under the microscope&quot;, &quot;To make the cells grow&quot;],
    correct: 2,
    explain: &quot;Cells are mostly transparent. Stain colours specific parts so you can SEE them \u2014 e.g. iodine stains nuclei and starch.&quot;
  }
];

// 5. SLIDE STEPS — drag-drop ordering (just one set)
const SLIDE_STEPS = [
  &quot;Place a clean microscope slide on a flat surface&quot;,
  &quot;Add a drop of water to the centre of the slide&quot;,
  &quot;Place the specimen onto the water drop&quot;,
  &quot;Add a drop of stain (e.g. iodine)&quot;,
  &quot;Lower a coverslip slowly at an angle to avoid air bubbles&quot;,
  &quot;Place on stage; focus on LOW power first using coarse focus&quot;
];

// 6. DIFFUSION
const DIFFUSION_QS = [
  {
    q: &quot;Diffusion is the movement of particles from\u2026&quot;,
    options: [
      &quot;Low concentration to high concentration&quot;,
      &quot;High concentration to low concentration&quot;,
      &quot;Hot areas to cold areas only&quot;,
      &quot;Solid to liquid&quot;
    ],
    correct: 1,
    explain: &quot;Particles move from HIGH \u2192 LOW until evenly spread. (Easy to remember: things spread OUT, not IN.)&quot;
  },
  {
    q: &quot;Does diffusion need energy from the cell?&quot;,
    options: [&quot;Yes \u2014 a lot&quot;, &quot;Yes \u2014 a tiny bit&quot;, &quot;No \u2014 it is passive&quot;, &quot;Only at night&quot;],
    correct: 2,
    explain: &quot;Diffusion is PASSIVE. Particles move on their own due to random motion. No energy needed.&quot;
  },
  {
    q: &quot;A perfume bottle is opened. Why can people on the OTHER side of the room eventually smell it?&quot;,
    options: [
      &quot;The bottle starts blowing wind&quot;,
      &quot;Perfume particles diffuse from high concentration (near bottle) to low concentration (far away)&quot;,
      &quot;Smell waves travel like sound&quot;,
      &quot;The room temperature changes&quot;
    ],
    correct: 1,
    explain: &quot;Classic diffusion. Particles spread from where they\u2019re concentrated to where they\u2019re not, until evenly mixed.&quot;
  },
  {
    q: &quot;Where in cells does diffusion happen?&quot;,
    options: [&quot;In the nucleus only&quot;, &quot;Across the cell membrane&quot;, &quot;In the cell wall only&quot;, &quot;Outside cells only&quot;],
    correct: 1,
    explain: &quot;The cell membrane is selectively permeable \u2014 small molecules like O\u2082 and CO\u2082 diffuse across it.&quot;
  },
  {
    q: &quot;Which of the following SPEEDS UP diffusion?&quot;,
    options: [
      &quot;Lower temperature&quot;,
      &quot;Smaller difference in concentration&quot;,
      &quot;Higher temperature&quot;,
      &quot;Thicker membrane&quot;
    ],
    correct: 2,
    explain: &quot;Higher temperature \u2192 particles have MORE energy \u2192 move faster \u2192 diffusion is faster.&quot;
  },
  {
    q: &quot;Which gas DIFFUSES INTO an animal cell that is respiring?&quot;,
    options: [&quot;Carbon dioxide&quot;, &quot;Nitrogen&quot;, &quot;Oxygen&quot;, &quot;Hydrogen&quot;],
    correct: 2,
    explain: &quot;OXYGEN diffuses IN (needed for respiration). CO\u2082 (waste product) diffuses OUT.&quot;
  }
];

// 7. SPECIALISED CELLS
const SPECIALISED_QS = [
  {
    cell: &quot;Sperm cell&quot;,
    feature: &quot;Long tail and many mitochondria&quot;,
    why: &quot;To swim to the egg \u2014 tail provides movement, mitochondria release energy&quot;,
    wrongs: [&quot;To absorb water from soil&quot;, &quot;To carry oxygen&quot;, &quot;To absorb sunlight&quot;]
  },
  {
    cell: &quot;Red blood cell&quot;,
    feature: &quot;No nucleus, biconcave (disc) shape, contains haemoglobin&quot;,
    why: &quot;More room for haemoglobin to carry oxygen around the body&quot;,
    wrongs: [&quot;More room for chlorophyll&quot;, &quot;More room for mitochondria&quot;, &quot;More room for cell sap&quot;]
  },

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i &gt; 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickN(arr, n) { return shuffle(arr).slice(0, n); }

function buildVocab1Quiz() {
  return pickN(VOCAB1, 8).map(item =&gt; {
    const askForDef = Math.random() &gt; 0.5;
    if (askForDef) {
      const opts = shuffle([item.def, ...item.wrongs]);
      return {
        type: &#x27;mcq&#x27;,
        bigDisplay: item.term,
        prompt: &#x27;Cell vocabulary&#x27;,
        question: `What does &quot;${item.term}&quot; mean?`,
        options: opts,
        correct: opts.indexOf(item.def),
        explain: `${item.term} = ${item.def}`
      };
    } else {
      const distractors = pickN(VOCAB1.filter(d =&gt; d.term !== item.term), 3).map(d =&gt; d.term);
      const opts = shuffle([item.term, ...distractors]);
      return {
        type: &#x27;mcq&#x27;,
        prompt: &#x27;Cell vocabulary&#x27;,
        question: `Which term means: &quot;${item.def}&quot;?`,
        options: opts,
        correct: opts.indexOf(item.term),
        explain: `${item.term} = ${item.def}`
      };
    }
  });
}
